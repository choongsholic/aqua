<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DP-AQUA · App User Quantitative Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>
<style>
@font-face { font-family:'YouandiNewKr'; font-weight:700; font-style:normal; src:url('https://img.hyundaicard.com/docfiles/resources/pc/fonts/YouandiNewKrTitle-Bold.woff2') format('woff2'), url('https://img.hyundaicard.com/docfiles/resources/pc/fonts/YouandiNewKrTitle-Bold.woff') format('woff'); font-display:swap; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; overflow:hidden; cursor:default; font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Spoqa Han Sans Neo','Malgun Gothic',sans-serif; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
const dpr = window.devicePixelRatio || 1;

// ═══ CONFIG ═══
const HEALTH = {
  healthy: { r:80,  g:210, b:120, label:'건강', code:'5' },
  good:    { r:80,  g:150, b:230, label:'양호', code:'4' },
  normal:  { r:200, g:200, b:200, label:'일반', code:'3' },
  caution: { r:220, g:190, b:80,  label:'주의', code:'2' },
  danger:  { r:220, g:75,  b:75,  label:'위험', code:'1' },
};
const HEALTH_KEYS = ['healthy','good','normal','caution','danger'];

const HEALTH_DIST = {
  power:  [0.55, 0.25, 0.12, 0.06, 0.02],
  casual: [0.08, 0.28, 0.35, 0.22, 0.07],
  light:  [0.02, 0.06, 0.22, 0.40, 0.30],
};

function assignHealth(seg) {
  const dist = HEALTH_DIST[seg] || HEALTH_DIST.light;
  let r = Math.random(), acc = 0;
  for (let i = 0; i < dist.length; i++) { acc += dist[i]; if (r < acc) return HEALTH_KEYS[i]; }
  return 'normal';
}

function hColor(h, a) { const c = HEALTH[h]; return `rgba(${c.r},${c.g},${c.b},${a})`; }
function lerpRGB(h1, h2, t, a) {
  const c1 = HEALTH[h1], c2 = HEALTH[h2];
  return `rgba(${c1.r+(c2.r-c1.r)*t|0},${c1.g+(c2.g-c1.g)*t|0},${c1.b+(c2.b-c1.b)*t|0},${a})`;
}

const CFG = {
  physics: { noise:0.034, maxSpeed:0.8, maxSpeedScatter:2.5, damping:0.995, boundary:0.01, repulsion:0.03, repDist:15, mouseR:150, mouseF:2.0, mouseFC:4.0 },
  migration: { speed:0.004, rates:{ light_casual:0.03, casual_power:0.02, power_casual:0.012, casual_light:0.025, churn:0.08, newEntry:0.10 } },
  pipe: { width:38 },
};

// ═══ LAYOUT ═══
const headerH = 96;
let tanks = {}, aquarium = {}, newZone = {}, churnZone = {};
let signalPanel = {}, actionPanel = {}, pipes = {};
let rightPad = 22, leftPad = 22, channelX = 0;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  computeLayout();
}

function computeLayout() {
  const pad = 28;
  const pipeGapV = 48;
  const panelW = Math.min(200, W*0.15);
  const sideW = 120;
  const aquaLabelH = 22;
  const marginX = Math.max(50, W*0.05);
  const marginY = Math.max(14, (H-headerH)*0.03);

  // Outer aquarium — no longer reserving bottom space for churn
  const aX = sideW + pad + marginX;
  const aY = headerH + pad + marginY;
  const aW = W - sideW - panelW - pad*3 - marginX*1.2;
  const aH = H - headerH - pad*2 - marginY*2;
  aquarium = { x:aX, y:aY, w:aW, h:aH };

  // Inner tanks: Power(top), Casual(mid), Light(bottom)
  const tX = aX + leftPad;
  const tY = aY + leftPad/2 + aquaLabelH;
  const tW = aW - leftPad - rightPad;
  const bottomPad = 12; // space below Light tank inside aquarium
  const tAvailH = aH - leftPad - aquaLabelH - bottomPad;
  const tH = (tAvailH - pipeGapV*2) / 3;

  tanks.power  = { x:tX, y:tY,                       w:tW, h:tH };
  tanks.casual = { x:tX, y:tY + tH + pipeGapV,       w:tW, h:tH };
  tanks.light  = { x:tX, y:tY + (tH+pipeGapV)*2,     w:tW, h:tH };

  channelX = aX + aW - rightPad/2;

  // Panels
  const pX = W - panelW - pad;
  signalPanel = { x:pX, y:aY + aH*0.03, w:panelW, h:Math.min(180, aH*0.34) };
  actionPanel = { x:pX, y:signalPanel.y + signalPanel.h + pad*0.6, w:panelW, h:Math.min(200, aH*0.30) };

  // 신규 & 이탈: bottom-left / bottom-right
  const bottomTopY = actionPanel.y + actionPanel.h + pad;
  const bottomZoneH = 160;
  const bottomZoneY = aY + aH - bottomZoneH;
  newZone   = { x:aX - sideW - pad*0.8, y:bottomZoneY, w:sideW, h:bottomZoneH };
  churnZone = { x:pX, y:bottomZoneY, w:panelW, h:bottomZoneH };

  // Pipes: between tanks (vertical) — centered
  const pt = tanks.power, ct = tanks.casual, lt = tanks.light;
  const pipeCenterPC = pt.x + pt.w * 0.5;
  const pipeCenterCL = ct.x + ct.w * 0.5;
  const pipeSpacing = CFG.pipe.width * 2.2;
  pipes.cp_up   = { cx:pipeCenterPC - pipeSpacing/2, topY:pt.y+pt.h, botY:ct.y }; // 상향 left
  pipes.pc_down = { cx:pipeCenterPC + pipeSpacing/2, topY:pt.y+pt.h, botY:ct.y }; // 다운 right
  pipes.lc_up   = { cx:pipeCenterCL - pipeSpacing/2, topY:ct.y+ct.h, botY:lt.y }; // 상향 left
  pipes.cl_down = { cx:pipeCenterCL + pipeSpacing/2, topY:ct.y+ct.h, botY:lt.y }; // 다운 right

  // Pipe: 신규 → Light tank left wall (horizontal)
  pipes.new_in = { cy:newZone.y + newZone.h/2, leftX:newZone.x+newZone.w, rightX:lt.x };

  // Pipe: aquarium bottom-right → 이탈 (horizontal)
  // Pipe: Light tank right wall → 이탈 (horizontal)
  pipes.churn_out = { cy:churnZone.y + churnZone.h/2, leftX:lt.x+lt.w, rightX:churnZone.x };

  // Reposition particles
  if (particles.length) particles.forEach(p => {
    if (!p.migrating && p.segment !== 'churn') {
      const z = getSubZone(p.segment, p.subType);
      if (z) { p.x = clamp(p.x, z.x+p.radius, z.x+z.w-p.radius); p.y = clamp(p.y, z.y+p.radius, z.y+z.h-p.radius); }
    }
  });
}

function clamp(v,mn,mx) { return Math.max(mn, Math.min(mx, v)); }

const MARGIN_Y = 10; // narrow channel for rare type crossing
function getSubZone(seg, sub) {
  const t = tanks[seg]; if (!t) return null;
  const zW = t.w/3, idx = sub-1, ipY = 5;
  // X: no gap between sub-zones, wall-to-wall
  return { x:t.x+idx*zW, y:t.y+ipY, w:zW, h:t.h-ipY*2, tankRef:t };
}

// ═══ PARTICLE ═══
class Particle {
  constructor(seg, sub) {
    this.segment = seg;
    this.subType = sub;
    this.health = assignHealth(seg);
    this.radius = 1.8;
    this.baseOpacity = 0.3 + Math.random()*0.5;
    this.phase = Math.random()*Math.PI*2;
    this.vx = (Math.random()-0.5)*0.15;
    this.vy = (Math.random()-0.5)*0.15;
    const z = getSubZone(seg, sub);
    if (z) { this.x = z.x+Math.random()*z.w; this.y = z.y+Math.random()*z.h; }
    else { this.x = W/2; this.y = H/2; }

    this.migrating = false;
    this.migProgress = 0; this.migSpeed = 0;
    this.migFrom = null; this.migTo = null;
    this.waypoints = []; this.totalPathLen = 0;
    this.trail = [];

    // 이탈 state
    this.fading = false;
    this.fadeAlpha = 1.0;
    this.churnTimer = -1;
    this.fadingIn = false; this.fadeInTimer = 0;
    this.scattered = 0;
  }

  getColor(alpha) {
    const a = this.fading ? alpha * this.fadeAlpha : alpha;
    if (this.migrating && this.migTo === 'churn') return lerpRGB(this.health, 'danger', Math.min(this.migProgress*2,1), a);
    if (this.migrating && this.migFrom === 'churn') return lerpRGB('danger', this.health, this.migProgress, a);
    if (this.segment === 'churn') return hColor('danger', a);
    return hColor(this.health, a);
  }

  update(frame) {
    // 신규유입 fade-in
    if (this.fadingIn) {
      this.fadeAlpha = Math.min(1, this.fadeAlpha + 0.025);
      this.fadeInTimer--;
      if (this.fadeInTimer <= 0 && this.fadeAlpha >= 1) {
        this.startNewMigration();
      }
      return;
    }
    // 이탈 fade
    if (this.fading) {
      this.fadeAlpha -= 0.008;
      if (this.fadeAlpha <= 0) { this.recycleAsNew(); return; }
    }
    // 이탈 return timer
    if (this.segment === 'churn' && !this.migrating && !this.fading && this.churnTimer > 0) {
      this.churnTimer--;
      if (this.churnTimer <= 0) this.returnFromChurn();
    }
    if (this.migrating) { this.updateMigration(); return; }

    // Determine zone
    let z;
    if (this.segment === 'churn') {
      z = { x:churnZone.x+4, y:churnZone.y+4, w:churnZone.w-8, h:churnZone.h-8 };
    } else {
      z = getSubZone(this.segment, this.subType);
    }
    if (!z) return;

    // Organic noise — gentle drift
    const nx = Math.sin(this.phase+frame*0.005)*Math.cos(this.y*0.004+frame*0.002)*CFG.physics.noise;
    const ny = Math.cos(this.phase+frame*0.004)*Math.sin(this.x*0.004+frame*0.002)*CFG.physics.noise;
    this.vx += nx; this.vy += ny;

    // Cohesion + swirl — elliptical pull with vortex rotation
    const cx = z.x+z.w/2, cy = z.y+z.h/2;
    const dx = cx - this.x, dy = cy - this.y;
    const normDx = dx / (z.w*0.3), normDy = dy / (z.h*0.25);
    const dist = Math.sqrt(normDx*normDx + normDy*normDy);
    const cohesion = Math.min(dist * 0.0008, 0.008);
    // Radial pull (toward center)
    this.vx += dx * cohesion * 0.8;
    this.vy += dy * cohesion * 1.5;
    // Tangential swirl (perpendicular to center direction, creates rotation)
    const swirl = Math.min(dist * 0.00008, 0.0015);
    this.vx += -dy * swirl;
    this.vy += dx * swirl * 0.6;

    if (this.scattered>0) this.scattered--;
    const curMax = this.scattered>0 ? CFG.physics.maxSpeedScatter : CFG.physics.maxSpeed;
    const curDamp = this.scattered>0 ? 0.985 : CFG.physics.damping;
    this.vx *= curDamp; this.vy *= curDamp;
    const spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if (spd > curMax) { this.vx=(this.vx/spd)*curMax; this.vy=(this.vy/spd)*curMax; }

    this.x += this.vx; this.y += this.vy;

    const m = 5, k = CFG.physics.boundary;
    const t = z.tankRef;

    if (t) {
      const wallL = z.x + this.radius + 2;
      const wallR = z.x + z.w - this.radius - 2;

      // ABSOLUTE sub-zone walls — position forced, velocity killed
      this.x = Math.max(wallL, Math.min(wallR, this.x));
      if (this.x <= wallL + 1) this.vx = Math.abs(this.vx) * 0.2;
      if (this.x >= wallR - 1) this.vx = -Math.abs(this.vx) * 0.2;
    } else {
      if (this.x < z.x+m) this.vx += (z.x+m-this.x)*k;
      if (this.x > z.x+z.w-m) this.vx += (z.x+z.w-m-this.x)*k;
      this.x = clamp(this.x, z.x+this.radius, z.x+z.w-this.radius);
    }

    // Top/bottom — hard walls
    const wallT = z.y + this.radius + 3;
    const wallB = z.y + z.h - this.radius - 3;
    if (this.y <= wallT) { this.y = wallT; if (this.vy < 0) this.vy = 0; }
    if (this.y >= wallB) { this.y = wallB; if (this.vy > 0) this.vy = 0; }
  }

  startMigration(toSeg, toSub) {
    this.migrating = true; this.migProgress = 0;
    this.migSpeed = CFG.migration.speed + Math.random()*0.001;
    this.migFrom = this.segment; this.migTo = toSeg;
    this.trail = [];
    if (toSub) this.subType = toSub;

    const wp = [{x:this.x, y:this.y}];
    const from = this.segment, to = toSeg;

    if (to === 'churn') {
      // Exit: current zone → bottom channel → right wall → pipe → 이탈
      const t = tanks[from];
      const sz = getSubZone(from, this.subType);
      if (t && sz) {
        const bottomCh = t.y + t.h - 5;
        const lt = tanks.light;
        const ltBottomCh = lt.y + lt.h - 5;
        wp.push({x:sz.x+sz.w/2, y:bottomCh});              // drop to bottom channel

        if (from === 'light') {
          // Light: slide right in channel → exit through pipe
          wp.push({x:t.x+t.w-5, y:bottomCh});
          wp.push({x:t.x+t.w-5, y:pipes.churn_out.cy});
          wp.push({x:pipes.churn_out.leftX+2, y:pipes.churn_out.cy});
        } else {
          // Power/Casual: go through vertical pipe to Light, then exit
          const downPipe = (from==='power') ? pipes.pc_down : pipes.cl_down;
          wp.push({x:downPipe.cx, y:bottomCh});              // slide to down pipe
          wp.push({x:downPipe.cx, y:downPipe.topY+8});       // enter pipe
          // Chain through segments to Light
          if (from==='power') {
            wp.push({x:downPipe.cx, y:pipes.cl_down.topY-5}); // through Casual
            wp.push({x:pipes.cl_down.cx, y:pipes.cl_down.topY-5});
            wp.push({x:pipes.cl_down.cx, y:pipes.cl_down.topY+8});
            wp.push({x:pipes.cl_down.cx, y:pipes.cl_down.botY-8});
          } else {
            wp.push({x:downPipe.cx, y:downPipe.botY-8});      // exit into Light
          }
          wp.push({x:pipes.cl_down.cx, y:ltBottomCh});       // Light bottom channel
          wp.push({x:lt.x+lt.w-5, y:ltBottomCh});            // slide right
          wp.push({x:lt.x+lt.w-5, y:pipes.churn_out.cy});    // step down to pipe
          wp.push({x:pipes.churn_out.leftX+2, y:pipes.churn_out.cy});
        }
        wp.push({x:pipes.churn_out.rightX-2, y:pipes.churn_out.cy});
      }
      wp.push({x:churnZone.x+Math.random()*churnZone.w, y:churnZone.y+Math.random()*churnZone.h});
    } else if (from === 'power' && to === 'casual') {
      const p = pipes.pc_down;
      const t = tanks[from];
      const ch = t.y + t.h - 5;
      wp.push({x:this.x, y:ch});
      wp.push({x:p.cx, y:ch});
      wp.push({x:p.cx, y:p.topY+8}); wp.push({x:p.cx, y:p.botY-8});
    } else if (from === 'casual' && to === 'power') {
      const p = pipes.cp_up;
      const t = tanks[from];
      const ch = t.y + 5;
      wp.push({x:this.x, y:ch});
      wp.push({x:p.cx, y:ch});
      wp.push({x:p.cx, y:p.botY-8}); wp.push({x:p.cx, y:p.topY+8});
    } else if (from === 'casual' && to === 'light') {
      const p = pipes.cl_down;
      const t = tanks[from];
      const ch = t.y + t.h - 5;
      wp.push({x:this.x, y:ch});
      wp.push({x:p.cx, y:ch});
      wp.push({x:p.cx, y:p.topY+8}); wp.push({x:p.cx, y:p.botY-8});
    } else if (from === 'light' && to === 'casual') {
      const p = pipes.lc_up;
      const t = tanks[from];
      const ch = t.y + 5;
      wp.push({x:this.x, y:ch});
      wp.push({x:p.cx, y:ch});
      wp.push({x:p.cx, y:p.botY-8}); wp.push({x:p.cx, y:p.topY+8});
    }

    if (to !== 'churn') {
      const dz = getSubZone(to, this.subType);
      const dt = tanks[to];
      if (dz && dt) {
        // Enter through top channel → slide to sub-zone x → drop into zone
        const entryCh = dt.y + 5; // top channel — above divider lines
        wp.push({x:wp[wp.length-1].x, y:entryCh}); // move to top channel at current x
        wp.push({x:dz.x+dz.w/2, y:entryCh});       // slide to sub-zone center in channel
        wp.push({x:dz.x+dz.w/2, y:dz.y+dz.h/2});   // drop into zone center
      }
    }

    this.waypoints = wp;
    this.totalPathLen = 0;
    for (let i=1;i<wp.length;i++) { const dx=wp[i].x-wp[i-1].x, dy=wp[i].y-wp[i-1].y; this.totalPathLen += Math.sqrt(dx*dx+dy*dy); }
  }

  updateMigration() {
    this.migProgress += this.migSpeed;
    if (this.migProgress > 1) this.migProgress = 1;
    this.trail.push({x:this.x, y:this.y}); if (this.trail.length > 20) this.trail.shift();

    const td = this.migProgress * this.totalPathLen;
    let acc = 0;
    for (let i=1;i<this.waypoints.length;i++) {
      const dx=this.waypoints[i].x-this.waypoints[i-1].x, dy=this.waypoints[i].y-this.waypoints[i-1].y;
      const sl = Math.sqrt(dx*dx+dy*dy);
      if (acc+sl >= td || i===this.waypoints.length-1) {
        const t = sl>0 ? Math.min((td-acc)/sl,1) : 1;
        this.x = this.waypoints[i-1].x+dx*t; this.y = this.waypoints[i-1].y+dy*t; break;
      }
      acc += sl;
    }

    if (this.migProgress >= 1) {
      this.migrating = false; this.trail = [];
      this.vx = (Math.random()-0.5)*0.1; this.vy = (Math.random()-0.5)*0.1;

      if (this.migTo === 'churn') {
        this.segment = 'churn'; this.health = 'danger';
        if (Math.random() < 0.6) { this.fading = true; this.fadeAlpha = 1.0; }
        else { this.churnTimer = 80 + Math.random()*120|0; }
      } else {
        this.segment = this.migTo;
        this.health = assignHealth(this.migTo);
        // Force position inside correct sub-zone
        const dz = getSubZone(this.segment, this.subType);
        if (dz) {
          this.x = clamp(this.x, dz.x + this.radius + 5, dz.x + dz.w - this.radius - 5);
          this.y = clamp(this.y, dz.y + this.radius + 5, dz.y + dz.h - this.radius - 5);
        }
      }

      if ((this.migFrom==='power'&&this.migTo==='casual')||(this.migFrom==='casual'&&this.migTo==='light')||this.migTo==='churn') {
        signalEvents.push({from:this.migFrom, to:this.migTo, time:Date.now()});
      }
    }
  }

  returnFromChurn() {
    // Return from 이탈 → churn pipe 역방향 → 아쿠아리움 우측 → Light 내부
    this.migrating = true; this.migProgress = 0;
    this.migSpeed = CFG.migration.speed;
    this.migFrom = 'churn'; this.migTo = 'light';
    this.subType = Math.random()<0.55?1:Math.random()<0.6?2:3;
    this.health = assignHealth('light');
    this.trail = []; this.fading = false; this.fadeAlpha = 1.0;
    const dz = getSubZone('light', this.subType);
    const dt = tanks.light;
    const bottomCh = dt.y + dt.h - 5; // bottom channel inside Light
    const wp = [
      {x:this.x, y:this.y},
      {x:pipes.churn_out.rightX-2, y:pipes.churn_out.cy},  // churn pipe
      {x:pipes.churn_out.leftX+2, y:pipes.churn_out.cy},   // enter Light through hole
      {x:dt.x+dt.w-5, y:pipes.churn_out.cy},               // inside Light right edge
      {x:dt.x+dt.w-5, y:bottomCh},                          // step up to bottom channel
      {x:dz.x+dz.w/2, y:bottomCh},                          // slide to sub-zone in channel
      {x:dz.x+dz.w/2, y:dz.y+dz.h/2},                      // step up into zone
    ];
    this.waypoints = wp; this.totalPathLen = 0;
    for (let i=1;i<wp.length;i++) { const dx=wp[i].x-wp[i-1].x,dy=wp[i].y-wp[i-1].y; this.totalPathLen+=Math.sqrt(dx*dx+dy*dy); }
  }

  recycleAsNew() {
    // Recycle: fade in at random position in newZone, then migrate to Light
    this.segment = 'new'; this.subType = Math.random()<0.55?1:Math.random()<0.6?2:3;
    this.health = 'normal';
    this.fading = false; this.churnTimer = -1;
    // Start with fade-in
    this.fadeAlpha = 0;
    this.fadeInTimer = 40 + Math.random()*60|0; // frames to wait before moving
    this.fadingIn = true;
    // Random position inside newZone
    this.x = newZone.x + 10 + Math.random()*(newZone.w-20);
    this.y = newZone.y + 10 + Math.random()*(newZone.h-20);
    this.vx = 0; this.vy = 0;
    this.migrating = false;
  }
  startNewMigration() {
    // Called after fade-in completes
    this.segment = 'light';
    this.fadeAlpha = 1.0; this.fadingIn = false;
    const pin = pipes.new_in;
    this.migrating = true; this.migProgress = 0;
    this.migSpeed = CFG.migration.speed + Math.random()*0.001;
    this.migFrom = 'new'; this.migTo = 'light';
    this.trail = [];
    const dz = getSubZone('light', this.subType);
    const dt = tanks.light;
    const bottomCh = dt.y + dt.h - 5; // bottom channel — below divider lines
    const wp = [
      {x:this.x, y:this.y},
      {x:this.x, y:pin.cy},              // move to pipe level
      {x:pin.leftX+2, y:pin.cy},         // pipe entrance
      {x:pin.rightX+5, y:pin.cy},        // pipe exit → inside Light tank
      {x:pin.rightX+5, y:bottomCh},      // step UP to bottom channel
      {x:dz.x+dz.w/2, y:bottomCh},      // slide to sub-zone in channel
      {x:dz.x+dz.w/2, y:dz.y+dz.h/2},  // step UP into zone center
    ];
    this.waypoints = wp; this.totalPathLen = 0;
    for (let i=1;i<wp.length;i++) { const dx=wp[i].x-wp[i-1].x,dy=wp[i].y-wp[i-1].y; this.totalPathLen+=Math.sqrt(dx*dx+dy*dy); }
  }

  draw() {
    if (this.fadeAlpha <= 0) return;
    const alpha = this.migrating ? 0.5 : this.baseOpacity;
    ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
    ctx.fillStyle = this.getColor(alpha); ctx.fill();
  }
}

// ═══ INIT ═══
let particles = [], signalEvents = [];

function initParticles() {
  particles = [];
  [{seg:'power',n:1910},{seg:'casual',n:2670},{seg:'light',n:3050}].forEach(d => {
    const subs = [0.50,0.30,0.20]; let rem = d.n;
    subs.forEach((r,i) => {
      const n = i<2 ? Math.round(d.n*r) : rem; rem -= n;
      for (let j=0;j<n;j++) particles.push(new Particle(d.seg, i+1));
    });
  });
}

// ═══ SPATIAL GRID ═══
const GC = 20; let grid = {};
function buildGrid() {
  grid = {};
  for (const p of particles) { if (p.migrating||p.fadeAlpha<=0) continue; const k=`${p.x/GC|0},${p.y/GC|0}`; (grid[k]||(grid[k]=[])).push(p); }
}
function applyRepulsion() {
  for (const p of particles) {
    if (p.migrating) continue;
    const gx=p.x/GC|0, gy=p.y/GC|0;
    let avgVx=0, avgVy=0, nCount=0;
    for (let dx=-1;dx<=1;dx++) for (let dy=-1;dy<=1;dy++) {
      const nb=grid[`${gx+dx},${gy+dy}`]; if(!nb) continue;
      for (const q of nb) {
        if (q===p||q.migrating) continue;
        // Skip repulsion across sub-zone walls
        if (p.segment===q.segment && p.subType!==q.subType) continue;
        const ex=p.x-q.x, ey=p.y-q.y, dSq=ex*ex+ey*ey;
        // Separation
        const md=(p.radius+q.radius)*CFG.physics.repDist/4;
        if (dSq<md*md&&dSq>0.1) { const d=Math.sqrt(dSq), f=(md-d)/md*CFG.physics.repulsion; p.vx+=(ex/d)*f; p.vy+=(ey/d)*f; }
        // Alignment — match neighbors' velocity
        if (dSq<400) { avgVx+=q.vx; avgVy+=q.vy; nCount++; }
      }
    }
    if (nCount>0) {
      p.vx += (avgVx/nCount - p.vx) * 0.02;
      p.vy += (avgVy/nCount - p.vy) * 0.02;
    }
  }
}

// ═══ MOUSE + DRAG ═══
let mouseX=-999, mouseY=-999, mouseDown=false;
let drag = {active:false, lx:0, ly:0, vx:0, vy:0, sx:0, sy:0};

function inAqua(x,y) { return x>=aquarium.x&&x<=aquarium.x+aquarium.w&&y>=aquarium.y&&y<=aquarium.y+aquarium.h; }

canvas.addEventListener('mousemove', e => {
  if (handActive) return; // hand tracking takes priority
  mouseX=e.clientX; mouseY=e.clientY;
  if (drag.active) { drag.vx=e.clientX-drag.lx; drag.vy=e.clientY-drag.ly; drag.lx=e.clientX; drag.ly=e.clientY; drag.sx+=drag.vx*0.35; drag.sy+=drag.vy*0.35; }
});
canvas.addEventListener('mouseleave', ()=>{ mouseX=-999; mouseY=-999; drag.active=false; });
canvas.addEventListener('mousedown', e => {
  mouseDown=true;
  if (inAqua(e.clientX,e.clientY)) { drag.active=true; drag.lx=e.clientX; drag.ly=e.clientY; drag.vx=0; drag.vy=0; drag.sx=0; drag.sy=0; }
});
canvas.addEventListener('mouseup', ()=>{ mouseDown=false; drag.active=false; });

function applyMouseForce() {
  if (mouseX<0||drag.active) return;

  // Hand mode: only react when fingers are clearly spread
  if (handActive && fingerTips.length && fingerSpread > 0.4) {
    // Burst: sudden open → explosive scatter in random directions
    if (burstFrame > 0) {
      burstFrame--;
      const rad = 250;
      const str = 5.0;
      for (const p of particles) {
        if (p.migrating) continue;
        const dx=p.x-handX, dy=p.y-handY, dSq=dx*dx+dy*dy;
        if (dSq<rad*rad && dSq>1) {
          const angle = Math.random() * Math.PI * 2;
          const d=Math.sqrt(dSq), f=(1-d/rad)*str;
          p.vx += Math.cos(angle)*f;
          p.vy += Math.sin(angle)*f;
          p.scattered=30;
        }
      }
    }
    // Palm swipe: push particles in hand movement direction
    const handSpeed = Math.sqrt(handVX*handVX + handVY*handVY);
    if (handSpeed > 3) {
      const pushRad = 200;
      const pushStr = Math.min(handSpeed * 0.15, 5);
      const nx = handVX/handSpeed, ny = handVY/handSpeed;
      for (const p of particles) {
        if (p.migrating) continue;
        const dx=p.x-handX, dy=p.y-handY, dSq=dx*dx+dy*dy;
        if (dSq < pushRad*pushRad && dSq > 1) {
          const d = Math.sqrt(dSq), f = (1-d/pushRad) * pushStr;
          p.vx += nx * f;
          p.vy += ny * f;
          p.scattered = 20;
        }
      }
    }

    // Swirl: single finger circular motion → each subzone swirls (donut)
    if (fingerTips.length === 1 && Math.abs(swirlForce) > 0.05) {
      const str = swirlForce * 3.0;
      for (const p of particles) {
        if (p.migrating) continue;
        const z = getSubZone(p.segment, p.subType);
        if (!z) continue;
        const cx = z.x + z.w/2, cy = z.y + z.h/2;
        const dx = p.x - cx, dy = p.y - cy;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d > 1) {
          p.vx += (-dy/d) * str;
          p.vy += (dx/d) * str;
          p.scattered = 15;
        }
      }
    }

    // Chaos: triggered by swirl + spread fingers
    if (chaosActive > 0) {
      chaosActive--;
      const intensity = chaosActive / 120; // fades out
      const chaos = intensity * 8.0;
      for (const p of particles) {
        if (p.migrating) continue;
        const z = getSubZone(p.segment, p.subType);
        if (!z) continue;
        const cx = z.x + z.w/2, cy = z.y + z.h/2;
        const dx = p.x - cx, dy = p.y - cy;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d > 1) {
          const angle = Math.random() * Math.PI * 2;
          p.vx += Math.cos(angle) * chaos * (1 + Math.random());
          p.vy += Math.sin(angle) * chaos * (1 + Math.random());
          if (Math.random() < 0.3) {
            p.vx += (dx/d) * chaos * 2;
            p.vy += (dy/d) * chaos * 2;
          }
          if (Math.random() < 0.1) {
            p.vx *= -(0.5 + Math.random());
            p.vy *= -(0.5 + Math.random());
          }
          p.scattered = 40;
        }
      }
    }

    // Normal spread repulsion from fingertips
    const rad = 80 + fingerSpread * 140;
    const str = (fingerSpread - 0.4) * 6.0;
    for (const p of particles) {
      if (p.migrating) continue;
      for (const ft of fingerTips) {
        const dx=p.x-ft.x, dy=p.y-ft.y, dSq=dx*dx+dy*dy;
        if (dSq<rad*rad && dSq>1) {
          const d=Math.sqrt(dSq), f=(1-d/rad)*str;
          p.vx+=(dx/d)*f+(Math.random()-0.5)*f*0.5;
          p.vy+=(dy/d)*f+(Math.random()-0.5)*f*0.5;
          p.scattered=30;
        }
      }
    }
    return;
  }
  if (handActive) return; // closed hand = completely ignore

  // Normal mouse mode
  const rad=mouseDown?180:CFG.physics.mouseR, str=mouseDown?CFG.physics.mouseFC:CFG.physics.mouseF;
  for (const p of particles) {
    if(p.migrating) continue;
    const dx=p.x-mouseX,dy=p.y-mouseY,dSq=dx*dx+dy*dy;
    if(dSq<rad*rad&&dSq>1){
      const d=Math.sqrt(dSq),f=(1-d/rad)*str;
      p.vx+=(dx/d)*f+(Math.random()-0.5)*f*0.8;
      p.vy+=(dy/d)*f+(Math.random()-0.5)*f*0.8;
      p.scattered=30;
    }
  }
}
function applyDragForce() {
  drag.sx*=0.92; drag.sy*=0.92;
  if (Math.abs(drag.sx)<0.01&&Math.abs(drag.sy)<0.01) return;
  particles.forEach(p => { if(!p.migrating) { p.vx+=drag.sx*0.007; p.vy+=drag.sy*0.007; } });
}

// ═══ MIGRATION ═══
function tryMigrations() {
  const seg={power:[],casual:[],light:[]};
  particles.forEach(p => { if(!p.migrating&&seg[p.segment]) seg[p.segment].push(p); });
  const R=CFG.migration.rates;
  function pick(a){return a[Math.random()*a.length|0];}

  // Segment migrations — Up: healthy/good only, Down: caution/danger only
  const upPool = arr => arr.filter(p=>p.health==='healthy'||p.health==='good');
  const downPool = arr => arr.filter(p=>p.health==='caution'||p.health==='danger');

  const lightUp=upPool(seg.light), casualUp=upPool(seg.casual);
  const powerDown=downPool(seg.power), casualDown=downPool(seg.casual);

  if (Math.random()<R.light_casual&&lightUp.length>5) pick(lightUp).startMigration('casual');
  if (Math.random()<R.casual_power&&casualUp.length>5) pick(casualUp).startMigration('power');
  if (Math.random()<R.power_casual&&powerDown.length>3) pick(powerDown).startMigration('casual');
  if (Math.random()<R.casual_light&&casualDown.length>5) pick(casualDown).startMigration('light');

  // Churn — from all segments (Light most, Casual some, Power rare)
  if (Math.random()<R.churn && seg.light.length>50) pick(seg.light).startMigration('churn');
  if (Math.random()<R.churn*0.4 && seg.casual.length>50) pick(seg.casual).startMigration('churn');
  if (Math.random()<R.churn*0.15 && seg.power.length>30) pick(seg.power).startMigration('churn');
}

// ═══ DRAWING: Tanks (with right holes) ═══
function drawTanks() {
  const defs=[
    {key:'power', label:'Power',  sub:'월 8일+',  types:['확인형','혼합형','탐색형']},
    {key:'casual',label:'Casual', sub:'월 3~7일', types:['확인형','혼합형','탐색형']},
    {key:'light', label:'Light',  sub:'월 1~2일', types:['확인형','혼합형','탐색형']},
  ];
  defs.forEach(d => {
    const t=tanks[d.key];
    ctx.save();

    // Hole positions (left = entry, right = exit)
    const holeTop = t.y + t.h*0.38, holeBot = t.y + t.h*0.62;
    const r = 10;

    // 1) Draw full rounded rect border (clean corners)
    ctx.beginPath();
    ctx.roundRect(t.x, t.y, t.w, t.h, r);
    ctx.strokeStyle='rgba(255,255,255,0.14)'; ctx.lineWidth=1; ctx.stroke();

    // 2) Erase holes by painting over with background color
    const hw = CFG.pipe.width/2 - 1; // erase only inside pipe walls
    const eraseColor = '#0a0a0a';

    // Top pipe gaps
    const topGaps = [];
    if (d.key==='casual') topGaps.push(pipes.pc_down.cx, pipes.cp_up.cx);
    if (d.key==='light')  topGaps.push(pipes.cl_down.cx, pipes.lc_up.cx);
    topGaps.forEach(cx => { ctx.fillStyle=eraseColor; ctx.fillRect(cx-hw, t.y-2, hw*2, 5); });

    // Bottom pipe gaps
    const botGaps = [];
    if (d.key==='power')  botGaps.push(pipes.pc_down.cx, pipes.cp_up.cx);
    if (d.key==='casual') botGaps.push(pipes.cl_down.cx, pipes.lc_up.cx);
    botGaps.forEach(cx => { ctx.fillStyle=eraseColor; ctx.fillRect(cx-hw, t.y+t.h-2, hw*2, 5); });

    // Left hole — no tanks need it (신규유입 goes directly to Light)
    // Left hole for 신규유입 pipe (Light only)
    if (d.key==='light') {
      const nphw = CFG.pipe.width/2;
      ctx.fillStyle=eraseColor; ctx.fillRect(t.x-2, pipes.new_in.cy-nphw, 5, nphw*2);
    }
    // Right hole
    if (d.key==='light') {
      // Light: only 이탈 pipe hole
      const cphw = CFG.pipe.width/2;
      ctx.fillStyle=eraseColor; ctx.fillRect(t.x+t.w-2, pipes.churn_out.cy-cphw, 5, cphw*2);
    } else {
      ctx.fillStyle=eraseColor; ctx.fillRect(t.x+t.w-2, holeTop, 5, holeBot-holeTop);
    }

    // Chevrons — not for Light
    if (d.key !== 'light') {
      const hMid = (holeTop+holeBot)/2;
      // Right hole chevron (exit → churn)
      ctx.beginPath();
      ctx.moveTo(t.x+t.w+2, hMid-5); ctx.lineTo(t.x+t.w+7, hMid); ctx.lineTo(t.x+t.w+2, hMid+5);
      ctx.strokeStyle='rgba(240,75,75,0.18)'; ctx.lineWidth=1; ctx.stroke();
    }

    // Label — white
    ctx.font='bold 12px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.55)';
    ctx.textAlign='left'; ctx.textBaseline='top';
    ctx.fillText(d.label, t.x+12, t.y+9);
    const lw=ctx.measureText(d.label).width;
    ctx.font='10px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.22)';
    ctx.fillText(d.sub, t.x+12+lw+8, t.y+10);

    // Sub-zone dividers
    const zW=t.w/3;
    for(let i=0;i<3;i++){
      if(i>0){ctx.beginPath();ctx.moveTo(t.x+i*zW,t.y+28);ctx.lineTo(t.x+i*zW,t.y+t.h-28);ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;ctx.stroke();}
      const zoneHover = mouseX>=t.x+i*zW && mouseX<=t.x+(i+1)*zW && mouseY>=t.y && mouseY<=t.y+t.h;
      ctx.font='bold 20px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
      ctx.fillStyle=zoneHover?'rgba(255,255,255,1)':'rgba(255,255,255,0.48)'; ctx.textAlign='center';
      ctx.fillText(`TYPE ${i+1}`, t.x+i*zW+zW/2, t.y+t.h/2);
    }
    ctx.restore();
  });
}

function drawHPipe(cy,x1,x2,color,frame,dir) {
  const hw=CFG.pipe.width/2;
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,0.01)';ctx.beginPath();ctx.roundRect(x1,cy-hw,x2-x1,CFG.pipe.width,3);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,0.06)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x1,cy-hw);ctx.lineTo(x2,cy-hw);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x1,cy+hw);ctx.lineTo(x2,cy+hw);ctx.stroke();
  for(let i=0;i<3;i++){
    const ph=((frame*0.004*dir+i/3)%1+1)%1;
    const cx2=x1+(x2-x1)*ph, sz=3;
    ctx.beginPath();
    if(dir>0){ctx.moveTo(cx2-sz,cy-sz);ctx.lineTo(cx2,cy);ctx.lineTo(cx2-sz,cy+sz);}
    else{ctx.moveTo(cx2+sz,cy-sz);ctx.lineTo(cx2,cy);ctx.lineTo(cx2+sz,cy+sz);}
    ctx.strokeStyle=`rgba(${color},${0.35*(1-Math.abs(ph-0.5)*2)})`;ctx.lineWidth=1;ctx.stroke();
  }
  ctx.restore();
}

// ═══ DRAWING: Action Panel (Carousel with slide animation) ═══
let actionSlide = 0;
let actionSlideTimer = 0;
let slideOffset = 0; // animated x offset
let slideTarget = 0;
const actionCards = [
  { tag:'POWER', title:'Power 이탈 조짐', desc:'확인형 비중 12%↑ 감지.\n리텐션 캠페인 필요.', btn:'캠페인 설정' },
  { tag:'CASUAL', title:'Power 전환 기회', desc:'혼합형 이용 패턴 증가.\n온보딩 유도 권장.', btn:'시나리오 설정' },
  { tag:'LIGHT', title:'재방문율 하락', desc:'14일+ 미방문 8%↑ 증가.\n푸시 캠페인 즉시 실행.', btn:'캠페인 실행' },
];

function goToSlide(idx) {
  actionSlide = idx % actionCards.length;
  slideTarget = -actionSlide * actionPanel.w;
  actionSlideTimer = 0;
}

canvas.addEventListener('click', e => {
  const ap=actionPanel;
  if (e.clientX>=ap.x&&e.clientX<=ap.x+ap.w&&e.clientY>=ap.y&&e.clientY<=ap.y+ap.h) {
    goToSlide(actionSlide+1);
  }
});

function wrapText(text, maxW) {
  let line='', lines=[];
  for(const ch of text) {
    if(ch==='\n'){lines.push(line);line='';continue;}
    const test=line+ch;
    if(ctx.measureText(test).width>maxW&&line.length>0){lines.push(line);line=ch;}
    else line=test;
  }
  if(line) lines.push(line);
  return lines;
}

function drawActionPanel(frame) {
  const ap=actionPanel; ctx.save();

  // Auto-slide
  actionSlideTimer++;
  if (actionSlideTimer > 600) goToSlide(actionSlide+1);

  // Animate offset
  slideOffset += (slideTarget - slideOffset) * 0.1;

  // Clip
  ctx.beginPath();ctx.roundRect(ap.x,ap.y,ap.w,ap.h,12);ctx.clip();
  ctx.fillStyle='#0a0a0a';ctx.fillRect(ap.x,ap.y,ap.w,ap.h);

  const pw = ap.w-28;

  // Draw all cards side by side
  actionCards.forEach((card,ci) => {
    const cardX = ap.x + ci*ap.w + slideOffset;
    if (cardX > ap.x+ap.w+10 || cardX < ap.x-ap.w-10) return; // skip off-screen

    const lx=cardX+14;
    let ty=cardX > -9999 ? ap.y+14 : 0; // always same Y
    ty=ap.y+14;

    // Tag
    ctx.font='bold 9px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.18)';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(card.tag,lx,ty);
    ty+=16;

    // Title
    ctx.font='bold 12px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.65)';
    ctx.fillText(card.title,lx,ty);
    ty+=20;

    // Desc
    ctx.font='10px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.28)';
    wrapText(card.desc,pw).forEach(l=>{ctx.fillText(l,lx,ty);ty+=14;});

    // Button
    const btnY=ap.y+ap.h-48;
    ctx.beginPath();ctx.roundRect(lx,btnY,pw,22,6);
    ctx.fillStyle='rgba(255,255,255,0.85)';ctx.fill();
    ctx.font='bold 9px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(card.btn,cardX+ap.w/2,btnY+11);
  });

  ctx.restore(); ctx.save();

  // Border
  ctx.beginPath();ctx.roundRect(ap.x,ap.y,ap.w,ap.h,12);ctx.strokeStyle='rgba(255,255,255,0.07)';ctx.lineWidth=1;ctx.stroke();

  // Section title (fixed, not sliding)
  ctx.font='bold 10px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.35)';ctx.textAlign='center';ctx.textBaseline='top';

  // Indicators
  const indY=ap.y+ap.h-14;
  const indGap=12;
  const totalInd=actionCards.length*indGap;
  let ix=ap.x+ap.w/2-totalInd/2;
  actionCards.forEach((_,i)=>{
    ctx.beginPath();ctx.arc(ix+3,indY,2.5,0,Math.PI*2);
    ctx.fillStyle=i===actionSlide?'rgba(255,255,255,0.6)':'rgba(255,255,255,0.12)';
    ctx.fill(); ix+=indGap;
  });

  // Connector
  ctx.beginPath();ctx.setLineDash([2,3]);
  ctx.moveTo(signalPanel.x+signalPanel.w/2,signalPanel.y+signalPanel.h);
  ctx.lineTo(ap.x+ap.w/2,ap.y);
  ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.lineWidth=1;ctx.stroke();ctx.setLineDash([]);
  ctx.restore();
}

// ═══ DRAWING: Connecting Lines ═══
function drawConnLines() {
  let cnt=0; const mx=160; ctx.save(); ctx.lineWidth=0.5;
  for(const key in grid){if(cnt>=mx)break;const cell=grid[key];if(!cell||cell.length<2)continue;
    for(let i=0;i<cell.length&&cnt<mx;i++)for(let j=i+1;j<cell.length&&cnt<mx;j++){
      const a=cell[i],b=cell[j]; if(a.migrating||b.migrating||a.segment!==b.segment)continue;
      const dx=a.x-b.x,dy=a.y-b.y,dSq=dx*dx+dy*dy;
      if(dSq<169){const al=(1-Math.sqrt(dSq)/13)*0.045;const ch=HEALTH[a.health];
        ctx.strokeStyle=`rgba(${ch.r},${ch.g},${ch.b},${al})`;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();cnt++;}
    }
  } ctx.restore();
}

  function lerp(a, b, t) { return a + t*(b-a); }

  function dayToSvgX(day) {
    if (day <= 1)  return WEEK_XS[0];
    if (day >= 29) return WEEK_XS[4];
    for (let i=0; i<4; i++) {
      if (day >= WEEK_DAYS[i] && day < WEEK_DAYS[i+1]) {
        const t = (day - WEEK_DAYS[i]) / (WEEK_DAYS[i+1] - WEEK_DAYS[i]);
        return lerp(WEEK_XS[i], WEEK_XS[i+1], t);
      }
    }
    return WEEK_XS[4];

  function svgXToDay(svgX) {
    if (svgX <= WEEK_XS[0]) return 1;
    if (svgX >= WEEK_XS[4]) return 30;
    for (let i=0; i<4; i++) {
      if (svgX >= WEEK_XS[i] && svgX < WEEK_XS[i+1]) {
        const t = (svgX - WEEK_XS[i]) / (WEEK_XS[i+1] - WEEK_XS[i]);
        return Math.round(lerp(WEEK_DAYS[i], WEEK_DAYS[i+1], t));
      }

  }

      if (day >= anchors[i].day && day < anchors[i+1].day) {
        const t = (day - anchors[i].day) / (anchors[i+1].day - anchors[i].day);

  function slotNumber(el, newText, newVal, oldVal) {

    {year:'2020',   x:417,  mau:446, dau:112, key:true,  appLabel:'App 3.0'},
    {year:'2021',   x:586,  mau:523, dau:132, key:false},
    {year:'2022',   x:754,  mau:589, dau:143, key:false},
    {year:'2023',   x:923,  mau:639, dau:150, key:false},
    {year:'2024',   x:1091, mau:715, dau:165, key:false},
    {year:'2025.6', x:1260, mau:732, dau:170, key:true},
  ];
  const yScaleYearly = v => 20 + (1 - v / 800) * 360;

  function svgEl(tag)       { return document.createElementNS('http://www.w3.org/2000/svg', tag); }
  function setA(el, attrs)  { Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v)); }
  function mkLine(x1,y1,x2,y2,stroke,opts={}) {
    const l=svgEl('line');
    setA(l,{x1,y1:y1.toFixed?y1.toFixed(1):y1,x2,y2:y2.toFixed?y2.toFixed(1):y2,stroke,'stroke-width':opts.sw||1,...(opts.dash?{'stroke-dasharray':opts.dash}:{})});
    return l;
  }
  function mkText(x,y,txt,opts={}) {
    const t=svgEl('text');
    setA(t,{x,y:y.toFixed?y.toFixed(1):y,'text-anchor':opts.anchor||'middle',
      fill:opts.fill||'rgba(255,255,255,0.35)',
      'font-family':"'SF Pro Display',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif",
      'font-size':opts.size||'11','font-weight':opts.bold?'700':'400'});
    t.textContent=txt; return t;
  }

  function renderYearlyChart(svg) {
    const g = svg.querySelector('#yearlyLayer');
    g.innerHTML = '';

    const FF = "'SF Pro Display',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif";
    const GREEN = '#50d278';

    // 격자선
    [200,400,600,800].forEach(v => {
      const y = yScaleYearly(v);
      g.appendChild(mkLine(80,y,1260,y,'rgba(255,255,255,0.04)'));
    });

    // 수직 점선 (key years)
    YEARLY_DATA.filter(d=>d.key).forEach(d => {
      g.appendChild(mkLine(d.x,20,d.x,400,'rgba(255,255,255,0.15)',{dash:'3,3'}));
    });

    // catmull-rom 경로 생성
    function buildPath(pts) {
      let d=`M${pts[0][0]},${pts[0][1].toFixed(1)}`;
      for(let i=0;i<pts.length-1;i++){
        const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
        const cp1x=p1[0]+(p2[0]-p0[0])*0.25, cp1y=p1[1]+(p2[1]-p0[1])*0.25;
        const cp2x=p2[0]-(p3[0]-p1[0])*0.25, cp2y=p2[1]-(p3[1]-p1[1])*0.25;
        d+=` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2[0]},${p2[1].toFixed(1)}`;
      }
      return d;
    }

    // MAU 선
    const mauPath=svgEl('path');
    setA(mauPath,{d:buildPath(YEARLY_DATA.map(d=>[d.x,yScaleYearly(d.mau)])),fill:'none',stroke:'rgba(255,255,255,0.4)','stroke-width':'2'});
    g.appendChild(mauPath);

    // DAU 선
    const dauPath=svgEl('path');
    setA(dauPath,{d:buildPath(YEARLY_DATA.map(d=>[d.x,yScaleYearly(d.dau)])),fill:'none',stroke:'rgba(255,255,255,0.25)','stroke-width':'2'});
    g.appendChild(dauPath);

    // MAU 점 + 레이블
    YEARLY_DATA.forEach((d,i) => {
      const y=yScaleYearly(d.mau);
      const isKey=d.key, r=isKey?7:5;
      const c=svgEl('circle');
      setA(c,{cx:d.x,cy:y.toFixed(1),r,fill:isKey?GREEN:'rgba(255,255,255,0)',stroke:isKey?GREEN:'rgba(255,255,255,0.35)','stroke-width':'2'});
      g.appendChild(c);
      const lbl=mkText(d.x,y-14,d.mau,{fill:isKey?GREEN:'rgba(255,255,255,0.45)',size:isKey?'15':'11',bold:isKey,anchor:'middle'});
      g.appendChild(lbl);
    });

    // DAU 사각형 마커 + 레이블
    YEARLY_DATA.forEach((d,i) => {
      const y=yScaleYearly(d.dau);
      const isKey=d.key, sz=isKey?11:8;
      const rect=svgEl('rect');
      setA(rect,{x:d.x-sz/2,y:(y-sz/2).toFixed(1),width:sz,height:sz,
        fill:isKey?GREEN:'rgba(255,255,255,0)',stroke:isKey?GREEN:'rgba(255,255,255,0.35)','stroke-width':'2'});
      g.appendChild(rect);
      const lbl=mkText(d.x,y+20,d.dau,{fill:isKey?GREEN:'rgba(255,255,255,0.45)',size:isKey?'15':'11',bold:isKey,anchor:'middle'});
      g.appendChild(lbl);
    });

    // X축 연도 레이블
    YEARLY_DATA.forEach(d => {
      g.appendChild(mkText(d.x,405,d.year,{fill:d.key?GREEN:'rgba(255,255,255,0.3)',size:d.key?'12':'11',bold:d.key,anchor:'middle'}));
      if(d.appLabel) g.appendChild(mkText(d.x,418,d.appLabel,{fill:GREEN,size:'10',bold:true,anchor:'middle'}));
    });

    // MAU / DAU 레이블 (좌측)
    const mauMid = YEARLY_DATA[3];
    g.appendChild(mkText(55,yScaleYearly(mauMid.mau),'MAU',{fill:'rgba(255,255,255,0.3)',size:'14',bold:true,anchor:'end'}));
    const dauMid = YEARLY_DATA[3];
    g.appendChild(mkText(55,yScaleYearly(dauMid.dau),'DAU',{fill:'rgba(255,255,255,0.3)',size:'14',bold:true,anchor:'end'}));
  }

  function refreshYearly() {
    const svg=detailOverlay.querySelector('#chartSvg');
    buildYearlyPts(0); // yearlyYDyn 갱신
    wPts=buildYearlyPts(0); dPts=buildYearlyPts(1);
    morphProg=0; setMorph(0);
    renderXLabels(svg,getConfig()); renderDots(svg,getConfig());
    refreshYearlyDynAxis(svg);
    lastSnap=-1;
  }

  function switchChartMode(mode) {
    chartMode = mode;
    if (mode === 'yearly') yearlyRangeStart = 84; // 탭 클릭 시 초기화
    const cfg = getConfig();
    const tabW = 'background:#fff;color:#0a0a0a;border:none;border-radius:6px;padding:5px 14px;font:600 12px/1 "SF Pro Display",-apple-system,sans-serif;cursor:pointer;transition:all 0.2s;';
    const tabI = 'background:transparent;color:rgba(255,255,255,0.4);border:none;border-radius:6px;padding:5px 14px;font:600 12px/1 "SF Pro Display",-apple-system,sans-serif;cursor:pointer;transition:all 0.2s;';
    document.getElementById('tabWeekly').style.cssText  = mode==='weekly'  ? tabW : tabI;
    document.getElementById('tabMonthly').style.cssText = mode==='monthly' ? tabW : tabI;
    document.getElementById('tabYearly').style.cssText  = mode==='yearly'  ? tabW : tabI;

    applyConfig(cfg);

    const svg = detailOverlay.querySelector('#chartSvg');
    svg.querySelector('#activeDotCur').setAttribute('r','0');
    svg.querySelector('#activeDotPrev').setAttribute('r','0');
    crosshair.style.display = 'none';
    tooltip.style.display = 'none';

    const isYearly = mode === 'yearly';
    svg.querySelector('#staticYAxis').style.display  = isYearly ? 'none' : '';
    svg.querySelector('#dynamicYAxis').style.display = 'none';
    svg.querySelector('#yearlyLayer').style.display  = isYearly ? '' : 'none';
    // 연간: 메인 차트 path 비움, 일반 dot/xLabel 숨김
    if (isYearly) {
      svg.querySelector('#chartPathCur').setAttribute('d','');
      svg.querySelector('#chartPathPrev').setAttribute('d','');
      svg.querySelectorAll('.wdot-cur,.wdot-prev').forEach(d=>d.remove());
      svg.querySelector('#xLabels').innerHTML='';
      renderYearlyChart(svg);
      svg.style.cursor = 'crosshair';
      lastSnap = -1;
      return;
    }
    svg.style.cursor = 'crosshair';

    if (mode === 'weekly') {
      wPts = buildPts(0); dPts = buildPts(1);
    } else {
      wPts = buildMonthlyPts(0); dPts = buildMonthlyPts(1);
    }
    renderXLabels(svg, cfg);
    renderDots(svg, cfg);
    morphProg = 0; setMorph(0);
    lastSnap = -1;
  }

  // ── 차트 모핑 ──
  function yFor(v) { return 20 + (850 - v) * 1.2; }

  const ANCHOR_DAYS = [1, 8, 15, 22, 29];

  // 앵커 사이 중간에서 최대, 앵커에서 0인 envelope
  function noiseEnv(day) {
    for (let i = 0; i < ANCHOR_DAYS.length-1; i++) {
      if (day >= ANCHOR_DAYS[i] && day <= ANCHOR_DAYS[i+1]) {
        const t = (day - ANCHOR_DAYS[i]) / (ANCHOR_DAYS[i+1] - ANCHOR_DAYS[i]);
        return Math.sin(t * Math.PI);
      }
    }
    return 0;
  }

  // 구간별 방향 (완만한 단일 호)
  const segDir = [[1,-0.6],[- 0.5,0.7],[0.8,-0.4],[-0.6,0.5]];

  function buildPts(noiseAmp) {
    const cur = [], prev = [];
    for (let day = 1; day <= 30; day++) {
      const x = dayToSvgX(day);
      const vCur  = interpDay(day, 'cur');
      const vPrev = interpDay(day, 'prev');
      const env = noiseEnv(day);
      // 구간 인덱스
      let si = 0;
      for (let i=0;i<ANCHOR_DAYS.length-1;i++) if(day>=ANCHOR_DAYS[i]&&day<=ANCHOR_DAYS[i+1]) si=i;
      const nC = env * 6 * segDir[si][0] * noiseAmp;
      const nP = env * 5 * segDir[si][1] * noiseAmp;
      cur.push({x, y: yFor(vCur)  + nC * 1.2});
      prev.push({x, y: yFor(vPrev) + nP * 1.2});
    }
    return {cur, prev};
  }

  function catmull(pts) {
    let d = `M${pts[0].x},${pts[0].y.toFixed(1)}`;
    for (let i = 0; i < pts.length-1; i++) {
      const p0 = pts[Math.max(0,i-1)], p1 = pts[i];
      const p2 = pts[i+1], p3 = pts[Math.min(pts.length-1,i+2)];
      const cp1x = p1.x + (p2.x-p0.x)*0.35;
      const cp1y = p1.y + (p2.y-p0.y)*0.35;
      const cp2x = p2.x - (p3.x-p1.x)*0.35;
      const cp2y = p2.y - (p3.y-p1.y)*0.35;
      d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x},${p2.y.toFixed(1)}`;
    }
    return d;
  }

  function interpPts(a, b, t) {
    return a.map((p,i) => ({x: p.x, y: p.y + (b[i].y - p.y)*t}));
  }

  let wPts = buildPts(0);
  let dPts = buildPts(1);
  let morphProg = 0, morphAnim = null;

  function setMorph(t) {
    morphProg = t;
    const svg = detailOverlay.querySelector('#chartSvg');
    if (!svg) return;
    const eased = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    svg.querySelector('#chartPathCur').setAttribute('d',  catmull(interpPts(wPts.cur,  dPts.cur,  eased)));
    svg.querySelector('#chartPathPrev').setAttribute('d', catmull(interpPts(wPts.prev, dPts.prev, eased)));
  }

  function animateMorph(target, dur) {
    if (morphAnim) cancelAnimationFrame(morphAnim);
    const from = morphProg, t0 = performance.now();
    function step(now) {
      const p = Math.min(1, (now-t0)/dur);
      setMorph(from + (target-from)*p);
      if (p < 1) morphAnim = requestAnimationFrame(step);
    }
    morphAnim = requestAnimationFrame(step);
  }

  function initChart() {
    const svg = detailOverlay.querySelector('#chartSvg');
    if (!svg) return;

    // 초기 라벨/점 렌더링 (주간)
    renderXLabels(svg, getConfig());
    renderDots(svg, getConfig());
    setMorph(0);
    svg.appendChild(crosshair);

    const activeDotCur  = svg.querySelector('#activeDotCur');
    const activeDotPrev = svg.querySelector('#activeDotPrev');

    let dotShowTimer = null;
    svg.addEventListener('mouseenter', () => {
      if (chartMode === 'yearly') return;
      animateMorph(1, 250);
      svg.querySelectorAll('.wdot-cur').forEach(d => d.setAttribute('r','0'));
      svg.querySelectorAll('.wdot-prev').forEach(d => d.setAttribute('r','0'));
      dotShowTimer = setTimeout(() => {
        activeDotCur.setAttribute('r','5');
        activeDotPrev.setAttribute('r','4');
      }, 250);
    });
    svg.addEventListener('mouseleave', () => {
      if (chartMode === 'yearly') return;
      clearTimeout(dotShowTimer);
      animateMorph(0, 200);
      svg.querySelectorAll('.wdot-cur').forEach(d => d.setAttribute('r','5'));
      svg.querySelectorAll('.wdot-prev').forEach(d => d.setAttribute('r','4'));
      activeDotCur.setAttribute('r','0');
      activeDotPrev.setAttribute('r','0');
    });

    function onMove(e) {
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const rect = svg.getBoundingClientRect();
      const svgX = (clientX - rect.left) / rect.width * 1300;
      const eased = morphProg < 0.5 ? 2*morphProg*morphProg : -1+(4-2*morphProg)*morphProg;
      const pxPerSVG = rect.width / 1300;

      let sx, curV, prevV, dateLabel, idx;

      if (chartMode === 'yearly') {
        // 가장 가까운 연도 스냅
        let closest=0, minD=Infinity;
        YEARLY_DATA.forEach((d,i)=>{ const dist=Math.abs(svgX-d.x); if(dist<minD){minD=dist;closest=i;} });
        const yd = YEARLY_DATA[closest];
        if (closest !== lastSnap) { tick(); lastSnap = closest; }
        sx = yd.x;
        // 연간 모드: activeDot을 MAU 점 위치로
        const mauY = yScaleYearly(yd.mau);
        const dauY = yScaleYearly(yd.dau);
        activeDotCur.setAttribute('cx', sx); activeDotCur.setAttribute('cy', mauY.toFixed(1)); activeDotCur.setAttribute('r','6');
        activeDotPrev.setAttribute('cx', sx); activeDotPrev.setAttribute('cy', dauY.toFixed(1)); activeDotPrev.setAttribute('r','5');
        crosshair.setAttribute('x1',sx); crosshair.setAttribute('x2',sx); crosshair.style.display='';
        tooltip.querySelector('#tt-date').textContent = yd.year;
        slotNumber(tooltip.querySelector('#tt-cur'),  yd.mau+'만', yd.mau, lastTTCur);
        slotNumber(tooltip.querySelector('#tt-prev'), yd.dau+'만', yd.dau, lastTTPrev);
        lastTTCur=yd.mau; lastTTPrev=yd.dau;
        const tipW=tooltip.offsetWidth||200;
        const pxPerSVG=svg.getBoundingClientRect().width/1300;
        let tx=svg.getBoundingClientRect().left+sx*pxPerSVG-tipW/2;
        tx=Math.max(8,Math.min(tx,window.innerWidth-tipW-8));
        tooltip.style.left=tx+'px'; tooltip.style.top=Math.max(8,svg.getBoundingClientRect().top+20*pxPerSVG-100)+'px';
        tooltip.style.display='';
        return;
      } else if (chartMode === 'monthly') {
        const visIdx = Math.round(Math.max(0,Math.min(11,(svgX-80)/(1260-80)*11)));
        if (visIdx !== lastSnap) { tick(); lastSnap = visIdx; }
        sx = MONTHLY_XS_12[visIdx];
        curV  = monthlyAnchors[visIdx].cur;
        prevV = monthlyAnchors[visIdx].prev;
        dateLabel = `2025년 ${MONTHLY_LABELS_12[visIdx]}`;
        idx = visIdx;
      } else {
        const day = svgXToDay(svgX);
        if (day !== lastSnap) { tick(); lastSnap = day; }
        sx = dayToSvgX(day);
        curV  = Math.round(interpDay(day, 'cur'));
        prevV = Math.round(interpDay(day, 'prev'));
        dateLabel = `4월 ${day}일 (${weekLabel(day)})`;
        idx = day - 1;
      }

      crosshair.setAttribute('x1', sx); crosshair.setAttribute('x2', sx);
      crosshair.style.display = '';

      const mYCur  = wPts.cur[idx]  ? wPts.cur[idx].y  + (dPts.cur[idx].y  - wPts.cur[idx].y)  * eased : 0;
      const mYPrev = wPts.prev[idx] ? wPts.prev[idx].y + (dPts.prev[idx].y - wPts.prev[idx].y) * eased : 0;
      activeDotCur.setAttribute('cx', sx);
      activeDotCur.setAttribute('cy', mYCur);
      activeDotPrev.setAttribute('cx', sx);
      activeDotPrev.setAttribute('cy', mYPrev);

      tooltip.querySelector('#tt-date').textContent = dateLabel;
      slotNumber(tooltip.querySelector('#tt-cur'),  curV  + '만', curV,  lastTTCur);
      slotNumber(tooltip.querySelector('#tt-prev'), prevV + '만', prevV, lastTTPrev);
      lastTTCur = curV; lastTTPrev = prevV;

      const tipW = tooltip.offsetWidth || 200;
      let tx = rect.left + sx * pxPerSVG - tipW/2;
      tx = Math.max(8, Math.min(tx, window.innerWidth - tipW - 8));
      const ty = rect.top + 20 * pxPerSVG - 100;
      tooltip.style.left = tx + 'px';
      tooltip.style.top  = Math.max(8, ty) + 'px';
      tooltip.style.display = '';
    }

    function onLeave() {
      if (panDragMoved) return;
      crosshair.style.display='none';
      tooltip.style.display='none'; lastSnap=-1;
    }

    // ── 월간 드래그-패닝 ──
    let panActive = false, panMoved = false;
    let panDragMoved = false;
    let panStartX = 0, panStartRangeStart = 0, panStartRangeEnd = 0;

    // ── [비활성화됨] 연간 드래그: 오른쪽으로 당길수록 왼쪽 경계가 2018년으로 이동 ──
    // 복원하려면: 'yearly_DISABLED' → 'yearly' 로 변경, buildYearlyPts/refreshYearly 재연결
    svg.addEventListener('mousedown', e => {
      if (chartMode !== 'yearly_DISABLED') return;
      panActive = true; panMoved = false; panDragMoved = false;
      panStartX = e.clientX;
      panStartRangeStart = yearlyRangeStart;
      svg.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', e => {
      if (!panActive || chartMode !== 'yearly_DISABLED') return;
      const dx = e.clientX - panStartX;
      if (Math.abs(dx) > 5) { panMoved = true; panDragMoved = true; }
      if (!panMoved) return;
      const rect = svg.getBoundingClientRect();
      // 오른쪽으로 당기면(dx>0) 왼쪽 경계가 뒤로 이동 → 더 많은 역사
      const monthsPerPx = (yearlyRangeEnd - panStartRangeStart) / (rect.width * 0.85);
      const delta = Math.round(-dx * monthsPerPx);
      yearlyRangeStart = Math.max(0, Math.min(yearlyRangeEnd - 1, panStartRangeStart + delta));
      crosshair.style.display = 'none'; tooltip.style.display = 'none';
      activeDotCur.setAttribute('r','0'); activeDotPrev.setAttribute('r','0');
      refreshYearly();
    });
    window.addEventListener('mouseup', () => {
      if (!panActive) return;
      panActive = false;
      svg.style.cursor = chartMode === 'yearly' ? 'grab' : 'crosshair';
      setTimeout(() => { panDragMoved = false; }, 50);
    });

    // ── 스크롤 줌 (연간) ──
    svg.addEventListener('wheel', e => {
      if (chartMode !== 'yearly_DISABLED') return;
      e.preventDefault();
      const span = yearlyRangeEnd - yearlyRangeStart;
      const factor = e.deltaY > 0 ? 1.18 : 0.85;
      const newSpan = Math.max(2, Math.min(MAU_TOTAL - 1, Math.round(span * factor)));
      yearlyRangeStart = Math.max(0, yearlyRangeEnd - newSpan);
      refreshYearly();
    }, {passive: false});

    svg.addEventListener('mousemove', e => { if (!panDragMoved) onMove(e); });
    svg.addEventListener('mouseleave', onLeave);
    svg.addEventListener('touchmove', onMove, {passive:true});
    svg.addEventListener('touchend', onLeave);
    svg.style.cursor='crosshair';
  }

  window._chartInitDone = false;
  detailOverlay._initChart = function() {
    if (!window._chartInitDone) { initChart(); window._chartInitDone=true; }
  };
  window.switchChartMode = switchChartMode;
})();

  });

    const camCanvas = document.createElement('canvas');
    const _dpr = window.devicePixelRatio || 1;
    camCanvas.width = 240 * _dpr; camCanvas.height = 180 * _dpr;
    camCanvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border-radius:8px;pointer-events:none;';
    const camCtx = camCanvas.getContext('2d');
    camCtx.setTransform(_dpr, 0, 0, _dpr, 0, 0);

    // Close button (top-right)
    const closeBtn = document.createElement('div');
    closeBtn.style.cssText = 'position:absolute;top:6px;right:6px;width:24px;height:24px;border-radius:50%;background:rgba(0,0,0,0.5);cursor:pointer;z-index:102;display:flex;align-items:center;justify-content:center;transition:background 0.2s;';
    closeBtn.innerHTML = '<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"><line x1="2" y1="2" x2="10" y2="10"/><line x1="10" y1="2" x2="2" y2="10"/></svg>';
    closeBtn.addEventListener('mouseenter', ()=> closeBtn.style.background='rgba(0,0,0,0.7)');
    closeBtn.addEventListener('mouseleave', ()=> closeBtn.style.background='rgba(0,0,0,0.5)');
    let camActive = false;
    closeBtn.addEventListener('click', e => {
      e.stopPropagation();
      camWrap.style.display = 'none';
      camBtn.style.display = 'flex';
      camActive = false;
      camStarted = false;
      // 카메라 스트림 완전 중지 → OS 카메라 표시 사라짐
      if (cam) { try { cam.stop(); } catch(_){} cam = null; }
      if (video.srcObject) { video.srcObject.getTracks().forEach(t => t.stop()); video.srcObject = null; }
      handActive = false; fingerTips = []; fingerTipsRaw = [];
      smoothTips = []; faceLandmarks = null;
      mouseX = -999; mouseY = -999;
    });

    // Resize handle
    const resizeHandle = document.createElement('div');
    resizeHandle.style.cssText = 'position:absolute;bottom:0;right:0;width:20px;height:20px;cursor:nwse-resize;z-index:101;';
    resizeHandle.innerHTML = '<svg width="20" height="20" viewBox="0 0 20 20"><line x1="14" y1="6" x2="6" y2="14" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><line x1="14" y1="10" x2="10" y2="14" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/><line x1="14" y1="14" x2="14" y2="14" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/></svg>';

    camWrap.appendChild(video);
    camWrap.appendChild(camCanvas);
    camWrap.appendChild(closeBtn);
    camWrap.appendChild(resizeHandle);
    document.body.appendChild(camWrap);

    // Camera button click → show cam view
    let cam;
    camBtn.addEventListener('click', async () => {
      camWrap.style.display = 'block';
      camBtn.style.display = 'none';
      camActive = true;
      if (!camStarted) {
        camStarted = true;
        cam = new Camera(video, {
          onFrame: async () => { if (!camActive) return; await hands.send({image: video}); await faceMesh.send({image: video}); },
          width: 320, height: 240
        });
        await cam.start();
      }
    });

    function setCamSize(s) {
      camSize = Math.max(160, Math.min(480, s));
      const dpr = window.devicePixelRatio || 1;
      camWrap.style.width = camSize + 'px';
      camWrap.style.height = (camSize * 0.75) + 'px';
      camCanvas.width = camSize * dpr;
      camCanvas.height = camSize * 0.75 * dpr;
      camCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    // Drag to move
    let camDrag = false, camOX=0, camOY=0;
    camWrap.addEventListener('mousedown', e => {
      if (e.target === resizeHandle || resizeHandle.contains(e.target)) return;
      e.stopPropagation();
      camDrag = true;
      camWrap.style.cursor = 'grabbing';
      // Fix position before removing transform
      const rect = camWrap.getBoundingClientRect();
      camWrap.style.top = rect.top + 'px';
      camWrap.style.left = rect.left + 'px';
      camWrap.style.transform = 'none';
      camOX = e.clientX - rect.left;
      camOY = e.clientY - rect.top;
    });
    window.addEventListener('mousemove', e => {
      if (!camDrag && !camResize) return;
      if (camDrag) {
        camWrap.style.left = (e.clientX - camOX) + 'px';
        camWrap.style.top = (e.clientY - camOY) + 'px';
      }
      if (camResize) {
        const rect = camWrap.getBoundingClientRect();
        setCamSize(e.clientX - rect.left);
      }
    });
    window.addEventListener('mouseup', () => {
      if (camDrag) { camDrag = false; camWrap.style.cursor = 'grab'; }
      camResize = false;
    });

    // Resize by handle drag
    let camResize = false;
    resizeHandle.addEventListener('mousedown', e => {
      e.stopPropagation();
      camResize = true;
      camWrap.style.transform = 'none';
    });

    const hands = new Hands({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${f}`});
    hands.setOptions({ maxNumHands:1, modelComplexity:1, minDetectionConfidence:0.75, minTrackingConfidence:0.5 });

    // Face Mesh for AR effects
    const faceMesh = new FaceMesh({locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/${f}`});
    faceMesh.setOptions({ maxNumFaces:3, refineLandmarks:true, minDetectionConfidence:0.5, minTrackingConfidence:0.5 });
    faceMesh.onResults(r => {
      faceLandmarks = (r.multiFaceLandmarks && r.multiFaceLandmarks.length > 0) ? r.multiFaceLandmarks : null;
    });

    hands.onResults(results => {
      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        const lm = results.multiHandLandmarks[0];
        const palm = lm[9]; // middle finger base ≈ palm center
        const rawHX = (1 - palm.x) * W;
        const rawHY = palm.y * H;
        handX = handX < 0 ? rawHX : handX + (rawHX - handX) * 0.15;
        handY = handY < 0 ? rawHY : handY + (rawHY - handY) * 0.15;
        handActive = true;
        // Track hand velocity
        if (prevHandX > 0) {
          handVX = (handX - prevHandX) * 0.5 + handVX * 0.5; // smooth
          handVY = (handY - prevHandY) * 0.5 + handVY * 0.5;
        }
        prevHandX = handX; prevHandY = handY;
        // fingertip landmarks: thumb=4, index=8, middle=12, ring=16, pinky=20
        // Detect extended fingers
        const wrist = lm[0];
        const dist2 = (a,b) => (a.x-b.x)**2 + (a.y-b.y)**2;
        const fingerDefs = [{tip:8,pip:6},{tip:12,pip:10},{tip:16,pip:14},{tip:20,pip:18}];
        fingerTips = [];
        fingerTipsRaw = [];
        // Check 4 fingers (no thumb) — strict: tip must be significantly farther than PIP
        for (const f of fingerDefs) {
          const tipDist = dist2(lm[f.tip], wrist);
          const pipDist = dist2(lm[f.pip], wrist);
          if (tipDist > pipDist * 1.6) { // 60% farther = clearly extended
            fingerTips.push({ x:(1-lm[f.tip].x)*W, y:lm[f.tip].y*H });
            fingerTipsRaw.push({ x:lm[f.tip].x, y:lm[f.tip].y });
          }
        }
        // Include thumb only when 3+ other fingers are extended (full spread)
        if (fingerTips.length >= 3) {
          const thumbExt = dist2(lm[4], wrist) > dist2(lm[3], wrist) * 1.4;
          if (thumbExt) {
            fingerTips.push({ x:(1-lm[4].x)*W, y:lm[4].y*H });
            fingerTipsRaw.push({ x:lm[4].x, y:lm[4].y });
          }
        }
        // calc spread: avg distance between all fingertip pairs
        if (fingerTips.length >= 2) {
          let totalDist = 0, pairs = 0;
          for (let i=0; i<fingerTips.length; i++) {
            for (let j=i+1; j<fingerTips.length; j++) {
              const dx=fingerTips[i].x-fingerTips[j].x, dy=fingerTips[i].y-fingerTips[j].y;
              totalDist += Math.sqrt(dx*dx+dy*dy);
              pairs++;
            }
          }
          const avgPairDist = totalDist / pairs;
          fingerSpread = Math.min(1, Math.max(0, (avgPairDist - 60) / 200));
        } else if (fingerTips.length === 1) {
          fingerSpread = 0.5; // single finger = active
        } else {
          fingerSpread = 0; // no fingers = closed
        }
        // detect sudden open: was closed, now spread
        if (fingerSpread > 0.5 && prevSpread < 0.15) burstFrame = 15;
        // Chaos trigger: was swirling (energy built up) + fingers spread open
        if (fingerTips.length >= 4 && swirlEnergy > 0.2) {
          chaosActive = 120; // 2 seconds of chaos
          swirlEnergy = 0; // consume energy
        }
        prevSpread = fingerSpread;

        // Finger nod: index finger pointing at T1, nod forward twice
        if (fingerTips.length === 1 && !detailPageActive) {
          const tipX = (1 - (lm[8].x+lm[5].x)/2) * W, tipY = ((lm[8].y+lm[5].y)/2) * H;
          let inT1 = false;
          for (const seg of ['power','casual','light']) {
            const zone = getSubZone(seg, 1);
            if (zone && tipX >= zone.x && tipX <= zone.x+zone.w && tipY >= zone.y && tipY <= zone.y+zone.h) {
              inT1 = true; break;
            }
          }
          if (inT1) tapInZoneFrames++; else if (tapInZoneFrames > 0) tapInZoneFrames--;

          if (tapInZoneFrames > 10) {
            const rawY = lm[8].y;
            tapTipYs.push(rawY);
            if (tapTipYs.length > 15) tapTipYs.shift();

            if (tapTipYs.length >= 10) {
              // Calculate variance (how much the finger is wiggling)
              const avg = tapTipYs.reduce((s,v) => s+v, 0) / tapTipYs.length;
              const variance = tapTipYs.reduce((s,v) => s + (v-avg)**2, 0) / tapTipYs.length;
              // Sustained shake: variance above threshold = intentional wiggle
              // Normal tremor ~0.000001, intentional shake ~0.00005+
              if (variance > 0.00001) {
                tapTargetZone = 't1';
                showDetailPage();
                tapTipYs = []; tapInZoneFrames = 0;
              }
            }
          }
        } else if (!detailPageActive) {
          if (tapInZoneFrames > 0) tapInZoneFrames--;
          if (tapInZoneFrames <= 0) { tapTipYs = []; }
        }

        // Back gesture: palm swipe left while on detail page
        if (detailPageActive && fingerTips.length >= 3 && handVX < -8) {
          hideDetailPage();
        }

        // Track single finger for swirl detection
        if (fingerTips.length === 1) {
          fingerHistory.push({ x:fingerTips[0].x, y:fingerTips[0].y });
          if (fingerHistory.length > 12) fingerHistory.shift();
          // Detect rotation: sum cross products of consecutive displacement vectors
          if (fingerHistory.length >= 5) {
            let crossSum = 0;
            for (let i=2; i<fingerHistory.length; i++) {
              const ax=fingerHistory[i-1].x-fingerHistory[i-2].x, ay=fingerHistory[i-1].y-fingerHistory[i-2].y;
              const bx=fingerHistory[i].x-fingerHistory[i-1].x, by=fingerHistory[i].y-fingerHistory[i-1].y;
              crossSum += ax*by - ay*bx;
            }
            swirlForce = Math.max(-1, Math.min(1, crossSum / 100));
            // Accumulate energy with sustained rotation (slower buildup)
            swirlEnergy = Math.min(1, swirlEnergy + Math.abs(swirlForce) * 0.01);
          }
        } else {
          fingerHistory = [];
          swirlForce *= 0.97;
          swirlEnergy *= 0.995; // very slow decay — chaos persists
        }
        // Smooth fingertip positions
        // Heavy smoothing — double pass for stability
        const lerp1 = 0.15; // primary smoothing (lower = smoother)
        if (smoothTips.length === fingerTips.length) {
          for (let i=0; i<fingerTips.length; i++) {
            // Exponential moving average
            smoothTips[i].x += (fingerTips[i].x - smoothTips[i].x) * lerp1;
            smoothTips[i].y += (fingerTips[i].y - smoothTips[i].y) * lerp1;
            // Snap suppression: ignore micro-jitter under 2px
            if (Math.abs(fingerTips[i].x - smoothTips[i].x) < 2) smoothTips[i].x = smoothTips[i].x;
            if (Math.abs(fingerTips[i].y - smoothTips[i].y) < 2) smoothTips[i].y = smoothTips[i].y;
          }
        } else {
          smoothTips = fingerTips.map(ft => ({x:ft.x, y:ft.y}));
        }
        fingerTips = smoothTips.map(ft => ({x:ft.x, y:ft.y}));
        handLostFrames = 0;

        if (!drag.active && fingerSpread > 0.4) { mouseX = handX; mouseY = handY; }
        else if (!drag.active && handActive) { mouseX = -999; mouseY = -999; }
      } else {
        handLostFrames++;
        // Keep showing for a few frames to prevent flicker
        if (handLostFrames > 5) {
          handActive = false;
          fingerTips = [];
          fingerTipsRaw = [];
          smoothTips = [];
          handVX = 0; handVY = 0;
          prevHandX = -999; prevHandY = -999;
        }
      }
      // Draw camera overlay
      camCtx.clearRect(0, 0, camSize, camSize*0.75);
      const cw=camSize, ch=camSize*0.75;

      // AR: Sunglasses + Beanie (draw first, below guides) — up to 3 faces
      if (faceLandmarks) {
       for (const fl of faceLandmarks) {
        const fxAR = (i) => (1 - fl[i].x) * cw;
        const fyAR = (i) => fl[i].y * ch;

        const leOuter = {x:fxAR(33),y:fyAR(33)}, leInner = {x:fxAR(133),y:fyAR(133)};
        const reOuter = {x:fxAR(362),y:fyAR(362)}, reInner = {x:fxAR(263),y:fyAR(263)};

        const leCx = (leOuter.x + leInner.x)/2, leCy = (leOuter.y + leInner.y)/2;
        const reCx = (reOuter.x + reInner.x)/2, reCy = (reOuter.y + reInner.y)/2;
        const angle = Math.atan2(reCy - leCy, reCx - leCx);
        const eyeDist = Math.sqrt((reCx-leCx)**2 + (reCy-leCy)**2);
        const lensR = eyeDist * 0.42;
        const gap = eyeDist * 0.06;

        // Eyebrows first (below sunglasses)
        const browY = (leCy + reCy)/2 - lensR*1.15;
        camCtx.save();
        camCtx.translate((leCx+reCx)/2, browY);
        camCtx.rotate(angle);
        camCtx.fillStyle = 'rgb(30,30,30)';
        camCtx.beginPath();
        camCtx.ellipse(-eyeDist/2, 0, lensR*0.85, lensR*0.18, 0, 0, Math.PI*2);
        camCtx.fill();
        camCtx.beginPath();
        camCtx.ellipse(eyeDist/2, 0, lensR*0.85, lensR*0.18, 0, 0, Math.PI*2);
        camCtx.fill();
        camCtx.restore();

        // Sunglasses on top
        camCtx.save();
        camCtx.translate((leCx+reCx)/2, (leCy+reCy)/2);
        camCtx.rotate(angle);
        camCtx.fillStyle = 'rgba(15,15,15,0.8)';
        camCtx.strokeStyle = 'rgba(200,200,200,0.7)';
        camCtx.lineWidth = 1.2;
        camCtx.beginPath();
        camCtx.ellipse(-eyeDist/2, lensR*0.1, lensR, lensR*0.9, 0, 0, Math.PI*2);
        camCtx.fill(); camCtx.stroke();
        camCtx.beginPath();
        camCtx.ellipse(eyeDist/2, lensR*0.1, lensR, lensR*0.9, 0, 0, Math.PI*2);
        camCtx.fill(); camCtx.stroke();
        camCtx.beginPath();
        camCtx.moveTo(-gap, 0);
        camCtx.quadraticCurveTo(0, -lensR*0.25, gap, 0);
        camCtx.stroke();
        camCtx.restore();

        // White mask (nose to chin)
        const noseY = fyAR(4); // nose tip
        const chinMaskY = fyAR(152);
        const jawL = {x:fxAR(132), y:fyAR(132)};
        const jawR = {x:fxAR(361), y:fyAR(361)};
        const maskCx = (jawL.x + jawR.x) / 2;
        const maskW = Math.abs(jawR.x - jawL.x) * 0.99;
        const maskH = (chinMaskY - noseY + eyeDist * 0.2) * 0.9;
        const maskTopY = noseY - eyeDist * 0.15;
        const maskAngle = Math.atan2(jawR.y - jawL.y, jawR.x - jawL.x);

        camCtx.save();
        camCtx.translate(maskCx, maskTopY + maskH/2);
        camCtx.rotate(maskAngle);
        camCtx.fillStyle = 'rgba(240,240,240,0.92)';
        camCtx.beginPath();
        camCtx.moveTo(-maskW/2, maskH/2);
        camCtx.quadraticCurveTo(-maskW/2*1.05, 0, -maskW*0.35, -maskH/2);
        camCtx.quadraticCurveTo(0, -maskH/2-maskH*0.08, maskW*0.35, -maskH/2);
        camCtx.quadraticCurveTo(maskW/2*1.05, 0, maskW/2, maskH/2);
        camCtx.closePath();
        camCtx.fill();
        // Mask fold lines
        camCtx.strokeStyle = 'rgba(200,200,200,0.5)';
        camCtx.lineWidth = 0.6;
        for (let i=1; i<=3; i++) {
          const ly = -maskH/2 + maskH * i * 0.25;
          const lw = maskW/2 * (1 - Math.abs(i-2)*0.1);
          camCtx.beginPath();
          camCtx.moveTo(-lw, ly);
          camCtx.lineTo(lw, ly);
          camCtx.stroke();
        }
        // Ear loops
        camCtx.strokeStyle = 'rgba(220,220,220,0.7)';
        camCtx.lineWidth = 1;
        camCtx.beginPath();
        camCtx.moveTo(-maskW/2, -maskH*0.2);
        camCtx.quadraticCurveTo(-maskW/2-maskW*0.12, 0, -maskW/2, maskH*0.1);
        camCtx.stroke();
        camCtx.beginPath();
        camCtx.moveTo(maskW/2, -maskH*0.2);
        camCtx.quadraticCurveTo(maskW/2+maskW*0.12, 0, maskW/2, maskH*0.1);
        camCtx.stroke();
        camCtx.restore();

        const foreheadY = fyAR(10);
        const chinY = fyAR(152);
        const faceH = chinY - foreheadY;
        const hatLeftX = fxAR(54), hatRightX = fxAR(284);
        const beanieW = Math.abs(hatRightX - hatLeftX) * 1.4;
        const beanieH = faceH * 0.7;
        const baseY = foreheadY - faceH * 0.02;
        const hatCx = (hatLeftX + hatRightX) / 2;
        const hatAngle = Math.atan2(fyAR(284)-fyAR(54), fxAR(284)-fxAR(54));

        camCtx.save();
        camCtx.translate(hatCx, baseY);
        camCtx.rotate(hatAngle);
        camCtx.scale(1, -1);
        camCtx.fillStyle = 'rgb(40,40,40)';
        camCtx.beginPath();
        camCtx.moveTo(-beanieW/2, beanieH*0.1);
        camCtx.lineTo(-beanieW/2, -beanieH*0.3);
        camCtx.quadraticCurveTo(-beanieW/2, -beanieH*0.7, 0, -beanieH*0.8);
        camCtx.quadraticCurveTo(beanieW/2, -beanieH*0.7, beanieW/2, -beanieH*0.3);
        camCtx.lineTo(beanieW/2, beanieH*0.1);
        camCtx.closePath();
        camCtx.fill();
        camCtx.fillStyle = 'rgb(55,55,55)';
        camCtx.beginPath();
        camCtx.roundRect(-beanieW/2, -beanieH*0.02, beanieW, beanieH*0.14, 2);
        camCtx.fill();
        // Text on cuff
        camCtx.scale(1, -1);
        camCtx.rotate(Math.PI);
        camCtx.fillStyle = 'rgba(255,255,255,0.8)';
        camCtx.font = '700 '+Math.round(beanieH*0.18)+'px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
        camCtx.textAlign = 'center';
        camCtx.textBaseline = 'middle';
        camCtx.fillText('현대카드', 0, -beanieH*0.35);
        camCtx.restore();
       } // end face loop
      }

      // Zone guide lines (on top of AR)
      const segments = ['Power','Casual','Light'];
      const pad=cw*0.04, gx=pad, gw=cw-pad*2, gh=(ch-pad*2-8)/3, gy=pad;
      const fontSize = Math.round(cw*0.046);
      // Build set of active cells from fingertip positions
      const activeZones = new Set();
      if (fingerTipsRaw.length) {
        for (const ft of fingerTipsRaw) {
          const fx = (1 - ft.x) * cw, fy = ft.y * ch;
          for (let s=0; s<3; s++) {
            const ty = gy + s*(gh+4);
            if (fy >= ty && fy <= ty+gh && fx >= gx && fx <= gx+gw) {
              const zW = gw/3;
              const ti = Math.min(2, Math.floor((fx-gx)/zW));
              activeZones.add(s+'-'+ti);
            }
          }
        }
      }

      camCtx.save();
      for (let s=0; s<3; s++) {
        const ty = gy + s*(gh+4);
        // segment border
        camCtx.strokeStyle = 'rgba(255,255,255,0.45)';
        camCtx.lineWidth = 1;
        camCtx.strokeRect(gx, ty, gw, gh);
        // segment label
        camCtx.fillStyle = 'rgba(255,255,255,0.7)';
        camCtx.font = '700 '+fontSize+'px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
        camCtx.textAlign = 'left'; camCtx.textBaseline = 'top';
        camCtx.fillText(segments[s], gx+5, ty+3);
        // type dividers
        const zW = gw/3;
        for (let i=0; i<3; i++) {
          if (i>0) {
            camCtx.beginPath();
            camCtx.moveTo(gx+i*zW, ty+16);
            camCtx.lineTo(gx+i*zW, ty+gh-4);
            camCtx.strokeStyle = 'rgba(255,255,255,0.3)';
            camCtx.lineWidth = 1;
            camCtx.stroke();
          }
          const isActive = activeZones.has(s+'-'+i);
          camCtx.fillStyle = isActive ? 'rgba(255,255,255,1)' : 'rgba(255,255,255,0.45)';
          camCtx.font = (isActive?'700 ':'500 ')+fontSize+'px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
          camCtx.textAlign = 'center'; camCtx.textBaseline = 'middle';
          camCtx.fillText('T'+(i+1), gx+i*zW+zW/2, ty+gh/2+4);
        }
      }
      camCtx.restore();

      // Fingertip dots
      if (fingerTipsRaw.length) {
        for (const ft of fingerTipsRaw) {
          const cx = (1 - ft.x) * cw, cy = ft.y * ch;
          const glow = camCtx.createRadialGradient(cx, cy, 0, cx, cy, 12);
          glow.addColorStop(0, 'rgba(100,240,200,0.8)');
          glow.addColorStop(0.4, 'rgba(100,240,200,0.2)');
          glow.addColorStop(1, 'rgba(100,240,200,0)');
          camCtx.fillStyle = glow;
          camCtx.beginPath(); camCtx.arc(cx, cy, 12, 0, Math.PI*2); camCtx.fill();
          camCtx.fillStyle = 'rgba(100,240,200,1)';
          camCtx.beginPath(); camCtx.arc(cx, cy, 2.5, 0, Math.PI*2); camCtx.fill();
        }
      }

      // (AR drawn above, before guides)
    });

    // Camera starts on button click (see camBtn listener above)
  } catch(e) { console.log('Hand tracking unavailable:', e); }
})();

// MAU 클릭 핫스팟
const mauHotspot = document.createElement('div');
mauHotspot.style.cssText = 'position:fixed;top:54px;left:28px;height:42px;cursor:pointer;z-index:5;';
document.body.appendChild(mauHotspot);
mauHotspot.addEventListener('click', () => { if (!detailPageActive) showDetailPage(); });

function updateMauHotspot() { mauHotspot.style.width = ((W-56)/5) + 'px'; }

resize(); updateMauHotspot();
window.addEventListener('resize', () => { resize(); updateMauHotspot(); });
initParticles();

let frame=0;
document.fonts.ready.then(()=>requestAnimationFrame(loop));

function loop() {
  frame++;
  buildGrid(); applyRepulsion(); applyMouseForce(); applyDragForce();
  // Hard zone enforcement: force ALL non-migrating particles inside their sub-zone
  particles.forEach(p => {
    if (p.migrating || p.fadingIn || p.segment === 'churn' || p.segment === 'new') return;
    const z = getSubZone(p.segment, p.subType);
    if (!z) return;
    const wL = z.x + p.radius + 2, wR = z.x + z.w - p.radius - 2;
    const wT = z.y + p.radius + 2, wB = z.y + z.h - p.radius - 2;
    // Teleport back if outside
    if (p.x < wL) { p.x = wL; p.vx = 0; }
    if (p.x > wR) { p.x = wR; p.vx = 0; }
    if (p.y < wT) { p.y = wT; p.vy = 0; }
    if (p.y > wB) { p.y = wB; p.vy = 0; }
    // Block velocity that would exit next frame
    if (p.x + p.vx < wL) p.vx = 0;
    if (p.x + p.vx > wR) p.vx = 0;
    if (p.y + p.vy < wT) p.vy = 0;
    if (p.y + p.vy > wB) p.vy = 0;
  });
  particles.forEach(p=>p.update(frame));
  tryMigrations();
  signalEvents=signalEvents.filter(e=>Date.now()-e.time<30000);

  drawBG(); drawDashboard(); drawLegend(); drawGNB();
  drawAquarium(frame); drawTanks(); drawAllPipes(frame);
  drawSideZones(); drawConnLines();
  particles.forEach(p=>p.draw());
  drawSignalPanel(frame); drawActionPanel(frame);

  canvas.style.cursor = drag.active?'grabbing':inAqua(mouseX,mouseY)?'grab':'default';
  requestAnimationFrame(loop);
}
</script>
</body>
