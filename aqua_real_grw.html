// Canvas helper: diagonal hatch between bars
function lfDrawHatch(ctx, x, y, w, h, isPos) {
  if (h <= 2 || w <= 0) return;
  const hatchClr  = isPos ? 'rgba(0,213,109,0.4)' : 'rgba(255,2,56,0.4)';
  const borderClr = isPos ? 'rgba(0,213,109,0.75)'  : 'rgba(255,2,56,0.8)';
  ctx.save();
  ctx.beginPath(); ctx.rect(x, y, w, h); ctx.clip();
  ctx.strokeStyle = hatchClr; ctx.lineWidth = 1.5;
  const step = 4;
  for (let d = -(h + w); d < w + h; d += step) {
    ctx.beginPath();
    ctx.moveTo(x + d,     y);
    ctx.lineTo(x + d + h, y + h);
    ctx.stroke();
  }
  ctx.restore();
  ctx.strokeStyle = borderClr; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(x, y);     ctx.lineTo(x + w, y);     ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x, y + h); ctx.lineTo(x + w, y + h); ctx.stroke();
}

// Canvas helper: rounded rect path
function lfRoundRect(ctx, x, y, w, h, r) {
  if (h <= 0) return;
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
}

function drawLFChart(seg) {
  const canvas = document.getElementById('lf-canvas-' + seg);
  if (!canvas) return;
  const d = LF_DATA[seg];
  if (!d) return;

  const dpr = window.devicePixelRatio || 1;
  const W   = canvas.offsetWidth;
  const H   = canvas.offsetHeight;
  if (!W || !H) return;

  canvas.width  = W * dpr;
  canvas.height = H * dpr;

  const padL = 40, padR = 8, padT = 10, padB = 8;
  const chartW = W - padL - padR;
  const chartH = H - padT - padB;

  // ── Y-axis: 40만 단위, min 40px 간격 (전 세그먼트 공통 스케일로 동일선상 비교) ──
  const maxVal   = Math.max(...Object.values(LF_DATA).flatMap(s => BUCKETS.flatMap(b => [s.current[b], s.prev[b]])));
  const dataStep = 40;
  const topVal   = Math.ceil(maxVal / dataStep) * dataStep;
  const numSteps = topVal / dataStep;
  const idealPx  = chartH / numSteps;
  const skip     = Math.max(1, Math.ceil(40 / idealPx));
  const drawStep = dataStep * skip;

  // ── 버킷 지오메트리 (Figma: 8px 바, 4px 간격) ──
  const groupW = chartW / BUCKETS.length;
  const barW   = 8;
  const gap    = 4;

  const buckets = BUCKETS.map((b, i) => {
    const cx  = padL + i * groupW + groupW / 2;
    const cur = d.current[b];
    const pv  = d.prev[b];
    return {
      b, cx, cur, pv,
      curH: Math.max(2, (cur / topVal) * chartH),
      pvH:  Math.max(2, (pv  / topVal) * chartH),
    };
  });

  const rgb = isLight ? '0,0,0' : '255,255,255';

  // 바 진입 애니메이션 상태
  let _barProg = 0, _barRaf = null;
  // 해치 애니메이션 상태
  let _hatchIdx = null, _hatchProg = 0, _hatchRaf = null;

  function render(hovIdx) {
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W * dpr, H * dpr);
    ctx.save();
    ctx.scale(dpr, dpr);

    // Y-axis 그리드 + 라벨 (좌측 정렬)
    for (let v = 0; v <= topVal; v += drawStep) {
      const y = padT + chartH - (v / topVal) * chartH;
      ctx.strokeStyle = `rgba(${rgb},0.08)`;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W, y); ctx.stroke();
      ctx.font = `400 12px SFProDisplay,sans-serif`;
      ctx.fillStyle = `rgba(${rgb},0.36)`;
      ctx.textAlign = 'left';
      ctx.fillText(v + '만', 0, y + 5);
    }

    // 버킷 바 + 해치
    buckets.forEach(({ cx, cur, pv, curH, pvH }, i) => {
      const hov   = i === hovIdx;
      const prevX = cx - gap / 2 - barW;
      const currX = cx + gap / 2;
      const aPvH  = pvH  * _barProg;
      const aCurH = curH * _barProg;
      const prevY = padT + chartH - aPvH;
      const currY = padT + chartH - aCurH;

      ctx.fillStyle = hov ? `rgba(${rgb},0.38)` : `rgba(${rgb},0.20)`;
      ctx.beginPath(); ctx.rect(prevX, prevY, barW, aPvH); ctx.fill();

      ctx.fillStyle = hov
        ? (isLight ? 'rgba(0,0,0,0.9)' : '#fff')
        : (isLight ? 'rgba(0,0,0,0.75)' : 'rgba(255,255,255,1)');
      ctx.beginPath(); ctx.rect(currX, currY, barW, aCurH); ctx.fill();

      // 델타 해치 (호버 시만, 좌우 12px 돌출; 양끝 버킷은 그리드 끝까지 확장)
      if (hov) {
        const isFirst = i === 0;
        const isLast  = i === buckets.length - 1;
        const hatchX  = isFirst ? padL : prevX - 12;
        const hatchR  = isLast  ? W    : currX + barW + 12;
        const hatchW  = hatchR - hatchX;
        const hatchY = Math.min(prevY, currY);
        const hatchH = Math.abs(aPvH - aCurH);
        if (hatchH <= 2) {
          // delta=0: 가로선 (라이트모드는 검정)
          ctx.strokeStyle = isLight ? 'rgba(0,0,0,0.8)' : 'rgba(255,255,255,0.8)'; ctx.lineWidth = 1.5;
          ctx.beginPath(); ctx.moveTo(hatchX, hatchY); ctx.lineTo(hatchX + hatchW, hatchY); ctx.stroke();
        } else {
          const isPos = cur >= pv;
          const prog = (i === _hatchIdx) ? _hatchProg : 1;
          const animH = hatchH * prog;
          const animY = isPos ? hatchY + hatchH - animH : hatchY;
          if (animH > 1) lfDrawHatch(ctx, hatchX, animY, hatchW, animH, isPos);
        }
      }
    });

    ctx.restore();

    // 호버 툴팁 (DOM) — 작은 바일 때 그래프 위로 뜨게
    const tt = document.getElementById('lf-tt-' + seg);
    if (!tt) return;
    if (hovIdx === null || hovIdx < 0) { tt.classList.remove('show'); return; }
    const bk = buckets[hovIdx];
    const delta = bk.cur - bk.pv;
    const dStr  = (delta >= 0 ? '+' : '') + delta + '만';
    tt.querySelector('[data-r="prev"]').textContent  = `전월 ${bk.pv}만`;
    tt.querySelector('[data-r="cur"]').textContent   = `당월 ${bk.cur}만`;
    if (delta === 0) {
      tt.querySelector('[data-r="delta"]').innerHTML = `전월 대비 <span style="opacity:0.48">–</span>`;
    } else {
      tt.querySelector('[data-r="delta"]').textContent = `전월 대비 ${dStr}`;
    }
    tt.classList.add('show');

    // 위치 계산 (offset 좌표계, 캔버스와 동일 wrap)
    const ttW = tt.offsetWidth, ttH = tt.offsetHeight;
    const hatchExt = 12;
    let tx = bk.cx + gap / 2 + barW + hatchExt + 8;
    if (tx + ttW > W - padR) tx = bk.cx - gap / 2 - barW - hatchExt - 8 - ttW;
    if (tx < padL) tx = Math.max(4, bk.cx - ttW / 2);

    // 수직: 가장 높은 바 상단 기준, 차트 영역 안으로 클램프 (원래 캔버스 로직 그대로)
    const barTop = Math.min(padT + chartH - bk.pvH * _barProg, padT + chartH - bk.curH * _barProg);
    let ty = barTop;
    if (ty + ttH > padT + chartH) ty = padT + chartH - ttH;
    if (ty < padT) ty = padT;
    tt.style.left = tx + 'px';
    tt.style.top  = ty + 'px';
  }

  // 해치 애니메이션 시작
  function startBarAnim() {
    if (_barRaf) cancelAnimationFrame(_barRaf);
    _barProg = 0;
    const t0 = performance.now(), dur = 500;
    (function step(now) {
      const p = Math.min((now - t0) / dur, 1);
      _barProg = 1 - Math.pow(1 - p, 3); // easeOutCubic
      render(null);
      if (p < 1) _barRaf = requestAnimationFrame(step);
      else _barRaf = null;
    })(t0);
  }

  function startHatch(idx) {
    if (_hatchRaf) cancelAnimationFrame(_hatchRaf);
    _hatchIdx = idx;
    _hatchProg = 0;
    const t0 = performance.now();
    const dur = 280;
    (function step(now) {
      _hatchProg = Math.min(1, (now - t0) / dur);
      render(idx);
      if (_hatchProg < 1) _hatchRaf = requestAnimationFrame(step);
    })(t0);
  }

  render(null);

  const lfRoot = canvas.closest('.tank-lf-content');
  const xcolEls = lfRoot ? lfRoot.querySelectorAll('.lf-xcol-lbl') : [];
  const xcolWraps = lfRoot ? lfRoot.querySelectorAll('.lf-xcol') : [];

  function setActiveXcol(hi) {
    xcolEls.forEach((el, i) => el.classList.toggle('active', i === hi));
  }

  function applyHover(hi) {
    if (hi !== _hatchIdx) { startHatch(hi); if (hi !== null) tickSound(); }
    setActiveXcol(hi);
  }

  function clearHover() {
    if (_hatchRaf) cancelAnimationFrame(_hatchRaf);
    _hatchIdx = null; _hatchProg = 0;
    render(null); setActiveXcol(null);
  }

  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    let hi = null;
    buckets.forEach(({ cx }, i) => { if (Math.abs(mx - cx) < groupW / 2) hi = i; });
    applyHover(hi);
  };
  canvas.onmouseleave = clearHover;

  xcolWraps.forEach((el, i) => {
    el.onmouseenter = () => applyHover(i);
  });
  const xaxisRow = lfRoot ? lfRoot.querySelector('.lf-xaxis-row') : null;
  if (xaxisRow) xaxisRow.onmouseleave = clearHover;

  // KPI countUp
  const curEl  = document.getElementById('lf-kpi-cur-'  + seg);
  const prevEl = document.getElementById('lf-kpi-prev-' + seg);
  const diffEl = document.getElementById('lf-kpi-diff-' + seg);
  if (curEl)  countUp(curEl,  +curEl.dataset.t,  1, 800);
  if (prevEl) countUp(prevEl, +prevEl.dataset.t, 1, 800);
  if (diffEl) {
    const sign = diffEl.dataset.sign;
    countUp(diffEl, +diffEl.dataset.t, 1, 800, v => sign + v);
  }

  // 바 진입 애니메이션
  startBarAnim();

  // 크기 변경 시 재렌더링
  if (!canvas._lfRO) {
    canvas._lfRO = new ResizeObserver(() => { drawLFChart(seg); });
    canvas._lfRO.observe(canvas.parentElement);
  }
}

let currentTab = 'seg';
function switchTab(tab) {
  if (tab === currentTab) return;
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && tab === 'seg') || (i === 1 && tab === 'lf'));
  });
  const ta = document.querySelector('.tracks-area');
  const LF_BUCKET_DESC = { Light: '1~2일', Casual: '3~7일', Power: '8일 이상' };
  if (tab === 'lf') {
    if (document.getElementById('detail-panel').classList.contains('open')) closeDetail();
    document.querySelectorAll('#ret-tanks .tank-wrap').forEach(wrap => {
      const seg  = wrap.dataset.seg;
      const card = wrap.querySelector('.tank-card');
      // LF 전용 alert: 전월 대비 음수면 이상. 원본 alert 상태는 dataset에 백업.
      if (wrap.dataset.origAlert === undefined) {
        wrap.dataset.origAlert = wrap.classList.contains('alert') ? '1' : '0';
      }
      const lfD = LF_DATA[seg];
      const lfDiff = lfD ? (lfD.curMean - lfD.prevMean) : 0;
      wrap.classList.toggle('alert', lfDiff < 0);
      // 서브 텍스트 → LF 포맷 변경
      const subEl = wrap.querySelector('.tank-sub');
      if (subEl && !subEl.dataset.origSub) {
        subEl.dataset.origSub = subEl.textContent;
        const tank = DATA.retention.find(t => t.seg === seg);
        subEl.textContent = `월 로그인 ${LF_BUCKET_DESC[seg] || ''} (전월마감 ${tank ? tank.prevClose : '?'}만)`;
      }
      // LF 콘텐츠 주입 (최초 1회)
      if (card && !card.querySelector('.tank-lf-content')) {
        card.insertAdjacentHTML('beforeend', buildLFContent(seg));
        // 복사 버튼 주입
        const copyBtn = document.createElement('button');
        copyBtn.className = 'lf-copy-btn';
        copyBtn.title = '데이터 복사';
        copyBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><defs><mask id="cp-m-${seg}"><rect width="16" height="16" fill="white"/><rect x="5.7" y="1.7" width="7.6" height="9.6" rx="1.3" fill="black"/></mask></defs><rect x="2" y="4" width="9" height="11" rx="2" stroke="currentColor" stroke-width="1.4" mask="url(#cp-m-${seg})"/><rect x="5" y="1" width="9" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/></svg>`;
        copyBtn.addEventListener('click', e => { e.stopPropagation(); lfCopy(seg, copyBtn); });
        card.appendChild(copyBtn);
      }
    });
    ta.classList.add('lf-mode');
    ta.closest('.aquarium-container').classList.add('aquarium-lf');
    setTimeout(() => {
      ta.classList.add('lf-mode-settled');
      ['Light','Casual','Power'].forEach(drawLFChart);
    }, 420);
  } else {
    ta.classList.remove('lf-mode');
    ta.classList.remove('lf-mode-settled');
    ta.closest('.aquarium-container').classList.remove('aquarium-lf');
    // 서브 텍스트 복원 + alert 상태 원복
    document.querySelectorAll('#ret-tanks .tank-wrap').forEach(wrap => {
      const subEl = wrap.querySelector('.tank-sub');
      if (subEl && subEl.dataset.origSub) { subEl.textContent = subEl.dataset.origSub; delete subEl.dataset.origSub; }
      if (wrap.dataset.origAlert !== undefined) {
        wrap.classList.toggle('alert', wrap.dataset.origAlert === '1');
        delete wrap.dataset.origAlert;
      }
    });
  }
}

function closeDetail() {
  stopPlay();
  setActiveTank(null);
  document.getElementById('detail-panel').classList.remove('open');
  document.body.classList.remove('detail-open');
}

// ── 플레이 로직 ──
let isPlaying    = false;
let playTimer    = null;
let playIndex    = 0;
let playInterval = 6000;
let longPressTimer = null;

function getPlaySegs() {
  return [...DATA.acquisition, ...DATA.retention];
}

function setActiveTank(seg) {
  document.querySelectorAll('.tank-card').forEach(c => c.classList.remove('active'));
  if (!seg) return;
  const wrap = document.querySelector(`.tank-wrap[data-seg="${seg}"]`);
  if (wrap) wrap.querySelector('.tank-card')?.classList.add('active');
}

function togglePlay() {
  if (isPlaying) { stopPlay(); return; }
  isPlaying = true;
  const btn = document.getElementById('detail-play-btn');
  btn.classList.add('playing');
  document.getElementById('play-icon').style.display  = 'none';
  document.getElementById('pause-icon').style.display = '';
  playNext();
}

function stopPlay() {
  isPlaying = false;
  clearTimeout(playTimer);
  setActiveTank(null);
  const btn = document.getElementById('detail-play-btn');
  if (btn) {
    btn.classList.remove('playing');
    document.getElementById('play-icon').style.display  = '';
    document.getElementById('pause-icon').style.display = 'none';
  }
}

function setPlayInterval(sec) {
  playInterval = sec * 1000;
  document.querySelectorAll('.play-interval-opt').forEach(el => {
    el.classList.toggle('active', +el.dataset.sec === sec);
  });
  document.getElementById('play-interval-tip').classList.remove('visible');
  // 플레이 중이면 현재 타이머 즉시 재시작
  if (isPlaying) {
    clearTimeout(playTimer);
    playTimer = setTimeout(playNext, playInterval);
  }
}

function initPlayLongPress() {
  const btn = document.getElementById('detail-play-btn');
  const tip = document.getElementById('play-interval-tip');
  let longPressActivated = false;

  btn.addEventListener('mousedown', () => {
    longPressActivated = false;
    longPressTimer = setTimeout(() => {
      longPressActivated = true;
      tip.classList.add('visible');
    }, 600);
  });
  btn.addEventListener('mouseup',    () => clearTimeout(longPressTimer));
  btn.addEventListener('mouseleave', () => clearTimeout(longPressTimer));
  btn.addEventListener('click', () => {
    if (longPressActivated) { longPressActivated = false; return; }
    togglePlay();
  });
  // 툴팁 외부 클릭 시 닫기
  document.addEventListener('mousedown', (e) => {
    if (!tip.contains(e.target) && e.target !== btn) {
      tip.classList.remove('visible');
    }
  });
}

function playNext() {
  if (!isPlaying) return;
  const segs = getPlaySegs();
  const t = segs[playIndex % segs.length];
  openDetail(t.seg, t.sub, true);
  setActiveTank(t.seg);
  const wrap = document.querySelector(`.tank-wrap[data-seg="${t.seg}"]`);
  if (wrap) animateCard(wrap);
  playIndex = (playIndex + 1) % segs.length;
  playTimer = setTimeout(playNext, playInterval);
}

function copySegData(seg) {
  const tank = [...DATA.acquisition, ...DATA.retention].find(t => t.seg === seg);
  const d    = SEG_DETAILS[seg];
  if (!tank || !d) return;

  const sub      = tank.sub;
  const curr     = tank.value;
  const prev     = tank.prevClose;
  const delta    = curr - prev;
  const deltaStr = (delta >= 0 ? '+' : '') + delta + '만';

  const kpi1 = d.avgCards;
  const kpi2 = d.avgSpend;

  const ageLines  = d.ageGroups.map(a => `  ${a.age}  ${a.pct}%`).join('\n');
  const cardLines = d.topCards.map(([name, pct], i) => `  ${i+1}. ${name}  ${pct}%`).join('\n');

  const text = [
    `[${seg}] ${curr}만`,
    sub,
    `기준일: ${DATA.period}`,
    '',
    `평균 카드 보유: ${kpi1}`,
    `월평균 결제: ${kpi2}`,
    '',
    `전월 비교`,
    `  전월: ${prev}만  당월: ${curr}만  (${deltaStr})`,
    '',
    `연령대`,
    ageLines,
    '',
    `보유 카드 TOP 5`,
    cardLines,
  ].join('\n');

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.detail-copy-btn');
    const lbl = document.getElementById('copy-btn-label');
    if (!btn) return;
    btn.classList.add('copied');
    lbl.textContent = '복사됨';
    const iconEl = btn.querySelector('svg');
    if (iconEl) iconEl.outerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><polyline points="3,8 6.5,12 13,4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    setTimeout(() => {
      btn.classList.remove('copied');
      lbl.textContent = '복사';
      const ic = btn.querySelector('svg');
      if (ic) ic.outerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none"><defs><mask id="cp-m-detail"><rect width="16" height="16" fill="white"/><rect x="5.7" y="1.7" width="7.6" height="9.6" rx="1.3" fill="black"/></mask></defs><rect x="2" y="4" width="9" height="11" rx="2" stroke="currentColor" stroke-width="1.4" mask="url(#cp-m-detail)"/><rect x="5" y="1" width="9" height="11" rx="2" stroke="currentColor" stroke-width="1.4"/></svg>`;
    }, 2000);
  });
}

// ══════════════════════════════════════════════════════════
//  키보드 네비게이션
//   - L/R: 현재 행(row) 내부 이동만
//   - U/D: 행 간 이동, 마지막 세그 col 기억 (페어 정렬)
//   - 활성 탭은 포커스 불가 (비활성 탭만)
// ══════════════════════════════════════════════════════════
(function () {
  // 현재 탭 기준 rows 구성. 각 row는 col 순서로 정렬된 node 배열.
  function getRows() {
    const isLF = currentTab === 'lf';
    const inactiveTab = isLF ? 'seg' : 'lf';
    const rows = {};
    rows[0] = [{ kind:'tab', id: inactiveTab, row:0, col:0 }];
    if (!isLF) {
      rows[1] = [
        { kind:'seg', id:'앱미경험',   row:1, col:0 },
        { kind:'seg', id:'장기미이용', row:1, col:1 },
        { kind:'seg', id:'간헐이용',   row:1, col:2 },
      ];
    }
    rows[2] = [
      { kind:'seg', id:'Light',  row:2, col:0 },
      { kind:'seg', id:'Casual', row:2, col:1 },
      { kind:'seg', id:'Power',  row:2, col:2 },
    ];
    return rows;
  }

  const elFor = (n) => n.kind === 'tab'
    ? document.querySelectorAll('.tabbar .tab')[n.id === 'seg' ? 0 : 1]
    : document.querySelector(`.tank-wrap[data-seg="${n.id}"]`);

  let focused = null;
  let lastSegCol = 0; // U/D 행 이동 시 열 보존용

  function setFocus(node) {
    const changed = !focused || focused.kind !== node.kind || focused.id !== node.id;
    focused = node;
    if (node && node.kind === 'seg') lastSegCol = node.col;
    render();
    if (changed && typeof tickSound === 'function') tickSound();
  }

  function render() {
    // 브라우저 native :focus 해제 (탭 버튼 클릭 후 남는 포커스 링 제거)
    if (document.activeElement && document.activeElement !== document.body && document.activeElement.blur) {
      document.activeElement.blur();
    }
    document.querySelectorAll('.kbd-focus').forEach(el => el.classList.remove('kbd-focus'));
    document.body.classList.toggle('kbd-nav', focused !== null);
    if (!focused) return;
    const el = elFor(focused);
    if (el) {
      el.classList.add('kbd-focus');
      el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }

  // 마우스 이동 시 키보드 네비 모드 해제 (호버 기반 인터랙션으로 복귀)
  document.addEventListener('mousemove', () => {
    if (focused !== null) { focused = null; render(); }
  }, { passive: true });

  function currentNode(rows) {
    if (!focused) return null;
    const row = rows[focused.row];
    if (!row) return null;
    return row.find(n => n.kind === focused.kind && n.id === focused.id) || null;
  }

  function nextRowWith(rows, fromRow, dir) {
    const step = dir === 'down' ? 1 : -1;
    for (let r = fromRow + step; r >= 0 && r <= 2; r += step) {
      if (rows[r] && rows[r].length) return rows[r];
    }
    return null;
  }

  document.addEventListener('keydown', (e) => {
    const tag = (document.activeElement && document.activeElement.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;
    const key = e.key;
    if (!['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Enter','Escape'].includes(key)) return;

    if (key === 'Escape') { e.preventDefault(); focused = null; render(); return; }

    const rows = getRows();
    const cur = currentNode(rows);

    // 초기 포커스 or 현재 row에서 invalid 상태
    if (!cur) {
      e.preventDefault();
      setFocus(rows[0][0]);
      return;
    }

    const rowArr = rows[cur.row];
    const idx = rowArr.findIndex(n => n.id === cur.id);

    // L/R: 전체 선형 시퀀스 (비활성 탭 + 세그먼트, 행 경계 넘어감)
    const flat = [0, 1, 2].reduce((acc, r) => rows[r] ? acc.concat(rows[r]) : acc, []);
    const flatIdx = flat.findIndex(n => n.kind === cur.kind && n.id === cur.id);

    if (key === 'ArrowRight') {
      e.preventDefault();
      if (flatIdx < flat.length - 1) setFocus(flat[flatIdx + 1]);
    } else if (key === 'ArrowLeft') {
      e.preventDefault();
      if (flatIdx > 0) setFocus(flat[flatIdx - 1]);
    } else if (key === 'ArrowDown') {
      e.preventDefault();
      const next = nextRowWith(rows, cur.row, 'down');
      if (!next) return;
      // acq → ret 이동 시 페어(열 그대로)
      const targetCol = cur.kind === 'seg' ? cur.col : lastSegCol;
      setFocus(next[Math.min(targetCol, next.length - 1)]);
    } else if (key === 'ArrowUp') {
      e.preventDefault();
      const next = nextRowWith(rows, cur.row, 'up');
      if (!next) return;
      // ret → acq 이동 시 페어(열 그대로)
      // 세그 → 탭(row 0) 이동 시: 탭은 1칸(비활성)이므로 clamp
      const targetCol = cur.kind === 'seg' ? cur.col : lastSegCol;
      setFocus(next[Math.min(targetCol, next.length - 1)]);
    } else if (key === 'Enter') {
      e.preventDefault();
      if (cur.kind === 'tab') {
        switchTab(cur.id);
        // 탭 전환 후 새로 비활성이 된 탭으로 포커스 이동
        focused = { kind:'tab', id: currentTab === 'seg' ? 'lf' : 'seg', row:0, col:0 };
        render();
      } else {
        const wrap = document.querySelector(`.tank-wrap[data-seg="${cur.id}"]`);
        if (!wrap) return;
        if (currentTab === 'lf' && wrap.closest('#ret-tanks')) return;
        openDetail(wrap.dataset.seg, wrap.dataset.sub);
      }
    }
  });
})();
</script>
