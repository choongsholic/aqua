<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DP-AQUA · App User Quantitative Analysis</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh@0.4.1633559619/face_mesh.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.min.js"></script>
<style>
@font-face { font-family:'YouandiNewKr'; font-weight:700; font-style:normal; src:url('https://img.hyundaicard.com/docfiles/resources/pc/fonts/YouandiNewKrTitle-Bold.woff2') format('woff2'), url('https://img.hyundaicard.com/docfiles/resources/pc/fonts/YouandiNewKrTitle-Bold.woff') format('woff'); font-display:swap; }
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0a0a; overflow:hidden; cursor:default; font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Spoqa Han Sans Neo','Malgun Gothic',sans-serif; }
body.tank-hover, body.tank-hover * { cursor:pointer !important; }
canvas { display:block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
const dpr = window.devicePixelRatio || 1;

// ═══ CONFIG ═══
const HEALTH = {
  healthy: { r:80,  g:210, b:120, label:'건강', code:'5' },
  good:    { r:80,  g:150, b:230, label:'양호', code:'4' },
  normal:  { r:200, g:200, b:200, label:'일반', code:'3' },
  caution: { r:220, g:190, b:80,  label:'주의', code:'2' },
  danger:  { r:220, g:75,  b:75,  label:'위험', code:'1' },
};
const HEALTH_KEYS = ['healthy','good','normal','caution','danger'];

const HEALTH_DIST = {
  power:       [0.55, 0.25, 0.12, 0.06, 0.02],
  casual:      [0.08, 0.36, 0.28, 0.21, 0.07],
  light:       [0.02, 0.06, 0.22, 0.40, 0.30],
  uninstalled: [0.01, 0.04, 0.20, 0.42, 0.33],
  dormant:     [0.01, 0.03, 0.18, 0.44, 0.34],
  intermittent:[0.02, 0.07, 0.28, 0.38, 0.25],
};

function assignHealth(seg) {
  const dist = HEALTH_DIST[seg] || HEALTH_DIST.light;
  let r = Math.random(), acc = 0;
  for (let i = 0; i < dist.length; i++) { acc += dist[i]; if (r < acc) return HEALTH_KEYS[i]; }
  return 'normal';
}

function hColor(h, a) { const c = HEALTH[h]; return `rgba(${c.r},${c.g},${c.b},${a})`; }
function lerpRGB(h1, h2, t, a) {
  const c1 = HEALTH[h1], c2 = HEALTH[h2];
  return `rgba(${c1.r+(c2.r-c1.r)*t|0},${c1.g+(c2.g-c1.g)*t|0},${c1.b+(c2.b-c1.b)*t|0},${a})`;
}

// ═══ STYLE COLORS ═══
const COLOR = {
  inflow:  '#50d278',          // 유입/상향이동 — 주간 UV 그린
  outflow: '#FF5050',          // 이탈/하향이동
  positive: '#50d278',         // KPI 델타 + (주간 UV 그린)
  negative: '#0070F0',         // KPI 델타 -
};

// ═══ LINE OPACITY ═══
const LINE = {
  ghost:    0.05,  // 배경 구분선 (헤더 하단, 격자)
  subtle:   0.08,  // 컨테이너 테두리, 파이프 벽, 패널
  default:  0.14,  // 탱크·아쿠아리움 기본 테두리
  emphasis: 0.22,  // 보조 강조선 (슬라이드 패널 내부 등)
  active:   0.75,  // 호버·선택 상태
};

const CFG = {
  physics: { noise:0.034, maxSpeed:0.8, maxSpeedScatter:2.5, damping:0.995, boundary:0.01, repulsion:0.03, repDist:15, mouseR:150, mouseF:2.0, mouseFC:4.0 },
  migration: { speed:0.004, rates:{ light_casual:0.03, casual_power:0.02, power_casual:0.012, casual_light:0.025, churn:0.08, newEntry:0.10 } },
  pipe: { width:38 },
};

// ═══ LAYOUT ═══
const headerH = 96;
let tanks = {}, mauTanks = {}, aquarium = {}, newZone = {}, churnZone = {};
let signalPanel = {}, actionPanel = {}, pipes = {};
let rightPad = 22, leftPad = 22, channelX = 0;
let mauSectionH = 0, trackSepGlobal = 16; // set by computeLayout, read by draw fns

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  canvas.style.width = W+'px'; canvas.style.height = H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  computeLayout();
}

function computeLayout() {
  const pad = 28;
  const panelW = Math.min(200, W*0.15);
  const sideW = 120;
  const marginX = Math.max(50, W*0.05);
  const marginY = Math.max(14, (H-headerH)*0.03);

  // Outer aquarium
  const aX = sideW + pad + marginX;
  const aY = headerH + pad + marginY;
  const aW = W - sideW - panelW - pad*3 - marginX*1.2;
  const aH = H - headerH - pad*2 - marginY*2;
  aquarium = { x:aX, y:aY, w:aW, h:aH };

  // ─ Layout constants ─
  const ip = 16;          // equal inner padding: left / right / bottom / top-of-each-track
  const titleAreaH = 52;  // 탭 행(contY15+contH28) + gap before MAU TRACK label
  const trkLabelH = 14;   // track label text height
  const trkLabelGap = 8;  // gap between track label and tanks
  const sepH = 28;        // total height of separator zone (14 above + 14 below)
  trackSepGlobal = sepH;

  // Fixed vertical overhead (everything except the two tankH)
  const overhead = titleAreaH + ip + trkLabelH + trkLabelGap   // top section
                 + ip + sepH                                     // bottom of MAU + separator
                 + trkLabelH + trkLabelGap                      // retention label
                 + ip;                                           // bottom padding
  const tankH = Math.floor((aH - overhead) / 2);

  // MAU tanks Y
  const mauLabelY = aY + titleAreaH;
  const mauTankY  = mauLabelY + trkLabelH + trkLabelGap;
  mauSectionH = titleAreaH + trkLabelH + trkLabelGap + tankH + ip; // global

  // Retention tanks Y
  const retLabelY = aY + mauSectionH + sepH;
  const retTankY  = retLabelY + trkLabelH + trkLabelGap;

  // Store for drawAquarium
  leftPad  = ip;
  rightPad = ip;

  // ─ MAU Track: 3 tanks side by side ─
  const innerX = aX + ip;
  const innerW = aW - ip * 2;
  const tankGap = 12;
  const mauTankW = (innerW - tankGap * 2) / 3;

  mauTanks.uninstalled  = { x:innerX,                              y:mauTankY, w:mauTankW, h:tankH };
  mauTanks.dormant      = { x:innerX + mauTankW + tankGap,          y:mauTankY, w:mauTankW, h:tankH };
  mauTanks.intermittent = { x:innerX + (mauTankW + tankGap) * 2,    y:mauTankY, w:mauTankW, h:tankH };

  // ─ Retention Track: Light / Casual / Power side by side ─
  const retTankW = (innerW - tankGap * 2) / 3;

  tanks.light  = { x:innerX,                              y:retTankY, w:retTankW, h:tankH };
  tanks.casual = { x:innerX + retTankW + tankGap,          y:retTankY, w:retTankW, h:tankH };
  tanks.power  = { x:innerX + (retTankW + tankGap) * 2,    y:retTankY, w:retTankW, h:tankH };

  // Inter-tank horizontal pipes (Light↔Casual, Casual↔Power)
  const retPassY = retTankY + tankH/2;
  pipes.lc = { cy:retPassY, leftX:tanks.light.x+tanks.light.w,  rightX:tanks.casual.x };
  pipes.cp = { cy:retPassY, leftX:tanks.casual.x+tanks.casual.w, rightX:tanks.power.x };

  // MAU inter-tank pipe: 장기미이용(dormant) ↔ 간헐이용(intermittent)
  const mauPassY = mauTankY + tankH/2;
  pipes.di = { cy:mauPassY, leftX:mauTanks.dormant.x+mauTanks.dormant.w, rightX:mauTanks.intermittent.x };

  // MAU → Light holes: bottom of each MAU tank, top of Light tank
  // hole center X per tank (stored for drawTanks + migration)
  aquarium._mauHoleCX = {
    uninstalled:  mauTanks.uninstalled.x  + mauTanks.uninstalled.w  / 2,
    dormant:      mauTanks.dormant.x      + mauTanks.dormant.w      / 2,
    intermittent: mauTanks.intermittent.x + mauTanks.intermittent.w / 2,
  };
  aquarium._lightHoleCX = tanks.light.x + tanks.light.w / 2;

  // Store for drawAquarium labels
  aquarium._mauLabelY = mauLabelY;
  aquarium._retLabelY = retLabelY;

  channelX = aX + aW - rightPad/2;

  // Panels
  const pX = W - panelW - pad;
  signalPanel = { x:pX, y:aY + aH*0.03, w:panelW, h:Math.min(230, aH*0.42) };
  actionPanel = { x:pX, y:signalPanel.y + signalPanel.h + pad*0.6, w:panelW, h:Math.min(200, aH*0.30) };

  // 신규 & 이탈: left / right of aquarium (aligned to Retention Track row)
  const sideZoneH = Math.min(tankH, 120);
  const sideZoneY = retTankY + (tankH - sideZoneH) / 2;
  newZone   = { x:aX - sideW - pad*0.8, y:sideZoneY, w:sideW, h:sideZoneH };
  churnZone = { x:pX, y:sideZoneY, w:panelW, h:sideZoneH };

  // Horizontal pipes: 신규 → Light (left), Power → 이탈 (right)
  pipes.new_in    = { cy:retTankY + tankH/2, leftX:newZone.x+newZone.w, rightX:tanks.light.x };
  pipes.churn_out = { cy:retTankY + tankH/2, leftX:tanks.power.x+tanks.power.w, rightX:churnZone.x };

  // Light 하단 이탈 채널: Light 하단 구멍 → 아쿠아리움 하단 → churnZone 좌측
  const lightChurnCX = tanks.light.x + tanks.light.w / 2;
  aquarium._lightChurnHoleCX = lightChurnCX;
  pipes.light_churn = {
    cy:  tanks.light.y + tanks.light.h + ip / 2,  // 리텐션 탱크 하단 ~ 아쿠아리움 바닥 사이
    leftX:  lightChurnCX,
    rightX: churnZone.x,
  };

  // Dummy vertical pipes (kept for code compatibility, not drawn)
  pipes.cp_up   = { cx:0, topY:0, botY:0 };
  pipes.pc_down = { cx:0, topY:0, botY:0 };
  pipes.lc_up   = { cx:0, topY:0, botY:0 };
  pipes.cl_down = { cx:0, topY:0, botY:0 };

  // Reposition particles
  if (particles.length) particles.forEach(p => {
    if (!p.migrating && p.segment !== 'churn') {
      const z = getSubZone(p.segment, p.subType);
      if (z) { p.x = clamp(p.x, z.x+p.radius, z.x+z.w-p.radius); p.y = clamp(p.y, z.y+p.radius, z.y+z.h-p.radius); }
    }
  });
}

function clamp(v,mn,mx) { return Math.max(mn, Math.min(mx, v)); }

function getSubZone(seg, sub) {
  const t = tanks[seg] || mauTanks[seg];
  if (!t) return null;
  const ipY = 5;
  return { x:t.x, y:t.y+ipY, w:t.w, h:t.h-ipY*2, tankRef:t };
}

// ═══ PARTICLE ═══
class Particle {
  constructor(seg, sub) {
    this.segment = seg;
    this.subType = sub;
    this.health = assignHealth(seg);
    this.radius = 1.8;
    this.baseOpacity = 0.3 + Math.random()*0.5;
    this.phase = Math.random()*Math.PI*2;
    this.vx = (Math.random()-0.5)*0.15;
    this.vy = (Math.random()-0.5)*0.15;
    const z = getSubZone(seg, sub);
    if (z) { this.x = z.x+Math.random()*z.w; this.y = z.y+Math.random()*z.h; }
    else { this.x = W/2; this.y = H/2; }

    this.migrating = false;
    this.migProgress = 0; this.migSpeed = 0;
    this.migFrom = null; this.migTo = null;
    this.waypoints = []; this.totalPathLen = 0;
    this.trail = [];

    // 이탈 state
    this.fading = false;
    this.fadeAlpha = 1.0;
    this.churnTimer = -1;
    this.fadingIn = false; this.fadeInTimer = 0;
    this.scattered = 0;
  }

  getColor(alpha) {
    const a = this.fading ? alpha * this.fadeAlpha : alpha;
    if (this.migrating && this.migTo === 'churn') return lerpRGB(this.health, 'danger', Math.min(this.migProgress*2,1), a);
    if (this.migrating && this.migFrom === 'churn') return lerpRGB('danger', this.health, this.migProgress, a);
    if (this.segment === 'churn') return hColor('danger', a);
    return hColor(this.health, a);
  }

  update(frame) {
    // 신규유입 fade-in
    if (this.fadingIn) {
      this.fadeAlpha = Math.min(1, this.fadeAlpha + 0.025);
      this.fadeInTimer--;
      if (this.fadeInTimer <= 0 && this.fadeAlpha >= 1) {
        this.startNewMigration();
      }
      return;
    }
    // 이탈 fade
    if (this.fading) {
      this.fadeAlpha -= 0.008;
      if (this.fadeAlpha <= 0) { this.recycleAsNew(); return; }
    }
    // 이탈 return timer
    // 이탈 복귀 비활성화 — churn 존에서 빠져나오지 않음
    // if (this.segment === 'churn' && !this.migrating && !this.fading && this.churnTimer > 0) {
    //   this.churnTimer--;
    //   if (this.churnTimer <= 0) this.returnFromChurn();
    // }
    if (this.migrating) { this.updateMigration(); return; }

    // Determine zone
    let z;
    if (this.segment === 'churn') {
      z = { x:churnZone.x+4, y:churnZone.y+4, w:churnZone.w-8, h:churnZone.h-8 };
    } else {
      z = getSubZone(this.segment, this.subType);
    }
    if (!z) return;

    // Organic noise — gentle drift
    const nx = Math.sin(this.phase+frame*0.005)*Math.cos(this.y*0.004+frame*0.002)*CFG.physics.noise;
    const ny = Math.cos(this.phase+frame*0.004)*Math.sin(this.x*0.004+frame*0.002)*CFG.physics.noise;
    this.vx += nx; this.vy += ny;

    // Cohesion + swirl — elliptical pull with vortex rotation
    const cx = z.x+z.w/2, cy = z.y+z.h/2;
    const dx = cx - this.x, dy = cy - this.y;
    const normDx = dx / (z.w*0.3), normDy = dy / (z.h*0.25);
    const dist = Math.sqrt(normDx*normDx + normDy*normDy);
    const cohesion = Math.min(dist * 0.0008, 0.008);
    // Radial pull (toward center)
    this.vx += dx * cohesion * 0.8;
    this.vy += dy * cohesion * 1.5;
    // Tangential swirl (perpendicular to center direction, creates rotation)
    const swirl = Math.min(dist * 0.00008, 0.0015);
    this.vx += -dy * swirl;
    this.vy += dx * swirl * 0.6;

    if (this.scattered>0) this.scattered--;
    const curMax = this.scattered>0 ? CFG.physics.maxSpeedScatter : CFG.physics.maxSpeed;
    const curDamp = this.scattered>0 ? 0.985 : CFG.physics.damping;
    this.vx *= curDamp; this.vy *= curDamp;
    const spd = Math.sqrt(this.vx*this.vx+this.vy*this.vy);
    if (spd > curMax) { this.vx=(this.vx/spd)*curMax; this.vy=(this.vy/spd)*curMax; }

    this.x += this.vx; this.y += this.vy;

    const m = 5, k = CFG.physics.boundary;
    const t = z.tankRef;

    if (t) {
      const wallL = z.x + this.radius + 2;
      const wallR = z.x + z.w - this.radius - 2;

      // ABSOLUTE sub-zone walls — position forced, velocity killed
      this.x = Math.max(wallL, Math.min(wallR, this.x));
      if (this.x <= wallL + 1) this.vx = Math.abs(this.vx) * 0.2;
      if (this.x >= wallR - 1) this.vx = -Math.abs(this.vx) * 0.2;
    } else {
      if (this.x < z.x+m) this.vx += (z.x+m-this.x)*k;
      if (this.x > z.x+z.w-m) this.vx += (z.x+z.w-m-this.x)*k;
      this.x = clamp(this.x, z.x+this.radius, z.x+z.w-this.radius);
    }

    // Top/bottom — hard walls
    const wallT = z.y + this.radius + 3;
    const wallB = z.y + z.h - this.radius - 3;
    if (this.y <= wallT) { this.y = wallT; if (this.vy < 0) this.vy = 0; }
    if (this.y >= wallB) { this.y = wallB; if (this.vy > 0) this.vy = 0; }
  }

  startMigration(toSeg, toSub) {
    this.migrating = true; this.migProgress = 0;
    this.migSpeed = CFG.migration.speed + Math.random()*0.001;
    this.migFrom = this.segment; this.migTo = toSeg;
    this.trail = [];
    if (toSub) this.subType = toSub;

    const wp = [{x:this.x, y:this.y}];
    const from = this.segment, to = toSeg;

    const retSegs = ['power','casual','light'];
    if (to === 'churn') {
      // 하단 구멍으로 집결 → ↓ 수직 → → 수평 우측 → ↑ 우측벽 → → 파이프 → churnZone
      const holeCX  = aquarium._lightChurnHoleCX || (tanks.light.x + tanks.light.w / 2);
      const holeY   = tanks.light.y + tanks.light.h - 2;
      const bottomY = (tanks.light.y + tanks.light.h + aquarium.y + aquarium.h) / 2;
      const rightX  = aquarium.x + aquarium.w - 6;
      const pipeY   = pipes.churn_out.cy;
      const destX = churnZone.x + 4 + Math.random() * (churnZone.w - 8);
      const destY = churnZone.y + 4 + Math.random() * (churnZone.h - 8);
      wp.push({x: holeCX,  y: holeY});    // → 탱크 하단 구멍으로 수평 이동
      wp.push({x: holeCX,  y: bottomY});  // ↓ 구멍에서 수직 하강
      wp.push({x: rightX,  y: bottomY});  // → 채널 따라 우측 이동
      wp.push({x: rightX,  y: pipeY});    // ↑ 우측 벽 수직 상승
      wp.push({x: pipes.churn_out.rightX - 2, y: pipeY}); // → 파이프 통과
      wp.push({x: destX,   y: destY});    // churnZone 도착
    } else if (retSegs.includes(from) && retSegs.includes(to)) {
      // Side pipe passage: travel through the inter-tank pipe
      const fromT = tanks[from];
      const toT   = tanks[to];
      // Use the relevant pipe's cy as passage height
      const pipe = (from==='light'&&to==='casual')||(from==='casual'&&to==='light') ? pipes.lc : pipes.cp;
      const passY = pipe ? pipe.cy : fromT.y + fromT.h/2;
      const dz = getSubZone(to, 1);
      wp.push({x:this.x, y:passY});
      if (toT.x > fromT.x) {
        wp.push({x:fromT.x+fromT.w-2, y:passY});
        wp.push({x:toT.x+2,           y:passY});
      } else {
        wp.push({x:fromT.x+2,         y:passY});
        wp.push({x:toT.x+toT.w-2,     y:passY});
      }
      if (dz) wp.push({x:dz.x+dz.w/2, y:dz.y+dz.h/2});
    } else if ((from==='uninstalled'||from==='dormant'||from==='intermittent') && to==='light') {
      // MAU → Retention: ↓ 하단 구멍 → ↓ 분리대까지 수직 하강 → ← 수평 좌측 → ↓ Light 상단 구멍 진입
      const fromT = mauTanks[from];
      const dz = getSubZone('light', 1);
      if (fromT && dz) {
        const holeCX = (aquarium._mauHoleCX && aquarium._mauHoleCX[from]) || (fromT.x + fromT.w/2);
        const lightHoleCX = aquarium._lightHoleCX || (tanks.light.x + tanks.light.w/2);
        const sepY = fromT.y + fromT.h + trackSepGlobal * 0.5; // 분리대 센터
        wp.push({x:holeCX,      y:fromT.y + fromT.h - 2}); // → 하단 구멍으로
        wp.push({x:holeCX,      y:sepY});                   // ↓ 분리대까지 수직 하강
        wp.push({x:lightHoleCX, y:sepY});                   // ← 수평 좌측 이동
        wp.push({x:lightHoleCX, y:tanks.light.y + 2});      // ↓ Light 상단 구멍 진입
        wp.push({x:dz.x + dz.w/2, y:dz.y + dz.h/2});       // 탱크 내부 안착
      }
    } else if ((from==='dormant'&&to==='intermittent')||(from==='intermittent'&&to==='dormant')) {
      // MAU inter-tank: through pipes.di side passage
      const fromT = mauTanks[from];
      const toT   = mauTanks[to];
      const passY = pipes.di ? pipes.di.cy : fromT.y + fromT.h/2;
      wp.push({x:this.x, y:passY});
      if (toT.x > fromT.x) {
        wp.push({x:fromT.x + fromT.w - 2, y:passY});
        wp.push({x:toT.x + 2,             y:passY});
      } else {
        wp.push({x:fromT.x + 2,           y:passY});
        wp.push({x:toT.x + toT.w - 2,     y:passY});
      }
      const dz = getSubZone(to, 1);
      if (dz) wp.push({x:dz.x + dz.w/2, y:dz.y + dz.h/2});
    }

    this.waypoints = wp;
    this.totalPathLen = 0;
    for (let i=1;i<wp.length;i++) { const dx=wp[i].x-wp[i-1].x, dy=wp[i].y-wp[i-1].y; this.totalPathLen += Math.sqrt(dx*dx+dy*dy); }
  }

  updateMigration() {
    this.migProgress += this.migSpeed;
    if (this.migProgress > 1) this.migProgress = 1;
    this.trail.push({x:this.x, y:this.y}); if (this.trail.length > 20) this.trail.shift();

    const td = this.migProgress * this.totalPathLen;
    let acc = 0;
    for (let i=1;i<this.waypoints.length;i++) {
      const dx=this.waypoints[i].x-this.waypoints[i-1].x, dy=this.waypoints[i].y-this.waypoints[i-1].y;
      const sl = Math.sqrt(dx*dx+dy*dy);
      if (acc+sl >= td || i===this.waypoints.length-1) {
        const t = sl>0 ? Math.min((td-acc)/sl,1) : 1;
        this.x = this.waypoints[i-1].x+dx*t; this.y = this.waypoints[i-1].y+dy*t; break;
      }
      acc += sl;
    }

    if (this.migProgress >= 1) {
      this.migrating = false; this.trail = [];
      this.vx = (Math.random()-0.5)*0.1; this.vy = (Math.random()-0.5)*0.1;

      if (this.migTo === 'churn') {
        this.segment = 'churn'; this.health = 'danger';
        if (Math.random() < 0.6) { this.fading = true; this.fadeAlpha = 1.0; }
        else { this.churnTimer = 80 + Math.random()*120|0; }
      } else {
        this.segment = this.migTo;
        this.health = assignHealth(this.migTo);
        // Force position inside correct sub-zone
        const dz = getSubZone(this.segment, this.subType);
        if (dz) {
          this.x = clamp(this.x, dz.x + this.radius + 5, dz.x + dz.w - this.radius - 5);
          this.y = clamp(this.y, dz.y + this.radius + 5, dz.y + dz.h - this.radius - 5);
        }
      }

      if ((this.migFrom==='power'&&this.migTo==='casual')||(this.migFrom==='casual'&&this.migTo==='light')||this.migTo==='churn') {
        signalEvents.push({from:this.migFrom, to:this.migTo, time:Date.now()});
      }
    }
  }

  returnFromChurn() {
    // Return from 이탈 → new_in pipe → Light (leftmost tank)
    this.migrating = true; this.migProgress = 0;
    this.migSpeed = CFG.migration.speed;
    this.migFrom = 'churn'; this.migTo = 'light';
    this.subType = 1;
    this.health = assignHealth('light');
    this.trail = []; this.fading = false; this.fadeAlpha = 1.0;
    const dz = getSubZone('light', 1);
    const dt = tanks.light;
    const pipeY = pipes.new_in.cy;
    const wp = [
      {x:this.x, y:this.y},
      {x:newZone.x + newZone.w/2, y:pipeY},
      {x:pipes.new_in.leftX + 2, y:pipeY},
      {x:pipes.new_in.rightX + 5, y:pipeY},
      {x:dz.x + dz.w/2, y:dz.y + dz.h/2},
    ];
    this.waypoints = wp; this.totalPathLen = 0;
    for (let i=1;i<wp.length;i++) { const dx=wp[i].x-wp[i-1].x,dy=wp[i].y-wp[i-1].y; this.totalPathLen+=Math.sqrt(dx*dx+dy*dy); }
  }

  recycleAsNew() {
    // growth2: 이동 없이 바로 light/casual/power 중 하나에 배치
    const segs = ['light','casual','power'];
    const s = segs[Math.random()*segs.length|0];
    this.segment = s; this.subType = 1;
    this.health = assignHealth(s);
    this.fading = false; this.fadingIn = false; this.migrating = false;
    this.fadeAlpha = 1.0; this.churnTimer = -1;
    const z = getSubZone(s, 1);
    if (z) { this.x = z.x + Math.random()*z.w; this.y = z.y + Math.random()*z.h; }
    this.vx = 0; this.vy = 0;
  }
  startNewMigration() {
    this.fadeAlpha = 1.0; this.fadingIn = false;
    this.migrating = true; this.migProgress = 0;
    this.migSpeed = CFG.migration.speed + Math.random()*0.001;
    this.migFrom = 'new';
    this.trail = [];

    if (this._goToUninstalled) {
      // 신규 → 미설치자: 좌측 통로 센터 → ↑ 수직 상승 → → 분리대 수평 우측 → ↑ 미설치자 하단 구멍 진입
      this.segment = 'uninstalled';
      this.migTo = 'uninstalled';
      const ut = mauTanks.uninstalled;
      const holeCX = (aquarium._mauHoleCX && aquarium._mauHoleCX.uninstalled) || (ut.x + ut.w/2);
      const corridorX = (aquarium.x + tanks.light.x) / 2; // Light 좌측 ↔ 아쿠아 좌벽 사이 센터
      const sepY = ut.y + ut.h + trackSepGlobal * 0.5;    // MAU↔Retention 분리대 센터
      const wp = [
        {x:this.x,    y:this.y},                  // 출발
        {x:corridorX, y:this.y},                  // → 통로 X로 수평 이동
        {x:corridorX, y:sepY},                    // ↑ 통로 따라 수직 상승
        {x:holeCX,    y:sepY},                    // → 분리대 따라 수평 우측
        {x:holeCX,    y:ut.y + ut.h - 2},         // ↑ 미설치자 하단 구멍 진입
        {x:ut.x + ut.w/2, y:ut.y + ut.h/2},      // 탱크 내부 안착
      ];
      this.waypoints = wp; this.totalPathLen = 0;
      for (let i=1;i<wp.length;i++) { const dx=wp[i].x-wp[i-1].x,dy=wp[i].y-wp[i-1].y; this.totalPathLen+=Math.sqrt(dx*dx+dy*dy); }
    } else {
      // 신규 → Light: 기존 new_in 파이프 경로
      this.segment = 'light';
      this.migTo = 'light';
      const pin = pipes.new_in;
      const dz = getSubZone('light', 1);
      const wp = [
        {x:this.x, y:this.y},
        {x:this.x, y:pin.cy},
        {x:pin.leftX+2, y:pin.cy},
        {x:pin.rightX+5, y:pin.cy},
        {x:dz.x+dz.w/2, y:pin.cy},
        {x:dz.x+dz.w/2, y:dz.y+dz.h/2},
      ];
      this.waypoints = wp; this.totalPathLen = 0;
      for (let i=1;i<wp.length;i++) { const dx=wp[i].x-wp[i-1].x,dy=wp[i].y-wp[i-1].y; this.totalPathLen+=Math.sqrt(dx*dx+dy*dy); }
    }
  }

  isMauTrack() {
    return this.segment === 'uninstalled' || this.segment === 'dormant' || this.segment === 'intermittent';
  }

  draw() {
    if (this.fadeAlpha <= 0) return;
    const alpha = this.migrating ? 0.5 : this.baseOpacity;
    const sr = this.radius * _particleScalePulse; // 주차 변경 시 스케일 펄스
    if (this.isMauTrack()) {
      // Outline bubble — white, no health color
      const a = this.fading ? alpha * this.fadeAlpha * 0.64 : alpha * 0.64;
      ctx.beginPath(); ctx.arc(this.x, this.y, sr + 0.5, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,255,255,${a})`;
      ctx.lineWidth = 0.9;
      ctx.stroke();
    } else {
      ctx.beginPath(); ctx.arc(this.x, this.y, sr, 0, Math.PI*2);
      ctx.fillStyle = this.getColor(alpha); ctx.fill();
    }
  }
}

// ═══ INIT ═══
let particles = [], signalEvents = [];

function initParticles() {
  particles = [];
  // Retention Track (filled dots): Light 280만 / Casual 300만 / Power 180만
  [{seg:'light',n:1400},{seg:'casual',n:1500},{seg:'power',n:900}].forEach(d => {
    for (let j=0;j<d.n;j++) { const p = new Particle(d.seg, 1); p._segIdx = j; particles.push(p); }
  });
  // MAU Track (outline bubbles): 미설치자 113만 / 장기미이용 110만 / 간헐이용 190만
  [{seg:'uninstalled',n:560},{seg:'dormant',n:550},{seg:'intermittent',n:950}].forEach(d => {
    for (let j=0;j<d.n;j++) { const p = new Particle(d.seg, 1); p._segIdx = j; particles.push(p); }
  });
}

// 주차별 파티클 표시 한계 — getSegData sub 값에 비례
function getWeekTargets(year, month, week) {
  const data = getSegData(year, month, week);
  const allDefs = [...data.defs, ...data.mauDefs];
  const num = (key) => {
    const d = allDefs.find(d => d.key === key);
    return d ? parseInt(d.sub) : 0;
  };
  const lerp = (v, inMin, inMax, outMin, outMax) => {
    const t = Math.max(0, Math.min(1, (v - inMin) / (inMax - inMin)));
    return Math.round(outMin + t * (outMax - outMin));
  };
  return {
    light:        lerp(num('light'),        265, 298,  650, 1400),
    casual:       lerp(num('casual'),       288, 318,  700, 1500),
    power:        lerp(num('power'),        172, 195,  350,  900),
    uninstalled:  lerp(num('uninstalled'),  106, 124,  200,  560),
    dormant:      lerp(num('dormant'),      101, 124,  200,  550),
    intermittent: lerp(num('intermittent'), 176, 206,  400,  950),
  };
}
let _segDrawTargets = getWeekTargets(2026, 4, 3);
let _segDrawCurrent = {..._segDrawTargets};
let _particleScalePulse = 1.0; // 주차 변경 시 1.0 → 2.0 → 1.0 펄스
let _particlePulseT = 1.0;     // 0~1 진행값 (1이면 종료)

// ═══ SPATIAL GRID ═══
const GC = 20; let grid = {};
function buildGrid() {
  grid = {};
  for (const p of particles) { if (p.migrating||p.fadeAlpha<=0) continue; const k=`${p.x/GC|0},${p.y/GC|0}`; (grid[k]||(grid[k]=[])).push(p); }
}
function applyRepulsion() {
  for (const p of particles) {
    if (p.migrating) continue;
    const gx=p.x/GC|0, gy=p.y/GC|0;
    let avgVx=0, avgVy=0, nCount=0;
    for (let dx=-1;dx<=1;dx++) for (let dy=-1;dy<=1;dy++) {
      const nb=grid[`${gx+dx},${gy+dy}`]; if(!nb) continue;
      for (const q of nb) {
        if (q===p||q.migrating) continue;
        // Skip repulsion across sub-zone walls
        if (p.segment===q.segment && p.subType!==q.subType) continue;
        const ex=p.x-q.x, ey=p.y-q.y, dSq=ex*ex+ey*ey;
        // Separation
        const md=(p.radius+q.radius)*CFG.physics.repDist/4;
        if (dSq<md*md&&dSq>0.1) { const d=Math.sqrt(dSq), f=(md-d)/md*CFG.physics.repulsion; p.vx+=(ex/d)*f; p.vy+=(ey/d)*f; }
        // Alignment — match neighbors' velocity
        if (dSq<400) { avgVx+=q.vx; avgVy+=q.vy; nCount++; }
      }
    }
    if (nCount>0) {
      p.vx += (avgVx/nCount - p.vx) * 0.02;
      p.vy += (avgVy/nCount - p.vy) * 0.02;
    }
  }
}

// ═══ GLOBAL AUDIO TICK ═══
let _audioCtx = null;
let _lastTrackSnap = -1;
let _trackDotScale = 1.0;
let _trackDotTarget = 1.0;
function tickSound() {
  if (navigator.vibrate) navigator.vibrate(4);
  try {
    if (!_audioCtx) _audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    const t = _audioCtx.currentTime;
    const o = _audioCtx.createOscillator();
    const g = _audioCtx.createGain();
    o.connect(g); g.connect(_audioCtx.destination);
    o.type = 'sine';
    o.frequency.setValueAtTime(140, t);
    o.frequency.exponentialRampToValueAtTime(80, t + 0.04);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.05, t + 0.008);
    g.gain.linearRampToValueAtTime(0.0001, t + 0.04);
    o.start(t); o.stop(t + 0.045);
  } catch(e){}
}

});

});

function applyMouseForce() {
  if (mouseX<0||drag.active) return;

  // Hand mode: only react when fingers are clearly spread
  if (handActive && fingerTips.length && fingerSpread > 0.4) {
    // Burst: sudden open → explosive scatter in random directions
    if (burstFrame > 0) {
      burstFrame--;
      const rad = 250;
      const str = 5.0;
      for (const p of particles) {
        if (p.migrating) continue;
        const dx=p.x-handX, dy=p.y-handY, dSq=dx*dx+dy*dy;
        if (dSq<rad*rad && dSq>1) {
          const angle = Math.random() * Math.PI * 2;
          const d=Math.sqrt(dSq), f=(1-d/rad)*str;
          p.vx += Math.cos(angle)*f;
          p.vy += Math.sin(angle)*f;
          p.scattered=30;
        }
      }
    }
    // Palm swipe: push particles in hand movement direction
    const handSpeed = Math.sqrt(handVX*handVX + handVY*handVY);
    if (handSpeed > 3) {
      const pushRad = 200;
      const pushStr = Math.min(handSpeed * 0.15, 5);
      const nx = handVX/handSpeed, ny = handVY/handSpeed;
      for (const p of particles) {
        if (p.migrating) continue;
        const dx=p.x-handX, dy=p.y-handY, dSq=dx*dx+dy*dy;
        if (dSq < pushRad*pushRad && dSq > 1) {
          const d = Math.sqrt(dSq), f = (1-d/pushRad) * pushStr;
          p.vx += nx * f;
          p.vy += ny * f;
          p.scattered = 20;
        }
      }
    }

    // Swirl: single finger circular motion → each subzone swirls (donut)
    if (fingerTips.length === 1 && Math.abs(swirlForce) > 0.05) {
      const str = swirlForce * 3.0;
      for (const p of particles) {
        if (p.migrating) continue;
        const z = getSubZone(p.segment, p.subType);
        if (!z) continue;
        const cx = z.x + z.w/2, cy = z.y + z.h/2;
        const dx = p.x - cx, dy = p.y - cy;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d > 1) {
          p.vx += (-dy/d) * str;
          p.vy += (dx/d) * str;
          p.scattered = 15;
        }
      }
    }

    // Chaos: triggered by swirl + spread fingers (단일 손가락 포인팅 중엔 스킵)
    if (chaosActive > 0 && fingerTips.length >= 2) {
      chaosActive--;
      const intensity = chaosActive / 120; // fades out
      const chaos = intensity * 8.0;
      for (const p of particles) {
        if (p.migrating) continue;
        const z = getSubZone(p.segment, p.subType);
        if (!z) continue;
        const cx = z.x + z.w/2, cy = z.y + z.h/2;
        const dx = p.x - cx, dy = p.y - cy;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d > 1) {
          const angle = Math.random() * Math.PI * 2;
          p.vx += Math.cos(angle) * chaos * (1 + Math.random());
          p.vy += Math.sin(angle) * chaos * (1 + Math.random());
          if (Math.random() < 0.3) {
            p.vx += (dx/d) * chaos * 2;
            p.vy += (dy/d) * chaos * 2;
          }
          if (Math.random() < 0.1) {
            p.vx *= -(0.5 + Math.random());
            p.vy *= -(0.5 + Math.random());
          }
          p.scattered = 40;
        }
      }
    }

    // Normal spread repulsion from fingertips
    const rad = 80 + fingerSpread * 140;
    const str = (fingerSpread - 0.4) * 6.0;
    for (const p of particles) {
      if (p.migrating) continue;
      for (const ft of fingerTips) {
        const dx=p.x-ft.x, dy=p.y-ft.y, dSq=dx*dx+dy*dy;
        if (dSq<rad*rad && dSq>1) {
          const d=Math.sqrt(dSq), f=(1-d/rad)*str;
          p.vx+=(dx/d)*f+(Math.random()-0.5)*f*0.5;
          p.vy+=(dy/d)*f+(Math.random()-0.5)*f*0.5;
          p.scattered=30;
        }
      }
    }
    return;
  }
  if (handActive) return; // closed hand = completely ignore

  // Normal mouse mode
  const rad=mouseDown?180:CFG.physics.mouseR, str=mouseDown?CFG.physics.mouseFC:CFG.physics.mouseF;
  for (const p of particles) {
    if(p.migrating) continue;
    const dx=p.x-mouseX,dy=p.y-mouseY,dSq=dx*dx+dy*dy;
    if(dSq<rad*rad&&dSq>1){
      const d=Math.sqrt(dSq),f=(1-d/rad)*str;
      p.vx+=(dx/d)*f+(Math.random()-0.5)*f*0.8;
      p.vy+=(dy/d)*f+(Math.random()-0.5)*f*0.8;
      p.scattered=30;
    }
  }
}
function applyDragForce() {
  drag.sx*=0.92; drag.sy*=0.92;
  if (Math.abs(drag.sx)<0.01&&Math.abs(drag.sy)<0.01) return;
  particles.forEach(p => { if(!p.migrating) { p.vx+=drag.sx*0.007; p.vy+=drag.sy*0.007; } });
}

// ═══ MIGRATION ═══
function tryMigrations() {
  const seg={power:[],casual:[],light:[],uninstalled:[],dormant:[],intermittent:[]};
  particles.forEach(p => { if(!p.migrating&&seg[p.segment]) seg[p.segment].push(p); });
  const R=CFG.migration.rates;
  function pick(a){return a[Math.random()*a.length|0];}

  // Segment migrations — Up: healthy/good only, Down: caution/danger only
  const upPool = arr => arr.filter(p=>p.health==='healthy'||p.health==='good');
  const downPool = arr => arr.filter(p=>p.health==='caution'||p.health==='danger');

  const lightUp=upPool(seg.light), casualUp=upPool(seg.casual);
  const powerDown=downPool(seg.power), casualDown=downPool(seg.casual);

  if (Math.random()<R.light_casual&&lightUp.length>5) pick(lightUp).startMigration('casual');
  if (Math.random()<R.casual_power&&casualUp.length>5) pick(casualUp).startMigration('power');
  if (Math.random()<R.power_casual&&powerDown.length>3) pick(powerDown).startMigration('casual');
  if (Math.random()<R.casual_light&&casualDown.length>5) pick(casualDown).startMigration('light');

  // Churn — Light가 주요 이탈 경로, Casual/Power는 극소량
  if (Math.random()<R.churn && seg.light.length>50) pick(seg.light).startMigration('churn');
  if (Math.random()<R.churn*0.06 && seg.casual.length>50) pick(seg.casual).startMigration('churn'); // 극소량
  if (Math.random()<R.churn*0.02 && seg.power.length>30) pick(seg.power).startMigration('churn'); // 거의 없음

  // MAU → Light (occasional conversion: 미설치자/장기미이용/간헐이용 → Light)
  if (Math.random()<0.003 && seg.uninstalled.length>5) pick(seg.uninstalled).startMigration('light');
  if (Math.random()<0.008 && seg.dormant.length>5) pick(seg.dormant).startMigration('light');
  if (Math.random()<0.014 && seg.intermittent.length>5) pick(seg.intermittent).startMigration('light');

  // MAU inter-tank (very occasional): 장기미이용 ↔ 간헐이용
  if (Math.random()<0.004 && seg.dormant.length>5) pick(seg.dormant).startMigration('intermittent');
  if (Math.random()<0.003 && seg.intermittent.length>5) pick(seg.intermittent).startMigration('dormant');
}

// ═══ DRAWING: Dashboard ═══
function drawDashboard() {

  const total=seg.power+seg.casual+seg.light;
  ctx.save();
  ctx.font='700 22px "YouandiNewKr"'; ctx.fillStyle='#fff'; ctx.textBaseline='middle'; ctx.textAlign='left';

// ── Monthly dummy data generator ──
function genMonthData(year, month) {
  // Deterministic pseudo-random based on year+month
  const base = year * 100 + month;
  const r = (i, min, max) => {
    let v = ((base * 1664525 + i * 22695477 + 1013904223) >>> 0) % (max - min + 1);
    return min + v;
  };
  const isCurrentMonth = year === 2026 && month === 4;
  // 5주차: 해당 월의 마지막 날이 29일 이상이면 5주 존재
  const lastDay = new Date(year, month, 0).getDate();
  const totalWeeks = lastDay >= 29 ? 5 : 4;
  const filled = isCurrentMonth ? 3 : totalWeeks;

  const makeWeeks = (seg) => Array.from({length:5}, (_, w) => {
    if (w >= filled) return null;
    if (seg === 'light')  return { up: r(w*9+1, 18, 28),  down: -r(w*9+2, 28, 42) };
    if (seg === 'casual') return { up: r(w*9+3, 13, 22),  down: -r(w*9+4,  9, 17) };
    return                       { up: 0,                  down: -r(w*9+6,  2,  7) };
  });

  return [
    { seg:'Light',  prev: r(11, 275, 295), weeks: makeWeeks('light')  },
    { seg:'Casual', prev: r(22, 292, 308), weeks: makeWeeks('casual') },
    { seg:'Power',  prev: r(33, 176, 190), weeks: makeWeeks('power')  },
  ];
}

// ── Track animation state ──
let _trackTo   = genMonthData(2026, 4);
let _trackFrom = null;
let _trackProg = 1.0;

function setTrackMonth(year, month) {
  _trackFrom = getTrackDisplay();
  trackYear  = year;
  trackMonth = month;
  _trackTo   = genMonthData(year, month);
  _trackProg = 0;
  // segWeek: 해당 월의 최신 주차로 자동 이동
  const _isCurrentMon = year === 2026 && month === 4;
  const _ld = new Date(year, month, 0).getDate();
  const _tw = _ld >= 29 ? 5 : 4;
  segWeek = _isCurrentMon ? 3 : _tw;
}

function getTrackDisplay() {
  if (_trackProg >= 1 || !_trackFrom) return _trackTo;
  const p = 1 - Math.pow(1 - _trackProg, 3); // ease-out cubic
  return _trackTo.map((td, si) => {
    const from = _trackFrom[si];
    return {
      seg: td.seg,
      prev: Math.round(from.prev + (td.prev - from.prev) * p),
      weeks: td.weeks.map((w, wi) => {
        const fw = from.weeks[wi];
        if (!w && !fw) return null;
        if (!fw) return { up: Math.round((w.up||0) * p), down: Math.round((w.down||0) * p) };
        if (!w)  return { up: Math.round((fw.up||0) * (1-p)), down: Math.round((fw.down||0) * (1-p)) };
        return { up: Math.round(fw.up + ((w.up||0) - fw.up) * p),
                 down: Math.round(fw.down + ((w.down||0) - fw.down) * p) };
      })
    };
  });
}

function getSegData(year, month, week) {
  // 주차별 결정적 난수: 동일 year/month/week → 동일 값
  function sr(i) {
    const s = Math.sin(year * 1.3 + month * 17.7 + week * 53.9 + i * 127.1) * 43758.5453;
    return s - Math.floor(s);
  }
  function ri(i, min, max) { return min + Math.round(sr(i) * (max - min)); }

  const lightSub    = ri(1,  265, 298);  const lightD  = ri(2,  12, 28);
  const casualSub   = ri(3,  288, 318);  const casualD = ri(4,   8, 23);
  const powerSub    = ri(5,  172, 195);  const powerD  = ri(6,   3, 14);
  const uninstSub   = ri(7,  106, 124);  const uninstD = ri(8,  14, 28);
  const dormantSub  = ri(9,  101, 124);  const dormantD= ri(10, 14, 28);
  const interSub    = ri(11, 176, 206);  const interD  = ri(12,  7, 19);

  const fmt  = (v, pos) => `${pos?'+':'-'}${v}만`;
  const fmtp = (v, base, pos) => `${pos?'+':'-'}${((v/base)*100).toFixed(1)}%`;
  const ct   = (v, pos) => `전월 동기 대비 ${v}만 ${pos?'증가':'감소'}`;

  return {
    defs: [
      {key:'light',  label:'Light',  sub:`${lightSub}만`,   sub2:'월 1~2회',    delta:fmt(lightD,false),  pct:fmtp(lightD,lightSub,false),   positive:false, changeText:ct(lightD,false)},
      {key:'casual', label:'Casual', sub:`${casualSub}만`,  sub2:'월 3~7회',    delta:fmt(casualD,true),  pct:fmtp(casualD,casualSub,true),   positive:true,  changeText:ct(casualD,true)},
      {key:'power',  label:'Power',  sub:`${powerSub}만`,   sub2:'월 8회 이상', delta:fmt(powerD,true),   pct:fmtp(powerD,powerSub,true),    positive:true,  changeText:ct(powerD,true)},
    ],
    mauDefs: [
      {key:'uninstalled',  label:'미설치자',   sub:`${uninstSub}만`,  sub2:'신규 발급 미로그인', delta:fmt(uninstD,false),  pct:fmtp(uninstD,uninstSub,false),   positive:false, invertSign:true, changeText:ct(uninstD,false)},
      {key:'dormant',      label:'장기 미이용', sub:`${dormantSub}만`, sub2:'3개월 초과',         delta:fmt(dormantD,true),  pct:fmtp(dormantD,dormantSub,true),   positive:true,  invertSign:true, changeText:ct(dormantD,true)},
      {key:'intermittent', label:'간헐 이용',   sub:`${interSub}만`,   sub2:'3개월 내 비연속',    delta:fmt(interD,false),   pct:fmtp(interD,interSub,false),    positive:false, invertSign:true, changeText:ct(interD,false)},
    ],
  };
}

// ═══ DRAWING: Pipes ═══
function drawVPipe(cx,y1,y2,color,frame,dir) {
  const hw=CFG.pipe.width/2;
  ctx.save();
  ctx.strokeStyle=`rgba(255,255,255,${LINE.subtle})`; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(cx-hw,y1);ctx.lineTo(cx-hw,y2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+hw,y1);ctx.lineTo(cx+hw,y2);ctx.stroke();
  // Chevrons
  for(let i=0;i<3;i++){
    const ph=((frame*0.004*dir+i/3)%1+1)%1;
    const cy=y1+(y2-y1)*ph, sz=3;
    ctx.beginPath();
    if(dir>0){ctx.moveTo(cx-sz,cy-sz);ctx.lineTo(cx,cy);ctx.lineTo(cx+sz,cy-sz);}
    else{ctx.moveTo(cx-sz,cy+sz);ctx.lineTo(cx,cy);ctx.lineTo(cx+sz,cy+sz);}
    ctx.strokeStyle=`rgba(${color},${0.35*(1-Math.abs(ph-0.5)*2)})`;ctx.lineWidth=1;ctx.stroke();
  }
  ctx.restore();
}
function drawHPipe(cy,x1,x2,color,frame,dir) {
  const hw=CFG.pipe.width/2;
  ctx.save();
  ctx.fillStyle='rgba(255,255,255,0.01)';ctx.beginPath();ctx.roundRect(x1,cy-hw,x2-x1,CFG.pipe.width,3);ctx.fill();
  ctx.strokeStyle=`rgba(255,255,255,${LINE.subtle})`;ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(x1,cy-hw);ctx.lineTo(x2,cy-hw);ctx.stroke();
  ctx.beginPath();ctx.moveTo(x1,cy+hw);ctx.lineTo(x2,cy+hw);ctx.stroke();
  for(let i=0;i<3;i++){
    const ph=((frame*0.004*dir+i/3)%1+1)%1;
    const cx2=x1+(x2-x1)*ph, sz=3;
    ctx.beginPath();
    if(dir>0){ctx.moveTo(cx2-sz,cy-sz);ctx.lineTo(cx2,cy);ctx.lineTo(cx2-sz,cy+sz);}
    else{ctx.moveTo(cx2+sz,cy-sz);ctx.lineTo(cx2,cy);ctx.lineTo(cx2+sz,cy+sz);}
    ctx.strokeStyle=`rgba(${color},${0.35*(1-Math.abs(ph-0.5)*2)})`;ctx.lineWidth=1;ctx.stroke();
  }
  ctx.restore();
}

function drawAllPipes(frame) {
  const g='200,200,200', r='240,75,75';
  // 신규 → Light
  if (pipes.new_in.cy) drawHPipe(pipes.new_in.cy, pipes.new_in.leftX, pipes.new_in.rightX, g, frame, 1);
  // Power → 이탈
  if (pipes.churn_out.cy) drawHPipe(pipes.churn_out.cy, pipes.churn_out.leftX, pipes.churn_out.rightX, r, frame, 1);
  // Light ↔ Casual
  if (pipes.lc) {
    drawHPipe(pipes.lc.cy, pipes.lc.leftX, pipes.lc.rightX, g, frame, 1);  // Light→Casual
    drawHPipe(pipes.lc.cy, pipes.lc.leftX, pipes.lc.rightX, g, frame, -1); // Casual→Light
  }
  // Casual ↔ Power
  if (pipes.cp) {
    drawHPipe(pipes.cp.cy, pipes.cp.leftX, pipes.cp.rightX, g, frame, 1);  // Casual→Power
    drawHPipe(pipes.cp.cy, pipes.cp.leftX, pipes.cp.rightX, g, frame, -1); // Power→Casual
  }
  // 장기미이용 ↔ 간헐이용
  if (pipes.di && pipes.di.cy) {
    drawHPipe(pipes.di.cy, pipes.di.leftX, pipes.di.rightX, g, frame, 1);  // dormant→intermittent
    drawHPipe(pipes.di.cy, pipes.di.leftX, pipes.di.rightX, g, frame, -1); // intermittent→dormant
  }
  // Light 하단 이탈 채널 (Light → 이탈, 아쿠아리움 아래)
  // light_churn pipe: 파티클 경로는 유지, 시각적 파이프관은 미표시
}

canvas.addEventListener('click', e => {
  const ap=actionPanel;

      if (r && e.clientX>=r.x&&e.clientX<=r.x+r.w&&e.clientY>=r.y&&e.clientY<=r.y+r.h) {

function wrapText(text, maxW) {
  let line='', lines=[];
  for(const ch of text) {
    if(ch==='\n'){lines.push(line);line='';continue;}
    const test=line+ch;
    if(ctx.measureText(test).width>maxW&&line.length>0){lines.push(line);line=ch;}
    else line=test;
  }
  if(line) lines.push(line);
  return lines;
}

// ═══ DRAWING: Move Tracking Tab ═══
let trackGeom = []; // chart geometry per segment, updated each frame

function getWeekDates(year, month) {
  // Returns dates of Mondays (or 1st) for each week slot
  const firstDay = new Date(year, month-1, 1);
  const dates = [];
  let d = new Date(firstDay);
  for (let w = 0; w < 5; w++) {
    dates.push(`${month}월 ${d.getDate()}일`);
    d.setDate(d.getDate() + 7);
    if (d.getMonth() !== month-1) break;
  }
  while (dates.length < 5) dates.push(null);
  return dates;
}

function drawMoveTracking() {
  const a = aquarium;
  const titleH = 58;
  const pad = 16;
  const contentX = a.x + pad;
  const contentY = a.y + titleH;
  const contentW = a.w - pad * 2;
  const contentH = a.h - titleH - pad;

  const segGap = pad + 4;
  const sH = (contentH - segGap * 2) / 3;

  // ── Month navigator ──
  const a2 = aquarium;
  const navY = a2.y + 29; // 탭 세로 센터 (contY=15 + contPad=3 + tabH/2=11)
  const navX = a2.x + pad;
  const arrowW = 16, arrowH = 16;
  const monthLabel = `'${String(trackYear).slice(2)}년 ${trackMonth}월`;
  ctx.save();
  ctx.font = '600 13px "SF Pro Display",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif';
  const mw = ctx.measureText(monthLabel).width;
  const totalW = arrowW + 6 + mw + 6 + arrowW;

  function isHover(r) { return r && mouseX>=r.x&&mouseX<=r.x+r.w&&mouseY>=r.y&&mouseY<=r.y+r.h; }
  const nextDisabled = trackYear === 2026 && trackMonth >= 4;

  // Prev arrow
  const prevR = { x: navX, y: navY - arrowH/2, w: arrowW, h: arrowH };
  trackMonthRects.prev = prevR;
  const prevHov = isHover(prevR);
  ctx.beginPath(); ctx.arc(prevR.x + arrowW/2, navY, arrowW/2, 0, Math.PI*2);
  ctx.fillStyle = prevHov ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.08)'; ctx.fill();
  ctx.fillStyle = prevHov ? 'rgba(255,255,255,1)' : 'rgba(255,255,255,0.5)';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('‹', prevR.x + arrowW/2, navY);

  // Month label
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.fillText(monthLabel, navX + arrowW + 6 + mw/2, navY);

  // Next arrow
  const nextR = { x: navX + arrowW + 6 + mw + 6, y: navY - arrowH/2, w: arrowW, h: arrowH };
  trackMonthRects.next = nextR;
  const nextHov = isHover(nextR) && !nextDisabled;
  ctx.beginPath(); ctx.arc(nextR.x + arrowW/2, navY, arrowW/2, 0, Math.PI*2);
  ctx.fillStyle = nextDisabled ? 'rgba(255,255,255,0.04)' : nextHov ? 'rgba(255,255,255,0.14)' : 'rgba(255,255,255,0.08)'; ctx.fill();
  ctx.fillStyle = nextDisabled ? 'rgba(255,255,255,0.2)' : nextHov ? 'rgba(255,255,255,1)' : 'rgba(255,255,255,0.5)';
  ctx.fillText('›', nextR.x + arrowW/2, navY);
  ctx.restore();

  // Advance animation
  if (_trackProg < 1) _trackProg = Math.min(1, _trackProg + 0.05);
  const displayData = getTrackDisplay();
  const weekDates = getWeekDates(trackYear, trackMonth);

  trackGeom = [];
  displayData.forEach((td, si) => {
    const sy = contentY + si * (sH + segGap);
    const hPad = 14;

    ctx.save();
    ctx.beginPath(); ctx.roundRect(contentX, sy, contentW, sH, 10);
    ctx.strokeStyle = `rgba(255,255,255,${LINE.default})`; ctx.lineWidth = 1; ctx.stroke();

    const hY = sy + 18;

    // Segment name
    ctx.font = '700 13px "SF Pro Display",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(td.seg, contentX + hPad, hY);
    const nameW = ctx.measureText(td.seg).width;

    // Prev MAU
    ctx.font = '400 10px "SF Pro Display",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.fillText(`전월 마감 ${td.prev}만`, contentX + hPad + nameW + 8, hY);


    // Chart area
    const yAxisW = 28;
    const chartX = contentX + hPad + yAxisW;
    const chartW = contentW - hPad * 2 - yAxisW;
    const chartTop = sy + 34;
    const chartH = sH - 34 - 22;
    const zeroY = chartTop + chartH / 2;

    // Max value for scale
    const validWeeks = td.weeks.filter(w => w !== null);
    const allVals = validWeeks.flatMap(w => [Math.abs(w.up || 0), Math.abs(w.down || 0)]);
    const maxV = Math.ceil(Math.max(...allVals, 1) / 5) * 5;
    const scale = (chartH / 2) / maxV;

    // Grid lines
    ctx.setLineDash([3, 6]);
    ctx.lineWidth = 1;
    [-2, -1, 1, 2].forEach(m => {
      const gy = zeroY - m * scale * (maxV / 2);
      if (gy >= chartTop && gy <= chartTop + chartH) {
        ctx.beginPath(); ctx.moveTo(chartX, gy); ctx.lineTo(chartX + chartW, gy);
        ctx.strokeStyle = `rgba(255,255,255,${LINE.ghost})`; ctx.stroke();
      }
    });
    ctx.setLineDash([]);

    // Zero line
    ctx.beginPath(); ctx.moveTo(chartX, zeroY); ctx.lineTo(chartX + chartW, zeroY);
    ctx.strokeStyle = `rgba(255,255,255,${LINE.emphasis})`; ctx.lineWidth = 1; ctx.stroke();

    // Y-axis label
    ctx.font = '9px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.22)';
    ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
    ctx.fillText('0만', chartX - 4, zeroY);

    // Bars + net line
    const numWeeks = 5;
    const weekW = chartW / numWeeks;
    const barW = Math.min(weekW * 0.35, 28);
    const netPoints = [];

    td.weeks.forEach((w, wi) => {
      const wx = chartX + wi * weekW + weekW / 2;
      const isFuture = w === null;

      if (!isFuture && w) {
        if ((w.up || 0) > 0) {
          const bh = w.up * scale;
          ctx.beginPath(); ctx.roundRect(wx - barW / 2, zeroY - bh, barW, bh, [3, 3, 0, 0]);
          ctx.fillStyle = COLOR.inflow; ctx.fill();
        }
        if ((w.down || 0) < 0) {
          const bh = Math.abs(w.down) * scale;
          ctx.beginPath(); ctx.roundRect(wx - barW / 2, zeroY, barW, bh, [0, 0, 3, 3]);
          ctx.fillStyle = COLOR.outflow; ctx.fill();
        }
        const netV = (w.up || 0) + (w.down || 0);
        netPoints.push({ x: wx, y: zeroY - netV * scale });
      } else {
        netPoints.push(null);
      }

      // Week label
      ctx.font = '9px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
      ctx.fillStyle = isFuture ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.28)';
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(`${wi + 1}주차`, wx, chartTop + chartH + 5);
    });

    // Net change line
    const pts = netPoints.filter(p => p !== null);
    if (pts.length > 1) {
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.strokeStyle = `rgba(255,255,255,${LINE.active})`; ctx.lineWidth = 1.5; ctx.stroke();
      pts.forEach(p => {
        ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.fill();
      });
    }

    // Store geometry for hover detection
    trackGeom.push({ si, sy, sH, chartX, chartW, chartTop, chartH, zeroY, weekW, scale, seg: td.seg });

    ctx.restore();
  });

  // ── Tooltip helper ──
  function drawTrackTooltip(g, wi, w, dotScale) {
    const wx = g.chartX + wi * g.weekW + g.weekW / 2;
    const up = w.up || 0, down = w.down || 0, net = up + down;

    // Crosshair
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(wx, g.chartTop); ctx.lineTo(wx, g.chartTop + g.chartH);
    ctx.strokeStyle = `rgba(255,255,255,${LINE.emphasis})`; ctx.lineWidth = 1; ctx.stroke();
    ctx.restore();

    // Active week label highlight
    ctx.save();
    ctx.font = '600 9px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(`${wi + 1}주차`, wx, g.chartTop + g.chartH + 5);
    ctx.restore();

    // Net dot
    const netV = (w.up || 0) + (w.down || 0);
    const dotR = 3 * dotScale;
    ctx.save();
    ctx.beginPath(); ctx.arc(wx, g.zeroY - netV * g.scale, dotR, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,1)'; ctx.fill();
    ctx.restore();

    // Tooltip box
    const isPower = g.seg === 'Power';
    const tW = 190, tH = isPower ? 76 : 116, tPad = 16;
    let tx = wx + 18, ty = g.sy + 10;
    if (tx + tW > g.chartX + g.chartW - 4) tx = wx - tW - 18;

    ctx.save();
    ctx.beginPath(); ctx.roundRect(tx, ty, tW, tH, 10);
    ctx.fillStyle = 'rgba(18,18,18,0.94)'; ctx.fill();
    ctx.strokeStyle = `rgba(255,255,255,${LINE.subtle})`; ctx.lineWidth = 1; ctx.stroke();

    ctx.font = '600 11px "SF Pro Display",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillText(`${weekDates[wi] || (wi+1)+'주차'} (${wi+1}주차)`, tx + tPad, ty + tPad);

    const col1X = tx + tPad, col2X = tx + tW / 2;
    ctx.font = '400 9px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.fillText(isPower ? '하향 이동' : '상향 이동', col1X, ty + tPad + 24);
    if (!isPower) ctx.fillText('하향 이동', col2X, ty + tPad + 24);

    ctx.font = '700 15px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
    if (isPower) {
      ctx.fillStyle = COLOR.outflow;
      ctx.fillText(`${down}만`, col1X, ty + tPad + 38);
    } else {
      ctx.fillStyle = COLOR.inflow;
      ctx.fillText(up > 0 ? `+${up}만` : `${up}만`, col1X, ty + tPad + 38);
    }
    if (!isPower) {
      ctx.fillStyle = COLOR.outflow;
      ctx.fillText(`${down}만`, col2X, ty + tPad + 38);

      ctx.beginPath();
      ctx.moveTo(tx + tPad, ty + tPad + 66); ctx.lineTo(tx + tW - tPad, ty + tPad + 66);
      ctx.strokeStyle = `rgba(255,255,255,${LINE.subtle})`; ctx.stroke();

      ctx.font = '700 14px "SF Pro Display",-apple-system,BlinkMacSystemFont,sans-serif';
      ctx.textAlign = 'left';
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.fillText('순변화', tx + tPad, ty + tPad + 78);
      const netLabelW = ctx.measureText('순변화  ').width;
      ctx.fillStyle = net >= 0 ? COLOR.inflow : COLOR.outflow;
      ctx.fillText(`${net >= 0 ? '+' : ''}${net}만`, tx + tPad + netLabelW, ty + tPad + 78);
    }
    ctx.restore();
  }

  // ── Hover or default tooltip per segment ──
  _trackDotTarget = 1.0;
  trackGeom.forEach((g, gi) => {
    const td = displayData[gi];
    const inChart = mouseX >= g.chartX && mouseX <= g.chartX + g.chartW
                 && mouseY >= g.sy && mouseY <= g.sy + g.sH;
    if (inChart && mouseX > -900) {
      const wi = Math.max(0, Math.min(4, Math.floor((mouseX - g.chartX) / g.weekW)));
      const w = td.weeks[wi];
      if (!w) {
        // future week — show default
        const latestWi = td.weeks.reduce((acc, w2, i) => w2 !== null ? i : acc, 0);
        drawTrackTooltip(g, latestWi, td.weeks[latestWi], 2.0);
        return;
      }
      const snapKey = gi * 10 + wi;
      if (snapKey !== _lastTrackSnap) { tickSound(); _lastTrackSnap = snapKey; _trackDotScale = 1.0; }
      _trackDotTarget = 2.0;
      drawTrackTooltip(g, wi, w, _trackDotScale);
    } else {
      const latestWi = td.weeks.reduce((acc, w2, i) => w2 !== null ? i : acc, 0);
      const w = td.weeks[latestWi];
      if (w) drawTrackTooltip(g, latestWi, w, 2.0);
    }
  });
  // Lerp dot scale once per frame
  _trackDotScale += (_trackDotTarget - _trackDotScale) * 0.14;
}

// ═══ DRAWING: Connecting Lines ═══
function drawConnLines() {
  let cnt=0; const mx=160; ctx.save(); ctx.lineWidth=0.5;
  for(const key in grid){if(cnt>=mx)break;const cell=grid[key];if(!cell||cell.length<2)continue;
    for(let i=0;i<cell.length&&cnt<mx;i++)for(let j=i+1;j<cell.length&&cnt<mx;j++){
      const a=cell[i],b=cell[j]; if(a.migrating||b.migrating||a.segment!==b.segment)continue;
      const dx=a.x-b.x,dy=a.y-b.y,dSq=dx*dx+dy*dy;
      if(dSq<169){const al=(1-Math.sqrt(dSq)/13)*0.045;const ch=HEALTH[a.health];
        ctx.strokeStyle=`rgba(${ch.r},${ch.g},${ch.b},${al})`;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();cnt++;}
    }
  } ctx.restore();
}

  function lerp(a, b, t) { return a + t*(b-a); }

  function dayToSvgX(day) {
    if (day <= 1)  return WEEK_XS[0];
    if (day >= 29) return WEEK_XS[4];
    for (let i=0; i<4; i++) {
      if (day >= WEEK_DAYS[i] && day < WEEK_DAYS[i+1]) {
        const t = (day - WEEK_DAYS[i]) / (WEEK_DAYS[i+1] - WEEK_DAYS[i]);

      const val=Math.round((botV+frac*(topV-botV))/10)*10;

      const line=document.createElementNS('http://www.w3.org/2000/svg','line');
      line.setAttribute('x1','80');line.setAttribute('x2','1260');
      line.setAttribute('y1',y);line.setAttribute('y2',y);
      line.setAttribute('stroke',isTop?'rgba(255,255,255,0.06)':'rgba(255,255,255,0.05)');
      line.setAttribute('stroke-width','1');
      g.appendChild(line);
      const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('x','68');txt.setAttribute('y',y+4);txt.setAttribute('text-anchor','end');
      txt.setAttribute('fill','rgba(255,255,255,0.15)');
      txt.setAttribute('font-family',ff);txt.setAttribute('font-size','10');
      txt.textContent=`${val}만`;
      g.appendChild(txt);
    });
  }

  // ── 연간 정적 차트 (MAU + DAU, 2018~2025.6) ──
  // [드래그 복원 메모] yearlyRangeStart/End + buildYearlyPts + refreshYearly 함수들이
  // 아래에 남아있음. switchChartMode에서 yearly 분기에 drag 이벤트(initChart 내부
  // panActive 블록) 재활성화 + yearlyLayer 대신 기존 chart path 사용하면 복원 가능.
  const YEARLY_DATA = [
    {year:'2018',   x:80,   mau:249, dau:64,  key:true,  appLabel:'App 2.0'},
    {year:'2019',   x:249,  mau:362, dau:91,  key:false},
    {year:'2020',   x:417,  mau:446, dau:112, key:true,  appLabel:'App 3.0'},
    {year:'2021',   x:586,  mau:523, dau:132, key:false},
    {year:'2022',   x:754,  mau:589, dau:143, key:false},
    {year:'2023',   x:923,  mau:639, dau:150, key:false},
    {year:'2024',   x:1091, mau:715, dau:165, key:false},
    {year:'2025.6', x:1260, mau:732, dau:170, key:true},
  ];
  const yScaleYearly = v => 20 + (1 - v / 800) * 360;

  function svgEl(tag)       { return document.createElementNS('http://www.w3.org/2000/svg', tag); }
  function setA(el, attrs)  { Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k, v)); }
  function mkLine(x1,y1,x2,y2,stroke,opts={}) {
    const l=svgEl('line');
    setA(l,{x1,y1:y1.toFixed?y1.toFixed(1):y1,x2,y2:y2.toFixed?y2.toFixed(1):y2,stroke,'stroke-width':opts.sw||1,...(opts.dash?{'stroke-dasharray':opts.dash}:{})});
    return l;
  }
  function mkText(x,y,txt,opts={}) {
    const t=svgEl('text');
    setA(t,{x,y:y.toFixed?y.toFixed(1):y,'text-anchor':opts.anchor||'middle',
      fill:opts.fill||'rgba(255,255,255,0.35)',
      'font-family':"'SF Pro Display',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif",
      'font-size':opts.size||'11','font-weight':opts.bold?'700':'400'});
    t.textContent=txt; return t;
  }

  function renderYearlyChart(svg) {
    const g = svg.querySelector('#yearlyLayer');
    g.innerHTML = '';

    const FF = "'SF Pro Display',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif";
    const GREEN = '#50d278';

    // 격자선
    [200,400,600,800].forEach(v => {
      const y = yScaleYearly(v);
      g.appendChild(mkLine(80,y,1260,y,'rgba(255,255,255,0.04)'));
    });

    // 수직 점선 (key years)
    YEARLY_DATA.filter(d=>d.key).forEach(d => {
      g.appendChild(mkLine(d.x,20,d.x,400,'rgba(255,255,255,0.15)',{dash:'3,3'}));
    });

    // catmull-rom 경로 생성
    function buildPath(pts) {
      let d=`M${pts[0][0]},${pts[0][1].toFixed(1)}`;
      for(let i=0;i<pts.length-1;i++){
        const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(pts.length-1,i+2)];
        const cp1x=p1[0]+(p2[0]-p0[0])*0.25, cp1y=p1[1]+(p2[1]-p0[1])*0.25;
        const cp2x=p2[0]-(p3[0]-p1[0])*0.25, cp2y=p2[1]-(p3[1]-p1[1])*0.25;
        d+=` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2[0]},${p2[1].toFixed(1)}`;
      }
      return d;
    }

    // MAU 선
    const mauPath=svgEl('path');
    setA(mauPath,{d:buildPath(YEARLY_DATA.map(d=>[d.x,yScaleYearly(d.mau)])),fill:'none',stroke:'rgba(255,255,255,0.4)','stroke-width':'2'});
    g.appendChild(mauPath);

    // DAU 선
    const dauPath=svgEl('path');
    setA(dauPath,{d:buildPath(YEARLY_DATA.map(d=>[d.x,yScaleYearly(d.dau)])),fill:'none',stroke:'rgba(255,255,255,0.25)','stroke-width':'2'});
    g.appendChild(dauPath);

    // MAU 점 + 레이블
    YEARLY_DATA.forEach((d,i) => {
      const y=yScaleYearly(d.mau);
      const isKey=d.key, r=isKey?7:5;
      const c=svgEl('circle');
      setA(c,{cx:d.x,cy:y.toFixed(1),r,fill:isKey?GREEN:'rgba(255,255,255,0)',stroke:isKey?GREEN:'rgba(255,255,255,0.35)','stroke-width':'2'});
      g.appendChild(c);
      const lbl=mkText(d.x,y-14,d.mau,{fill:isKey?GREEN:'rgba(255,255,255,0.45)',size:isKey?'15':'11',bold:isKey,anchor:'middle'});
      g.appendChild(lbl);
      // 첫 번째 키 포인트 왼쪽에 MAU 레이블
      if (i===0 && isKey) {
        g.appendChild(mkText(d.x-20, y-14, 'MAU', {fill:'rgba(255,255,255,0.3)', size:'11', bold:true, anchor:'end'}));
      }
    });

    // DAU 사각형 마커 + 레이블
    YEARLY_DATA.forEach((d,i) => {
      const y=yScaleYearly(d.dau);
      const isKey=d.key, sz=isKey?11:8;
      const rect=svgEl('rect');
      setA(rect,{x:d.x-sz/2,y:(y-sz/2).toFixed(1),width:sz,height:sz,
        fill:isKey?GREEN:'rgba(255,255,255,0)',stroke:isKey?GREEN:'rgba(255,255,255,0.35)','stroke-width':'2'});
      g.appendChild(rect);
      const lbl=mkText(d.x,y+20,d.dau,{fill:isKey?GREEN:'rgba(255,255,255,0.45)',size:isKey?'15':'11',bold:isKey,anchor:'middle'});
      g.appendChild(lbl);
      // 첫 번째 키 포인트 왼쪽에 DAU 레이블
      if (i===0 && isKey) {
        g.appendChild(mkText(d.x-20, y+20, 'DAU', {fill:'rgba(255,255,255,0.3)', size:'11', bold:true, anchor:'end'}));
      }
    });

    // X축 연도 레이블
    YEARLY_DATA.forEach(d => {
      g.appendChild(mkText(d.x,405,d.year,{fill:d.key?GREEN:'rgba(255,255,255,0.3)',size:d.key?'12':'11',bold:d.key,anchor:'middle'}));
      if(d.appLabel) g.appendChild(mkText(d.x,418,d.appLabel,{fill:GREEN,size:'10',bold:true,anchor:'middle'}));
    });
  }

  function refreshYearly() {
    const svg=detailOverlay.querySelector('#chartSvg');
    buildYearlyPts(0); // yearlyYDyn 갱신
    wPts=buildYearlyPts(0); dPts=buildYearlyPts(1);
    morphProg=0; setMorph(0);
    renderXLabels(svg,getConfig()); renderDots(svg,getConfig());
    refreshYearlyDynAxis(svg);
    lastSnap=-1;
  }

  function switchChartMode(mode) {
    chartMode = mode;
    if (mode === 'yearly') yearlyRangeStart = 84; // 탭 클릭 시 초기화
    const cfg = getConfig();
    const tabW = 'background:#fff;color:#0a0a0a;border:none;border-radius:6px;padding:5px 14px;font:600 12px/1 "SF Pro Display",-apple-system,sans-serif;cursor:pointer;transition:all 0.2s;';
    const tabI = 'background:transparent;color:rgba(255,255,255,0.4);border:none;border-radius:6px;padding:5px 14px;font:600 12px/1 "SF Pro Display",-apple-system,sans-serif;cursor:pointer;transition:all 0.2s;';
    document.getElementById('tabWeekly').style.cssText  = mode==='weekly'  ? tabW : tabI;
    document.getElementById('tabMonthly').style.cssText = mode==='monthly' ? tabW : tabI;
    document.getElementById('tabYearly').style.cssText  = mode==='yearly'  ? tabW : tabI;

    applyConfig(cfg);

    const svg = detailOverlay.querySelector('#chartSvg');
    svg.querySelector('#activeDotCur').setAttribute('r','0');
    svg.querySelector('#activeDotPrev').setAttribute('r','0');
    crosshair.style.display = 'none';
    tooltip.style.display = 'none';

    const isYearly = mode === 'yearly';
    svg.querySelector('#staticYAxis').style.display  = isYearly ? 'none' : '';
    svg.querySelector('#dynamicYAxis').style.display = 'none';
    svg.querySelector('#yearlyLayer').style.display  = isYearly ? '' : 'none';
    // 연간: 메인 차트 path 비움, 일반 dot/xLabel 숨김
    if (isYearly) {
      svg.querySelector('#chartPathCur').setAttribute('d','');
      svg.querySelector('#chartPathPrev').setAttribute('d','');
      svg.querySelectorAll('.wdot-cur,.wdot-prev').forEach(d=>d.remove());
      svg.querySelector('#xLabels').innerHTML='';
      renderYearlyChart(svg);
      svg.style.cursor = 'crosshair';
      lastSnap = -1;
      return;
    }
    svg.style.cursor = 'crosshair';

    if (mode === 'weekly') {
      wPts = buildPts(0); dPts = buildPts(1);
    } else {
      wPts = buildMonthlyPts(0); dPts = buildMonthlyPts(1);
    }
    renderXLabels(svg, cfg);
    renderDots(svg, cfg);
    morphProg = 0; setMorph(0);
    lastSnap = -1;
  }

  // ── 차트 모핑 ──
  function yFor(v) { return 20 + (850 - v) * 1.2; }

  const ANCHOR_DAYS = [1, 8, 15, 22, 29];

  // 앵커 사이 중간에서 최대, 앵커에서 0인 envelope
  function noiseEnv(day) {
    for (let i = 0; i < ANCHOR_DAYS.length-1; i++) {
      if (day >= ANCHOR_DAYS[i] && day <= ANCHOR_DAYS[i+1]) {
        const t = (day - ANCHOR_DAYS[i]) / (ANCHOR_DAYS[i+1] - ANCHOR_DAYS[i]);
        return Math.sin(t * Math.PI);
      }
    }
    return 0;
  }

  // 구간별 방향 (완만한 단일 호)
  const segDir = [[1,-0.6],[- 0.5,0.7],[0.8,-0.4],[-0.6,0.5]];

  function buildPts(noiseAmp) {
    const cur = [], prev = [];
    for (let day = 1; day <= 30; day++) {
      const x = dayToSvgX(day);
      const vCur  = interpDay(day, 'cur');
      const vPrev = interpDay(day, 'prev');
      const env = noiseEnv(day);
      // 구간 인덱스
      let si = 0;
      for (let i=0;i<ANCHOR_DAYS.length-1;i++) if(day>=ANCHOR_DAYS[i]&&day<=ANCHOR_DAYS[i+1]) si=i;
      const nC = env * 6 * segDir[si][0] * noiseAmp;
      const nP = env * 5 * segDir[si][1] * noiseAmp;
      cur.push({x, y: yFor(vCur)  + nC * 1.2});
      prev.push({x, y: yFor(vPrev) + nP * 1.2});
    }
    return {cur, prev};
  }

  function catmull(pts) {
    let d = `M${pts[0].x},${pts[0].y.toFixed(1)}`;
    for (let i = 0; i < pts.length-1; i++) {
      const p0 = pts[Math.max(0,i-1)], p1 = pts[i];
      const p2 = pts[i+1], p3 = pts[Math.min(pts.length-1,i+2)];
      const cp1x = p1.x + (p2.x-p0.x)*0.35;
      const cp1y = p1.y + (p2.y-p0.y)*0.35;
      const cp2x = p2.x - (p3.x-p1.x)*0.35;
      const cp2y = p2.y - (p3.y-p1.y)*0.35;
      d += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2.x},${p2.y.toFixed(1)}`;
    }
    return d;
  }

  function interpPts(a, b, t) {
    return a.map((p,i) => ({x: p.x, y: p.y + (b[i].y - p.y)*t}));
  }

  let wPts = buildPts(0);
  let dPts = buildPts(1);
  let morphProg = 0, morphAnim = null;

  function setMorph(t) {
    morphProg = t;
    const svg = detailOverlay.querySelector('#chartSvg');
    if (!svg) return;
    const eased = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    svg.querySelector('#chartPathCur').setAttribute('d',  catmull(interpPts(wPts.cur,  dPts.cur,  eased)));
    svg.querySelector('#chartPathPrev').setAttribute('d', catmull(interpPts(wPts.prev, dPts.prev, eased)));
  }

  function animateMorph(target, dur) {
    if (morphAnim) cancelAnimationFrame(morphAnim);
    const from = morphProg, t0 = performance.now();
    function step(now) {
      const p = Math.min(1, (now-t0)/dur);
      setMorph(from + (target-from)*p);
      if (p < 1) morphAnim = requestAnimationFrame(step);
    }
    morphAnim = requestAnimationFrame(step);
  }

  function initChart() {
    const svg = detailOverlay.querySelector('#chartSvg');
    if (!svg) return;

    // 초기 라벨/점 렌더링 (주간)
    renderXLabels(svg, getConfig());
    renderDots(svg, getConfig());
    setMorph(0);
    svg.appendChild(crosshair);

    const activeDotCur  = svg.querySelector('#activeDotCur');
    const activeDotPrev = svg.querySelector('#activeDotPrev');

    let dotShowTimer = null;
    svg.addEventListener('mouseenter', () => {
      if (chartMode === 'yearly') return;
      animateMorph(1, 250);
      svg.querySelectorAll('.wdot-cur').forEach(d => d.setAttribute('r','0'));
      svg.querySelectorAll('.wdot-prev').forEach(d => d.setAttribute('r','0'));
      dotShowTimer = setTimeout(() => {
        activeDotCur.setAttribute('r','5');
        activeDotPrev.setAttribute('r','4');
      }, 250);
    });
    svg.addEventListener('mouseleave', () => {
      if (chartMode === 'yearly') return;
      clearTimeout(dotShowTimer);
      animateMorph(0, 200);
      svg.querySelectorAll('.wdot-cur').forEach(d => d.setAttribute('r','5'));
      svg.querySelectorAll('.wdot-prev').forEach(d => d.setAttribute('r','4'));
      activeDotCur.setAttribute('r','0');
      activeDotPrev.setAttribute('r','0');
    });

    function onMove(e) {
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const rect = svg.getBoundingClientRect();
      const svgX = (clientX - rect.left) / rect.width * 1300;
      const eased = morphProg < 0.5 ? 2*morphProg*morphProg : -1+(4-2*morphProg)*morphProg;
      const pxPerSVG = rect.width / 1300;

      let sx, curV, prevV, dateLabel, idx;

      if (chartMode === 'yearly') {
        // 가장 가까운 연도 스냅
        let closest=0, minD=Infinity;
        YEARLY_DATA.forEach((d,i)=>{ const dist=Math.abs(svgX-d.x); if(dist<minD){minD=dist;closest=i;} });
        const yd = YEARLY_DATA[closest];
        if (closest !== lastSnap) { tick(); lastSnap = closest; }
        sx = yd.x;
        // 연간 모드: activeDot을 MAU 점 위치로
        const mauY = yScaleYearly(yd.mau);
        const dauY = yScaleYearly(yd.dau);
        activeDotCur.setAttribute('cx', sx); activeDotCur.setAttribute('cy', mauY.toFixed(1)); activeDotCur.setAttribute('r','6');
        activeDotPrev.setAttribute('cx', sx); activeDotPrev.setAttribute('cy', dauY.toFixed(1)); activeDotPrev.setAttribute('r','5');
        crosshair.setAttribute('x1',sx); crosshair.setAttribute('x2',sx); crosshair.style.display='';
        tooltip.querySelector('#tt-date').textContent = yd.year;
        slotNumber(tooltip.querySelector('#tt-cur'),  yd.mau+'만', yd.mau, lastTTCur);
        slotNumber(tooltip.querySelector('#tt-prev'), yd.dau+'만', yd.dau, lastTTPrev);
        lastTTCur=yd.mau; lastTTPrev=yd.dau;
        const tipW=tooltip.offsetWidth||200;
        const pxPerSVG=svg.getBoundingClientRect().width/1300;
        let tx=svg.getBoundingClientRect().left+sx*pxPerSVG-tipW/2;
        tx=Math.max(8,Math.min(tx,window.innerWidth-tipW-8));
        tooltip.style.left=tx+'px'; tooltip.style.top=Math.max(8,svg.getBoundingClientRect().top+20*pxPerSVG-100)+'px';
        tooltip.style.display='';
        return;
      } else if (chartMode === 'monthly') {
        const visIdx = Math.round(Math.max(0,Math.min(11,(svgX-80)/(1260-80)*11)));
        if (visIdx !== lastSnap) { tick(); lastSnap = visIdx; }
        sx = MONTHLY_XS_12[visIdx];
        curV  = monthlyAnchors[visIdx].cur;
        prevV = monthlyAnchors[visIdx].prev;
        dateLabel = `2025년 ${MONTHLY_LABELS_12[visIdx]}`;
        idx = visIdx;
      } else {
        const day = svgXToDay(svgX);
        if (day !== lastSnap) { tick(); lastSnap = day; }
        sx = dayToSvgX(day);
        curV  = Math.round(interpDay(day, 'cur'));
        prevV = Math.round(interpDay(day, 'prev'));
        dateLabel = `4월 ${day}일 (${weekLabel(day)})`;
        idx = day - 1;
      }

      crosshair.setAttribute('x1', sx); crosshair.setAttribute('x2', sx);
      crosshair.style.display = '';

      const mYCur  = wPts.cur[idx]  ? wPts.cur[idx].y  + (dPts.cur[idx].y  - wPts.cur[idx].y)  * eased : 0;
      const mYPrev = wPts.prev[idx] ? wPts.prev[idx].y + (dPts.prev[idx].y - wPts.prev[idx].y) * eased : 0;
      activeDotCur.setAttribute('cx', sx);
      activeDotCur.setAttribute('cy', mYCur);
      activeDotPrev.setAttribute('cx', sx);
      activeDotPrev.setAttribute('cy', mYPrev);

      tooltip.querySelector('#tt-date').textContent = dateLabel;
      slotNumber(tooltip.querySelector('#tt-cur'),  curV  + '만', curV,  lastTTCur);
      slotNumber(tooltip.querySelector('#tt-prev'), prevV + '만', prevV, lastTTPrev);
      lastTTCur = curV; lastTTPrev = prevV;

      const tipW = tooltip.offsetWidth || 200;
      let tx = rect.left + sx * pxPerSVG - tipW/2;
      tx = Math.max(8, Math.min(tx, window.innerWidth - tipW - 8));
      const ty = rect.top + 20 * pxPerSVG - 100;
      tooltip.style.left = tx + 'px';
      tooltip.style.top  = Math.max(8, ty) + 'px';
      tooltip.style.display = '';
    }

    function onLeave() {
      if (panDragMoved) return;
      crosshair.style.display='none';
      tooltip.style.display='none'; lastSnap=-1;
    }

    // ── 월간 드래그-패닝 ──
    let panActive = false, panMoved = false;
    let panDragMoved = false;
    let panStartX = 0, panStartRangeStart = 0, panStartRangeEnd = 0;

    // ── [비활성화됨] 연간 드래그: 오른쪽으로 당길수록 왼쪽 경계가 2018년으로 이동 ──
    // 복원하려면: 'yearly_DISABLED' → 'yearly' 로 변경, buildYearlyPts/refreshYearly 재연결
    svg.addEventListener('mousedown', e => {
      if (chartMode !== 'yearly_DISABLED') return;
      panActive = true; panMoved = false; panDragMoved = false;
      panStartX = e.clientX;
      panStartRangeStart = yearlyRangeStart;
      svg.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', e => {
      if (!panActive || chartMode !== 'yearly_DISABLED') return;
      const dx = e.clientX - panStartX;
      if (Math.abs(dx) > 5) { panMoved = true; panDragMoved = true; }
      if (!panMoved) return;
      const rect = svg.getBoundingClientRect();
      // 오른쪽으로 당기면(dx>0) 왼쪽 경계가 뒤로 이동 → 더 많은 역사
      const monthsPerPx = (yearlyRangeEnd - panStartRangeStart) / (rect.width * 0.85);
      const delta = Math.round(-dx * monthsPerPx);
      yearlyRangeStart = Math.max(0, Math.min(yearlyRangeEnd - 1, panStartRangeStart + delta));
      crosshair.style.display = 'none'; tooltip.style.display = 'none';
      activeDotCur.setAttribute('r','0'); activeDotPrev.setAttribute('r','0');
      refreshYearly();
    });
    window.addEventListener('mouseup', () => {
      if (!panActive) return;
      panActive = false;
      svg.style.cursor = chartMode === 'yearly' ? 'grab' : 'crosshair';
      setTimeout(() => { panDragMoved = false; }, 50);
    });

    // ── 스크롤 줌 (연간) ──
    svg.addEventListener('wheel', e => {
      if (chartMode !== 'yearly_DISABLED') return;
      e.preventDefault();
      const span = yearlyRangeEnd - yearlyRangeStart;
      const factor = e.deltaY > 0 ? 1.18 : 0.85;
      const newSpan = Math.max(2, Math.min(MAU_TOTAL - 1, Math.round(span * factor)));
      yearlyRangeStart = Math.max(0, yearlyRangeEnd - newSpan);
      refreshYearly();
    }, {passive: false});

    svg.addEventListener('mousemove', e => { if (!panDragMoved) onMove(e); });
    svg.addEventListener('mouseleave', onLeave);
    svg.addEventListener('touchmove', onMove, {passive:true});
    svg.addEventListener('touchend', onLeave);
    svg.style.cursor='crosshair';
  }

  window._chartInitDone = false;
  detailOverlay._initChart = function() {
    if (!window._chartInitDone) { initChart(); window._chartInitDone=true; }
  };
  window.switchChartMode = switchChartMode;
})();

function showDetailPage() {
  detailPageActive = true;
  detailOverlay.style.display = 'block';
  requestAnimationFrame(() => {
    detailOverlay.style.opacity = '1';
    if (detailOverlay._initChart) detailOverlay._initChart();
  });
}
function hideDetailPage() {
  detailOverlay.style.opacity = '0';
  setTimeout(() => { detailOverlay.style.display = 'none'; detailPageActive = false; }, 400);
}

          // MAU 3셀
          if (fy >= cy0 && fy <= cy0 + rH && fx >= cx0 && fx <= cx0 + midW) {
            activeZones.add('mau-' + Math.min(2, Math.floor((fx - cx0) / (midW / 3))));
          }
          // Retention 3셀
          if (fy >= cy0 + rH && fy <= cy0 + midH && fx >= cx0 && fx <= cx0 + midW) {
            activeZones.add('ret-' + Math.min(2, Math.floor((fx - cx0) / (midW / 3))));
          }
          // 좌측 메뉴 4셀
          if (fx >= pad && fx <= pad + lW && fy >= cy0) {
            activeZones.add('menu-' + Math.min(3, Math.floor((fy - cy0) / (sH + sGap))));
          }
          // 우측 1셀 (합침)
          if (fx >= cw - pad - rW && fy >= cy0) {
            activeZones.add('right-0');
          }
          // 좌측 상단 코너 탭 → 상세페이지 (상단 5셀 첫번째 + 좌측컬럼 영역만)
          if (fx >= pad && fx <= pad + lW + gap + bw && fy >= pad && fy <= pad + tH) fingerInTopLeft = true;
        }
      }

      // 손가락 탭 감지 → 상세페이지 진입
      if (fingerInTopLeft && !detailPageActive) showDetailPage();

      // ── 와이어프레임 그리드 (이동 트래킹 탭이면 숨김) ──
      if (aquaTab !== 1) {
      camCtx.save();
      const wf  = 'rgba(255,255,255,0.75)';
      const wfA = 'rgba(255,255,255,1)';
      const wfH = 'rgba(255,255,255,0.15)';

      const rect = (x, y, w, h, key) => {
        const act = key && activeZones.has(key);
        camCtx.strokeStyle = act ? wfA : wf;
        camCtx.lineWidth = act ? 1.5 : 1;
        camCtx.strokeRect(x, y, w, h);
        if (act) { camCtx.fillStyle = wfH; camCtx.fillRect(x, y, w, h); }
      };

      // 상단 5개 박스 (거의 전체 너비)
      for (let i = 0; i < 5; i++) rect(pad + i*(bw+gap), pad, bw, tH, 'top-'+i);

      // 좌측 4개 박스 (높이 6px, 간격 4px)
      const menuItemH = 6;
      const menuItemGap = 4;
      for (let i = 0; i < 4; i++) rect(pad, cy0 + i*(menuItemH+menuItemGap), lW, menuItemH, 'menu-'+i);

      // 우측 1개 박스 (높이 32px 고정, 상단 정렬)
      rect(cw-pad-rW, cy0, rW, 32, 'right-0');

      // 중앙 3×2 그리드
      const cw3 = midW / 3;
      for (let row = 0; row < 2; row++) {
        for (let col = 0; col < 3; col++) {
          const key = row === 0 ? 'mau-'+col : 'ret-'+col;
          rect(cx0 + col*cw3, cy0 + row*rH, cw3, rH, key);
        }
      }

      // 좌측 상단 탭 진입 힌트 (초록 점선)
      camCtx.strokeStyle = fingerInTopLeft ? 'rgba(80,210,120,0.95)' : 'rgba(80,210,120,0.4)';
      camCtx.lineWidth = 1.2;
      camCtx.setLineDash([3, 3]);
      camCtx.strokeRect(pad, pad, lW + gap + bw, tH);
      camCtx.setLineDash([]);

      camCtx.restore();
      } // end if (aquaTab !== 1)

      // Fingertip dots
      if (fingerTipsRaw.length) {
        for (const ft of fingerTipsRaw) {
          const cx = (1 - ft.x) * cw, cy = ft.y * ch;
          const glow = camCtx.createRadialGradient(cx, cy, 0, cx, cy, 12);
          glow.addColorStop(0, 'rgba(100,240,200,0.8)');
          glow.addColorStop(0.4, 'rgba(100,240,200,0.2)');
          glow.addColorStop(1, 'rgba(100,240,200,0)');
          camCtx.fillStyle = glow;
          camCtx.beginPath(); camCtx.arc(cx, cy, 12, 0, Math.PI*2); camCtx.fill();
          camCtx.fillStyle = 'rgba(100,240,200,1)';
          camCtx.beginPath(); camCtx.arc(cx, cy, 2.5, 0, Math.PI*2); camCtx.fill();
        }
      }

      // (AR drawn above, before guides)
    });

    // Camera starts on button click (see camBtn listener above)
  } catch(e) { console.log('Hand tracking unavailable:', e); }
})();

// ═══ MAIN LOOP ═══
// MAU 클릭 핫스팟
const mauHotspot = document.createElement('div');
mauHotspot.style.cssText = 'position:fixed;top:54px;left:28px;height:42px;cursor:pointer;z-index:5;';
document.body.appendChild(mauHotspot);
mauHotspot.addEventListener('click', () => { if (!detailPageActive) showDetailPage(); });

function updateMauHotspot() { mauHotspot.style.width = ((W-56)/5) + 'px'; }

resize(); updateMauHotspot();
window.addEventListener('resize', () => { resize(); updateMauHotspot(); });
initParticles();

let frame=0;
document.fonts.ready.then(()=>requestAnimationFrame(loop));

function loop() {
  frame++;
  buildGrid(); applyRepulsion(); applyMouseForce(); applyDragForce();
  // Hard zone enforcement: force ALL non-migrating particles inside their sub-zone
  particles.forEach(p => {
    if (p.migrating || p.fadingIn || p.segment === 'churn' || p.segment === 'new') return;
    const z = getSubZone(p.segment, p.subType);
    if (!z) return;
    const wL = z.x + p.radius + 2, wR = z.x + z.w - p.radius - 2;
    const wT = z.y + p.radius + 2, wB = z.y + z.h - p.radius - 2;
    // Teleport back if outside
    if (p.x < wL) { p.x = wL; p.vx = 0; }
    if (p.x > wR) { p.x = wR; p.vx = 0; }
    if (p.y < wT) { p.y = wT; p.vy = 0; }
    if (p.y > wB) { p.y = wB; p.vy = 0; }
    // Block velocity that would exit next frame
    if (p.x + p.vx < wL) p.vx = 0;
    if (p.x + p.vx > wR) p.vx = 0;
    if (p.y + p.vy < wT) p.vy = 0;
    if (p.y + p.vy > wB) p.vy = 0;
  });
  particles.forEach(p=>p.update(frame));
  // tryMigrations(); — growth2: 세그 간 이동 비활성화
  signalEvents=signalEvents.filter(e=>Date.now()-e.time<30000);

  drawBG(); drawDashboard(); drawLegend(); drawGNB();
  drawAquarium(frame);
  if (aquaTab === 0) {
    drawTanks(); // drawAllPipes, drawSideZones 제거 (growth2)
    drawConnLines();
    // 주차별 파티클 수 — target 쪽으로 lerp (부드러운 전환)
    _segDrawTargets = getWeekTargets(trackYear, trackMonth, segWeek);
    for (const k in _segDrawCurrent) {
      _segDrawCurrent[k] += (_segDrawTargets[k] - _segDrawCurrent[k]) * 0.07;
    }
    // 주차 변경 펄스: 2.0 → 1.0 ease
    if (_particlePulseT < 1.0) {
      _particlePulseT = Math.min(1.0, _particlePulseT + 0.045);
      _particleScalePulse = 1.0 + 0.6 * Math.sin(Math.PI * _particlePulseT);
    } else {
      _particleScalePulse = 1.0;
    }
    const _segCnt = {};
    particles.forEach(p => {
      if (p.migrating || p._segIdx === undefined) { p.draw(); return; }
      const lim = _segDrawCurrent[p.segment];
      if (lim === undefined || p._segIdx < lim) p.draw();
    });
  } else {
    drawMoveTracking();
  }
  drawSignalPanel(frame); // drawActionPanel 히든 (이탈조짐 인사이트 — 추후 재사용)

  function isOverRect(r) { return r && mouseX>=r.x&&mouseX<=r.x+r.w&&mouseY>=r.y&&mouseY<=r.y+r.h; }
  const _isMaxM = trackYear === 2026 && trackMonth >= 4;
  const overClickable = aquaTabRects.some(r=>isOverRect(r))
    || isOverRect(trackMonthRects.prev)
    || (isOverRect(trackMonthRects.next) && !_isMaxM)
    || isOverRect(segMonthRects.prev)
    || (isOverRect(segMonthRects.next) && !_isMaxM)
    || segWeekRects.some(r=>isOverRect(r));
  canvas.style.cursor = drag.active ? 'grabbing' : overClickable ? 'pointer' : inAqua(mouseX,mouseY) ? 'grab' : 'default';
  requestAnimationFrame(loop);
}
</script>
