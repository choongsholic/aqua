<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Dummy</title>
<style>
@font-face { font-family:'YouandiNewKr'; font-weight:700; src:url('fonts/YouandiNewKrTitle-Bold.ttf') format('truetype'); font-display:swap; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a0a; color:#fff;
  font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
  display:flex; flex-direction:column; height:100vh; padding:32px; gap:16px;
  transition: background 0.4s, color 0.4s;
}
body.light { background:#f0f0f0; color:#000; }

.topbar { display:flex; align-items:center; justify-content:space-between; }
h1 { font-family:'YouandiNewKr',sans-serif; font-size:24px; font-weight:700; color:#fff; letter-spacing:0.02em; transition:color 0.4s; }
body.light h1 { color:#000; }

/* 테마 버튼 */
.theme-btn {
  width:40px; height:40px; min-width:40px; min-height:40px; border-radius:50%;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.8); cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0; align-self:center;
  transition:background 0.15s, border-color 0.4s, color 0.4s;
}
.theme-btn svg { opacity:0.7; }
.theme-btn:hover { background:rgba(255,255,255,0.12); }
body.light .theme-btn { background:rgba(0,0,0,0.06); border-color:rgba(0,0,0,0.1); color:rgba(0,0,0,0.8); }
body.light .theme-btn:hover { background:rgba(0,0,0,0.12); }

#dropzone {
  flex:1; border:1px solid rgba(255,255,255,0.1); border-radius:12px;
  overflow:auto; position:relative; background:rgba(255,255,255,0.08);
  transition: border-color 0.4s, background 0.4s;
}
body.light #dropzone { border-color:rgba(0,0,0,0.1); background:rgba(0,0,0,0.05); }

#placeholder {
  position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  color:rgba(255,255,255,0.2); font-size:13px; pointer-events:none; transition:color 0.4s;
}
body.light #placeholder { color:rgba(0,0,0,0.2); }
#preview { display:none; padding:16px; }

/* 표 */
table { border-collapse:collapse; width:100%; font-size:12px; }
th {
  background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.6);
  font-weight:600; padding:8px 12px; text-align:left;
  border-bottom:1px solid rgba(255,255,255,0.12); white-space:nowrap;
  transition: background 0.4s, color 0.4s, border-color 0.4s;
}
body.light th { background:rgba(0,0,0,0.06); color:rgba(0,0,0,0.5); border-bottom-color:rgba(0,0,0,0.1); }
td {
  padding:7px 12px; border-bottom:1px solid rgba(255,255,255,0.05);
  color:rgba(255,255,255,0.85); white-space:nowrap; transition: color 0.4s, border-color 0.4s;
}
body.light td { border-bottom-color:rgba(0,0,0,0.06); color:rgba(0,0,0,0.8); }
tr:hover td { background:rgba(255,255,255,0.03); }
body.light tr:hover td { background:rgba(0,0,0,0.03); }

pre { font-size:12px; line-height:1.7; color:rgba(255,255,255,0.85); white-space:pre-wrap; word-break:break-all; transition:color 0.4s; }
body.light pre { color:rgba(0,0,0,0.8); }

.bottom { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-shrink:0; }
.hint { font-size:11px; color:rgba(255,255,255,0.2); transition:color 0.4s; }
body.light .hint { color:rgba(0,0,0,0.3); }
.actions { display:flex; gap:8px; }
button {
  border:none; border-radius:8px; padding:10px 24px;
  font-size:13px; font-weight:600; cursor:pointer;
  font-family:inherit; transition:opacity 0.15s;
}
#saveBtn { background:#fff; color:#0a0a0a; }
body.light #saveBtn { background:#000; color:#fff; }
#clearBtn { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.5); display:none; transition: background 0.4s, color 0.4s; }
body.light #clearBtn { background:rgba(0,0,0,0.07); color:rgba(0,0,0,0.4); }
#saveBtn:hover, #clearBtn:hover { opacity:0.8; }
</style>
</head>
<body>
<div class="topbar">
  <h1>덤덤하게</h1>
  <div class="theme-btn" onclick="toggleTheme()">
    <svg id="theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="currentColor"/>
    </svg>
  </div>
</div>

<div id="dropzone">
  <div id="placeholder">내용을 여기에 붙여넣으세요. (Ctrl+V / Cmd+V)</div>
  <div id="preview"></div>
</div>

<div class="bottom">
  <span class="hint" id="hint">저장하면 내용이 담긴 파일이 다운로드됩니다.</span>
  <div class="actions">
    <button id="clearBtn" onclick="clearData()">지우기</button>
    <button id="saveBtn"  onclick="save()">저장</button>
  </div>
</div>

<script>
const MOON_SVG = `<path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="currentColor"/>`;
const SUN_SVG  = `<circle cx="12" cy="12" r="5" fill="currentColor"/><g stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></g>`;
let isLight = false;

function toggleTheme() {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  document.getElementById('theme-icon').innerHTML = isLight ? SUN_SVG : MOON_SVG;
}

const preview  = document.getElementById('preview');
const ph       = document.getElementById('placeholder');
const clearBtn = document.getElementById('clearBtn');
const hint     = document.getElementById('hint');
let saveCount  = 0;
let rawData    = '';

function isTSV(t) { return t.split('\n').some(l => l.includes('\t')); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderTable(text) {
  const rows = text.trim().split('\n').map(r => r.split('\t'));
  let html = '<table><thead><tr>';
  rows[0].forEach(h => { html += `<th>${esc(h)}</th>`; });
  html += '</tr></thead><tbody>';
  rows.slice(1).forEach(row => {
    html += '<tr>';
    row.forEach(cell => { html += `<td>${esc(cell)}</td>`; });
    html += '</tr>';
  });
  return html + '</tbody></table>';
}

function load(text) {
  rawData = text;
  preview.innerHTML = isTSV(text) ? renderTable(text) : `<pre>${esc(text)}</pre>`;
  preview.style.display = 'block';
  ph.style.display = 'none';
  clearBtn.style.display = 'block';
  hint.textContent = '저장하면 내용이 담긴 파일이 다운로드됩니다.';
}

// 저장된 데이터 복원
const saved = `SAVED_DATA_PLACEHOLDER`;
if (saved !== 'SAVED_DATA_PLACEHOLDER') load(saved);

document.addEventListener('paste', e => {
  const text = e.clipboardData.getData('text');
  if (text) load(text);
});

function save() {
  if (!rawData) { alert('내용을 먼저 붙여넣으세요.'); return; }
  saveCount++;
  const fileName = `dummy_out_${saveCount}`;
  const dataJSON = JSON.stringify(rawData);

  const out = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>${fileName}</title>
<style>
@font-face { font-family:'YouandiNewKr'; font-weight:700; src:url('fonts/YouandiNewKrTitle-Bold.ttf') format('truetype'); font-display:swap; }
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#0a0a0a; color:#fff;
  font-family:'SF Pro Display',-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo',sans-serif;
  display:flex; flex-direction:column; height:100vh; padding:32px; gap:16px;
  transition: background 0.4s, color 0.4s;
}
body.light { background:#f0f0f0; color:#000; }
.topbar { display:flex; align-items:center; justify-content:space-between; }
h1 { font-family:'YouandiNewKr',sans-serif; font-size:20px; font-weight:700; color:rgba(255,255,255,0.5); letter-spacing:0.02em; transition:color 0.4s; }
body.light h1 { color:rgba(0,0,0,0.4); }
.theme-btn {
  width:40px; height:40px; min-width:40px; min-height:40px; border-radius:50%;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.8); cursor:pointer;
  display:flex; align-items:center; justify-content:center; flex-shrink:0; align-self:center;
  transition:background 0.15s, border-color 0.4s, color 0.4s;
}
.theme-btn svg { opacity:0.7; }
.theme-btn:hover { background:rgba(255,255,255,0.12); }
body.light .theme-btn { background:rgba(0,0,0,0.06); border-color:rgba(0,0,0,0.1); color:rgba(0,0,0,0.8); }
body.light .theme-btn:hover { background:rgba(0,0,0,0.12); }
#view { flex:1; border:1px solid rgba(255,255,255,0.1); border-radius:12px; overflow:auto; padding:16px; background:rgba(255,255,255,0.08); transition: border-color 0.4s, background 0.4s; }
body.light #view { border-color:rgba(0,0,0,0.1); background:rgba(0,0,0,0.05); }
table { border-collapse:collapse; width:100%; font-size:12px; }
th { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.6); font-weight:600; padding:8px 12px; text-align:left; border-bottom:1px solid rgba(255,255,255,0.12); white-space:nowrap; transition: background 0.4s, color 0.4s; }
body.light th { background:rgba(0,0,0,0.06); color:rgba(0,0,0,0.5); border-bottom-color:rgba(0,0,0,0.1); }
td { padding:7px 12px; border-bottom:1px solid rgba(255,255,255,0.05); color:rgba(255,255,255,0.85); white-space:nowrap; transition: color 0.4s; }
body.light td { border-bottom-color:rgba(0,0,0,0.06); color:rgba(0,0,0,0.8); }
tr:hover td { background:rgba(255,255,255,0.03); }
body.light tr:hover td { background:rgba(0,0,0,0.03); }
pre { font-size:12px; line-height:1.7; color:rgba(255,255,255,0.85); white-space:pre-wrap; word-break:break-all; }
body.light pre { color:rgba(0,0,0,0.8); }
.bottom { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-shrink:0; }
.hint { font-size:11px; color:rgba(255,255,255,0.2); transition:color 0.4s; }
body.light .hint { color:rgba(0,0,0,0.3); }
.actions { display:flex; gap:8px; }
button { border:none; border-radius:8px; padding:10px 24px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:opacity 0.15s; }
.btn-csv  { background:#50d278; color:#0a0a0a; }
.btn-md   { background:rgba(255,255,255,0.12); color:#fff; transition: background 0.4s, color 0.4s; }
body.light .btn-md { background:rgba(0,0,0,0.08); color:#000; }
.btn-html { background:#fff; color:#0a0a0a; transition: background 0.4s, color 0.4s; }
body.light .btn-html { background:#000; color:#fff; }
button:hover { opacity:0.8; }
</style>
</head>
<body>
<div class="topbar">
  <h1>${fileName}</h1>
  <div class="theme-btn" onclick="toggleTheme()">
    <svg id="theme-icon" width="18" height="18" viewBox="0 0 24 24" fill="none">
      <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="currentColor"/>
    </svg>
  </div>
</div>
<div id="view"></div>
<div class="bottom">
  <span class="hint" id="hint"></span>
  <div class="actions">
    <button class="btn-csv"  onclick="saveCSV()">CSV로 저장</button>
    <button class="btn-md"   onclick="saveMD()">MD로 저장</button>
    <button class="btn-html" onclick="saveHTML()">HTML로 저장</button>
  </div>
</div>
<script>
const MOON_SVG = \`<path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z" fill="currentColor"/>\`;
const SUN_SVG  = \`<circle cx="12" cy="12" r="5" fill="currentColor"/><g stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></g>\`;
let isLight = false;
function toggleTheme() {
  isLight = !isLight;
  document.body.classList.toggle('light', isLight);
  document.getElementById('theme-icon').innerHTML = isLight ? SUN_SVG : MOON_SVG;
}
const RAW = ${dataJSON};
const NAME = '${fileName}';
let saveIdx = 0;
function isTSV(t) { return t.split('\\n').some(l => l.includes('\\t')); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function renderTable(text) {
  const rows = text.trim().split('\\n').map(r => r.split('\\t'));
  let html = '<table><thead><tr>';
  rows[0].forEach(h => { html += '<th>'+esc(h)+'</th>'; });
  html += '</tr></thead><tbody>';
  rows.slice(1).forEach(row => { html += '<tr>'; row.forEach(cell => { html += '<td>'+esc(cell)+'</td>'; }); html += '</tr>'; });
  return html + '</tbody></table>';
}
document.getElementById('view').innerHTML = isTSV(RAW) ? renderTable(RAW) : '<pre>'+esc(RAW)+'</pre>';
function dl(content, ext, mime) {
  saveIdx++;
  const blob = new Blob([content], { type: mime });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = NAME + '_' + saveIdx + '.' + ext;
  a.click();
  document.getElementById('hint').textContent = a.download + ' 저장됨';
}
function saveCSV() {
  const rows = RAW.trim().split('\\n').map(r => r.split('\\t'));
  const csv = rows.map(r => r.map(c => /[,\\"\\n]/.test(c) ? '"'+c.replace(/"/g,'""')+'"' : c).join(',')).join('\\n');
  dl(csv, 'csv', 'text/csv');
}
function saveMD() {
  const rows = RAW.trim().split('\\n').map(r => r.split('\\t'));
  const header = '| ' + rows[0].join(' | ') + ' |';
  const sep    = '| ' + rows[0].map(() => '---').join(' | ') + ' |';
  const body   = rows.slice(1).map(r => '| ' + r.join(' | ') + ' |').join('\\n');
  dl(header + '\\n' + sep + '\\n' + body, 'md', 'text/markdown');
}
function saveHTML() { dl(document.documentElement.outerHTML, 'html', 'text/html'); }
<\/script>
</body>
</html>`;

  const blob = new Blob([out], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${fileName}.html`;
  a.click();
  hint.textContent = `${fileName}.html 저장됨`;
}

function clearData() {
  rawData = '';
  preview.innerHTML = '';
  preview.style.display = 'none';
  ph.style.display = 'flex';
  clearBtn.style.display = 'none';
  hint.textContent = '저장하면 내용이 담긴 파일이 다운로드됩니다.';
}
</script>
</body>
</html>
