<!DOCTYPE html>
<html lang="ko" class="theme-dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo Day — Presentation</title>
  <style>
    @font-face {
      font-family: 'SFProDisplay';
      src: url('fonts/SF-Pro-Display-Medium.otf') format('opentype');
      font-weight: 400; font-style: normal;
    }
    @font-face {
      font-family: 'SFProDisplay';
      src: url('fonts/SF-Pro-Display-Medium.otf') format('opentype');
      font-weight: 500; font-style: normal;
    }
    @font-face {
      font-family: 'SFProDisplay';
      src: url('fonts/SF-Pro-Display-Bold.otf') format('opentype');
      font-weight: 600; font-style: normal;
    }
    @font-face {
      font-family: 'SFProDisplay';
      src: url('fonts/SF-Pro-Display-Bold.otf') format('opentype');
      font-weight: 700; font-style: normal;
    }
    @font-face {
      font-family: 'SFProDisplay';
      src: url('fonts/SF-Pro-Display-Bold.otf') format('opentype');
      font-weight: 800; font-style: normal;
    }
    @font-face {
      font-family: 'YouandiNewKrTitle';
      src: url('fonts/YouandiNewKrTitle-Bold.ttf') format('truetype');
      font-weight: 700; font-style: normal;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { interpolate-size: allow-keywords; --font-scale: 1; }

    html.theme-dark {
      --bg: #080808; --surface: #141414; --surface-hover: #1a1a1a;
      --border: rgba(255,255,255,0.10);
      --text: rgba(255,255,255,0.92); --text-secondary: rgba(255,255,255,0.42);
      --accent: #00D56D; --accent-secondary: #00D56D;
      --positive: #00D56D; --negative: #FF0238; --warning: #f59e0b;
    }
    html.theme-light {
      --bg: #F5F5F3; --surface: #FFFFFF; --surface-hover: #EBEBEA;
      --border: rgba(0,0,0,0.12);
      --text: #0f172a; --text-secondary: #6b7280;
      --accent: #00b85e; --accent-secondary: #00b85e;
      --positive: #00b85e; --negative: #FF0238; --warning: #d97706;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); }
    html.theme-dark, html.theme-dark body { background: #080808; }
    html.theme-light, html.theme-light body { background: #F5F5F3; }
    body {
      font-family: 'SFProDisplay', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif;
      color: var(--text);
      line-height: 1.6; -webkit-font-smoothing: antialiased;
      display: flex; justify-content: center; align-items: center;
      transition: none;
    }
    h1,h2,h3,h4,h5,h6 { color: var(--text); letter-spacing: -0.02em; line-height: 1.15; text-wrap: balance; }
    h1 { font-family: 'YouandiNewKrTitle', 'SFProDisplay', sans-serif; font-weight: 700; }
    h2 { font-family: 'YouandiNewKrTitle', 'SFProDisplay', sans-serif; font-weight: 700; }
    h3 { font-weight: 600; }
    p, li, span, label { color: var(--text); font-weight: 400; }
    .text-secondary { color: var(--text-secondary); }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes slideInRight { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    .animate { animation: fadeInUp 0.6s ease-out both; }
    .animate.delay-1 { animation-delay: 0.1s; }
    .animate.delay-2 { animation-delay: 0.2s; }
    .animate.delay-3 { animation-delay: 0.3s; }
    .animate.delay-4 { animation-delay: 0.4s; }
    .animate.delay-5 { animation-delay: 0.5s; }
    .animate.delay-6 { animation-delay: 0.6s; }
    .animate.delay-7 { animation-delay: 0.7s; }
    .animate.delay-8 { animation-delay: 0.8s; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation: none !important; transition: none !important; }
    }

    /* ===== PRINT ===== */
    @media print {
      body { background: white !important; color: black !important; }
      .slide-nav, #overview-panel { display: none !important; }
      .slide { page-break-after: always; }
    }

    .theme-light .problem-card,
    .theme-light .feature-card,
    .theme-light .next-card,
    .theme-light .extra-card,
    .theme-light .ba-col,
    .theme-light .whatsnext-card,
    .theme-light .whatsnext-right-card,
    .theme-light .whatsnext-next-item,
    .theme-light .common-compare-col,
    .theme-light .common-vlist-item,
    .theme-light .reality-item,
    .theme-light .problem-focus-card,
    .theme-light .problem-single-point {
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    }
    /* ===== OVERVIEW CONTROLS ===== */
    #overview-controls {
      flex-shrink: 0; width: 210px; height: 100%;
      padding: 20px 22px; box-sizing: border-box;
      display: flex; flex-direction: column; gap: 4px; justify-content: center;
      border-right: 1px solid rgba(255,255,255,0.14);
    }
    #overview-controls button {
      width: 100%; padding: 8px 12px; border: none; border-radius: 6px;
      background: transparent; color: rgba(255,255,255,0.92); font-size: 13px;
      font-family: inherit; cursor: pointer; text-align: left;
      display: flex; align-items: center; gap: 8px; transition: background 0.15s;
    }
    #overview-controls button span { color: inherit; }
    #overview-controls button:hover { background: rgba(255,255,255,0.08); }
    #overview-controls .control-focus,
    #overview-controls button.control-focus {
      background: rgba(255,255,255,0.14);
      outline: 1px solid rgba(255,255,255,0.4);
    }
    #overview-controls .font-row { display: flex; align-items: center; gap: 4px; padding: 2px 0; border-radius: 6px; }
    #overview-controls .font-row button { flex: 1; justify-content: center; padding: 6px 4px; }
    #overview-controls .font-row span { color: rgba(255,255,255,0.42); }
    #overview-controls .font-row.font-nudge-left button:first-child { background: rgba(255,255,255,0.2); }
    #overview-controls .font-row.font-nudge-right button:last-child { background: rgba(255,255,255,0.2); }
    #overview-controls .font-row span {
      min-width: 42px; text-align: center; font-size: 12px; color: var(--text-secondary);
    }

    /* ===== FOCUS ===== */
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
    .sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }

    /* ===== SLIDES ===== */
    .slides-wrapper {
      width: 2040px; height: 1080px;
      position: fixed; top: 0; left: 0;
      transform-origin: top left;
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      overflow: hidden;
      background: transparent;
    }
    .slide {
      position: absolute; top: 0; bottom: 0; left: 0; right: 0;
      display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
      padding: clamp(48px, 6vw, 80px) calc(clamp(32px, 7vw, 112px) + 60px);
      opacity: 0; transform: translateX(60px);
      transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      pointer-events: none;
    }
    .slide-header,
    .problem-grid,
    .feature-grid,
    .arch-flow,
    .why-section,
    .ba-grid,
    .reality-grid,
    .next-grid {
      width: min(100%, 1020px);
      margin-left: auto;
      margin-right: auto;
    }
    .slide.active {
      opacity: 1; transform: translateX(0); pointer-events: auto;
    }
    .slide.exit-left {
      opacity: 0; transform: translateX(-60px);
    }

    /* Progress bar */
    .progress-bar {
      position: fixed; top: 0; left: 0; height: 3px; z-index: 9998;
      background: linear-gradient(90deg, var(--accent), var(--accent-secondary));
      transition: width 0.4s ease;
    }

    /* Slide nav */
    .slide-nav {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 10px; z-index: 9998;
    }
    .slide-nav button {
      width: 32px; height: 32px; border-radius: 8px;
      background: transparent; border: none; color: var(--text);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      opacity: 0.4; transition: opacity 0.2s;
    }
    .slide-nav button:hover { opacity: 1; }
    .slide-counter {
      font-size: 14px; color: var(--text); font-weight: 400;
      min-width: 44px; text-align: center; opacity: 0.4;
      font-family: 'SFProDisplay', sans-serif;
    }

    /* ===== OVERVIEW PANEL ===== */
    #overview-panel {
      position: fixed; bottom: 0; left: 0; right: 0; height: 220px;
      background: #000; z-index: 10000;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex; flex-direction: row; align-items: center;
      border-top: 1px solid rgba(255,255,255,0.22);
    }
    #overview-panel > #overview-track { flex: 1; height: 100%; }
    #overview-panel.open { transform: translateY(0); }
    #overview-track {
      display: flex; align-items: center; gap: 14px;
      padding: 0 48px;
      overflow-x: auto; scroll-behavior: smooth;
      scrollbar-width: none;
    }
    #overview-track::-webkit-scrollbar { display: none; }
    .overview-item {
      flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 8px;
      cursor: pointer; opacity: 0.5; transition: opacity 0.2s;
    }
    .overview-item:hover { opacity: 0.8; }
    .overview-item.overview-focus,
    .overview-item.overview-current { opacity: 1; }
    .overview-thumb {
      width: 180px; height: 96px;
      overflow: hidden; position: relative; border-radius: 8px;
      border: 2px solid rgba(255,255,255,0.18);
      transition: border-color 0.2s;
    }
    .overview-item.overview-focus .overview-thumb {
      border-color: #00D56D;
    }
    .overview-item.overview-current .overview-thumb {
      border-color: rgba(255,255,255,0.8);
    }
    .overview-item.overview-current .overview-num { color: #fff; }
    .overview-item.overview-focus.overview-current .overview-thumb {
      border-color: #00D56D;
    }
    .overview-clone {
      width: 2040px !important; height: 1080px !important;
      position: absolute !important; top: 0 !important; left: 0 !important;
      transform: scale(0.08824) !important; transform-origin: top left !important;
      opacity: 1 !important; pointer-events: none !important;
    }
    .overview-clone .animate { animation: none !important; opacity: 1 !important; transform: none !important; }
    .overview-num {
      font-size: 11px; color: rgba(255,255,255,0.48);
      font-family: 'SFProDisplay', sans-serif; font-weight: 500;
    }
    .overview-item.overview-focus .overview-num { color: rgba(255,255,255,0.9); }

    /* ===== COMMON SLIDE ELEMENTS ===== */
    .slide-tag {
      font-size: calc(22px * var(--font-scale)); font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase;
      color: var(--text-secondary); margin-bottom: 14px; font-family: 'SFProDisplay', sans-serif;
    }
    .slide-title {
      font-size: calc(64px * var(--font-scale)); font-weight: 700;
      font-family: 'YouandiNewKrTitle', 'SFProDisplay', sans-serif;
    }

    /* ===== SLIDE: COVER ===== */
    .slide-cover { text-align: center; justify-content: center; }
    .theme-dark .slide-cover { background: var(--bg); }
    .theme-light .slide-cover { background: var(--bg); }
    .cover-label {
      font-size: calc(18px * var(--font-scale)); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-secondary); margin-bottom: 28px;
    }
    .cover-title {
      font-size: calc(90px * var(--font-scale)); font-weight: 800; margin-bottom: 18px;
      line-height: 1.1;
      font-family: 'YouandiNewKrTitle', 'SFProDisplay', sans-serif;
    }
    .cover-desc {
      font-size: calc(30px * var(--font-scale)); color: var(--text-secondary);
      margin-bottom: 42px; max-width: 720px;
    }
    .cover-members {
      font-size: calc(20px * var(--font-scale)); color: var(--text-secondary); font-weight: 400;
    }
    .cover-members strong { color: var(--text-secondary); font-weight: 400; }

    /* ===== SLIDE: PROBLEM ===== */
    .theme-dark .slide-problem { background: var(--bg); }
    .theme-light .slide-problem { background: var(--bg); }
    .slide-problem { align-items: center; justify-content: center; }
    .slide-problem,
    .slide-built,
    .slide-how,
    .slide-ba,
    .slide-reality,
    .slide-next {
      justify-content: flex-start;
      padding-top: 160px;
    }
    .slide-problem .slide-header {
      margin-bottom: 48px; width: 100%;
    }
    .problem-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 28px; width: 100%;
    }
    .problem-left { display: flex; flex-direction: column; gap: 16px; }
    .problem-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 24px 24px;
      min-height: calc(150px * var(--font-scale));
      box-shadow: 0 2px 20px rgba(0,0,0,0.35);
      transition: box-shadow 0.2s ease;
    }
    .problem-card:hover { box-shadow: 0 0 0 1px var(--border), 0 8px 16px rgba(0,0,0,0.08); }
    .problem-card .num {
      font-size: 13px; font-weight: 700; color: var(--text-secondary);
      margin-bottom: 4px; font-family: 'SFProDisplay', sans-serif;
    }
    .problem-card h3 { font-size: calc(36px * var(--font-scale)); font-weight: 700; margin-bottom: 8px; }
    .problem-card p { font-size: calc(28px * var(--font-scale)); color: var(--text-secondary); line-height: 1.55; }

    .qa-process {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 28px 26px;
      min-height: 100%;
    }
    .qa-process h3 { font-size: calc(24px * var(--font-scale)); font-weight: 600; margin-bottom: 18px; color: var(--text-secondary); line-height: 1.5; }
    .qa-flow {
      display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
    }
    .qa-step {
      background: color-mix(in srgb, var(--accent), transparent 88%);
      color: var(--text); font-size: calc(24px * var(--font-scale)); font-weight: 500; line-height: 1.5;
      padding: 10px 18px; border-radius: 6px; white-space: nowrap;
    }
    .qa-arrow { color: var(--text-secondary); font-size: calc(20px * var(--font-scale)); }

    /* ===== SLIDE: WHAT WE BUILT ===== */
    .theme-dark .slide-built { background: linear-gradient(160deg, #080808 0%, #081a10 100%); }
    .theme-light .slide-built { background: linear-gradient(160deg, #f8faf9 0%, #e0f5ea 100%); }
    .slide-built { align-items: center; }
    .hero-quote {
      font-size: calc(64px * var(--font-scale)); font-weight: 700;
      margin-bottom: 12px; line-height: 1.3;
    }
    .hero-quote em { font-style: normal; color: var(--accent); }
    .hero-sub { font-size: calc(30px * var(--font-scale)); color: var(--text-secondary); margin-bottom: 52px; line-height: 1.5; }
    .feature-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%;
    }
    .feature-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 28px 24px;
      min-height: calc(280px * var(--font-scale));
      box-shadow: 0 2px 20px rgba(0,0,0,0.35);
      transition: box-shadow 0.2s ease;
    }
    .feature-card:hover { box-shadow: 0 0 0 1px var(--border), 0 8px 16px rgba(0,0,0,0.08); }
    .feature-icon {
      width: 48px; height: 48px; border-radius: 10px;
      background: color-mix(in srgb, var(--accent), transparent 85%);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 18px;
    }
    .feature-card h3 { font-size: calc(36px * var(--font-scale)); font-weight: 700; margin-bottom: 10px; }
    .feature-card p { font-size: calc(28px * var(--font-scale)); color: var(--text-secondary); line-height: 1.6; }

    /* ===== SLIDE: HOW WE BUILT ===== */
    .theme-dark .slide-how { background: var(--bg); }
    .theme-light .slide-how { background: var(--bg); }
    .slide-how { align-items: center; }
    .arch-flow {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      margin-bottom: 52px; width: 100%;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 30px 30px;
    }
    .arch-node {
      background: color-mix(in srgb, var(--accent), transparent 82%);
      border: 1px solid var(--border);
      border-radius: 8px; padding: 16px 24px; font-size: calc(28px * var(--font-scale)); font-weight: 600; line-height: 1.5;
      white-space: nowrap;
    }
    .arch-node.highlight {
      background: color-mix(in srgb, var(--accent), transparent 70%);
      border-color: color-mix(in srgb, var(--accent), transparent 50%);
      color: var(--accent);
    }
    .arch-arrow { color: var(--text-secondary); font-size: calc(24px * var(--font-scale)); font-weight: 500; }
    .why-section {
      width: 100%;
      background: color-mix(in srgb, var(--text-secondary), transparent 82%);
      border-radius: 10px; padding: 32px 30px;
    }
    .why-section h3 {
      font-size: calc(26px * var(--font-scale)); font-weight: 600; margin-bottom: 14px;
      color: var(--text-secondary); line-height: 1.5;
    }
    .why-list { display: flex; flex-direction: column; gap: 10px; }
    .why-item {
      display: flex; align-items: center; gap: 10px;
      font-size: calc(28px * var(--font-scale)); line-height: 1.6; color: var(--text-secondary);
    }
    .why-icon {
      flex-shrink: 0; width: 20px; height: 20px;
      color: var(--text-secondary);
    }

    /* ===== SLIDE: BEFORE/AFTER ===== */
    .theme-dark .slide-ba { background: linear-gradient(160deg, #080808 0%, #0f0808 100%); }
    .theme-light .slide-ba { background: linear-gradient(160deg, #fafaf9 0%, #fff0f0 100%); }
    .slide-ba { align-items: center; }
    .slide-ba .slide-header,
    .slide-ba .ba-grid {
      width: min(100%, 1320px);
      margin-left: auto;
      margin-right: auto;
    }
    .ba-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 28px; width: 100%;
    }
    .ba-col {
      display: flex; flex-direction: column;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 34px 30px;
      min-height: calc(320px * var(--font-scale));
    }
    .ba-label {
      font-size: calc(16px * var(--font-scale)); font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
      margin-bottom: 12px; font-family: 'SFProDisplay', sans-serif;
    }
    .ba-label.before { color: var(--negative); }
    .ba-label.after { color: var(--positive); }
    .ba-big {
      font-size: calc(80px * var(--font-scale)); font-weight: 700; line-height: 1;
      margin-bottom: 8px; font-family: 'YouandiNewKrTitle', 'SFProDisplay', sans-serif;
    }
    .ba-big.before-num { color: var(--negative); }
    .ba-big.after-num { color: var(--positive); }
    .ba-desc {
      font-size: calc(26px * var(--font-scale)); color: var(--text-secondary); margin-bottom: 24px;
    }
    .ba-list { display: flex; flex-direction: column; gap: 14px; }
    .ba-item {
      display: flex; align-items: center; gap: 10px;
      font-size: calc(28px * var(--font-scale)); color: var(--text);
    }
    .ba-dot {
      width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
    }
    .ba-dot.neg { background: var(--negative); }
    .ba-dot.pos { background: var(--positive); }

    /* ===== SLIDE: REALITY CHECK ===== */
    .theme-dark .slide-reality { background: var(--bg); }
    .theme-light .slide-reality { background: var(--bg); }
    .slide-reality { align-items: center; }
    .reality-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 32px; width: 100%;
    }
    .reality-col h3 {
      font-size: calc(32px * var(--font-scale)); font-weight: 700; margin-bottom: 24px;
    }
    .reality-col h3.can { color: var(--positive); }
    .reality-col h3.cant { color: var(--text-secondary); }
    .reality-list { display: flex; flex-direction: column; gap: 18px; }
    .reality-item {
      display: flex; align-items: center; gap: 12px;
      font-size: calc(30px * var(--font-scale)); line-height: 1.55;
      background: var(--surface-hover); border: 1px solid var(--border);
      border-radius: 10px; padding: 30px 26px;
      min-height: calc(100px * var(--font-scale));
      box-shadow: 0 1px 12px rgba(0,0,0,0.25);
      transition: box-shadow 0.2s ease;
    }
    .reality-item:hover { box-shadow: 0 0 0 1px var(--border), 0 8px 16px rgba(0,0,0,0.08); }
    .reality-icon { flex-shrink: 0; }

    /* ===== SLIDE: WHAT'S NEXT ===== */
    .theme-dark .slide-next { background: linear-gradient(160deg, #080808 0%, #081a10 100%); }
    .theme-light .slide-next { background: linear-gradient(160deg, #f0faf4 0%, #e0f5ea 100%); }
    .slide-next { align-items: center; }
    .slide-next .slide-title { color: var(--accent); }
    .next-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%;
      margin-bottom: 48px;
    }
    .next-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 30px 24px;
      min-height: calc(230px * var(--font-scale));
      box-shadow: 0 2px 20px rgba(0,0,0,0.35);
      transition: box-shadow 0.2s ease;
    }
    .next-card:hover { box-shadow: 0 0 0 1px var(--border), 0 8px 16px rgba(0,0,0,0.08); }
    .next-num {

      // ── 2. Problem ────────────────────────────────────────────
      if (d.problem.variant === 'timeline') {

      } else if (d.problem.variant === 'focus') {

        var processHtml = '';
        if (d.problem.process) {

      // ── 3. What We Built ──────────────────────────────────────

          + '<div class="built-steps-wrap" style="width:100%;display:flex;flex-direction:column;">' + stepsHtml + '</div>'

      } else {

          return '<div class="feature-card animate delay-' + (i + 3) + '">'
            + '<div class="feature-icon">' + getIcon(f.icon) + '</div>'

        html += '<section class="slide slide-built" data-type="built" aria-label="What We Built">'

          + '</div>'
          + '<div class="feature-grid">' + featuresHtml + '</div>'
          + '</section>';
      }

      // ── 4. How We Built (optional — null이면 생략) ────────────
      if (d.how) {
      if (d.how.variant === 'stack') {
        var stackBoxes = d.how.arch.map(function(node, i) {
          var cls = node.highlight ? 'how-stack-box highlight' : 'how-stack-box';
          var num = String(i + 1).padStart(2, '0');
          var desc = node.desc ? '<p>' + esc(node.desc) + '</p>' : '';
          return '<div class="' + cls + ' animate delay-' + (i + 2) + '">'
            + '<p class="how-stack-box-num">STEP ' + num + '</p>'
            + '<h3>' + esc(node.label) + '</h3>'

        }).join('');
        var whyHtml = '';
        if (d.how.why && d.how.why.items && d.how.why.items.length) {
          var stackWhyItems = d.how.why.items.map(function(item) {
            return '<div class="why-item"><svg class="why-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg><span>' + esc(item) + '</span></div>';
          }).join('');
          whyHtml = '<div class="why-section animate delay-' + (d.how.arch.length + 2) + '">'
            + '<h3>' + esc(d.how.why.title) + '</h3>'

        html += '<section class="slide slide-how" data-type="how" aria-label="How We Built">'

      } else {
      var archHtml = d.how.arch.map(function(node, i) {
        var arrow = i > 0 ? '<span class="arch-arrow">→</span>' : '';
        var cls = node.highlight ? 'arch-node highlight' : 'arch-node';
        return arrow + '<span class="' + cls + '">' + esc(node.label) + '</span>';
      }).join('');

      var whyItemsHtml = d.how.why.items.map(function(item) {
        return '<div class="why-item">'
          + '<svg class="why-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M5 12h14"/><path d="M12 5l7 7-7 7"/></svg>'
          + '<span>' + esc(item) + '</span>'
          + '</div>';
      }).join('');

      html += '<section class="slide slide-how" data-type="how" aria-label="How We Built">'
        + '<div class="slide-header" style="margin-bottom:76px;width:100%;">'

        + '<h2 class="slide-title animate delay-1">' + esc(d.how.title) + '</h2>'
        + '</div>'
        + '<div class="arch-flow animate delay-2">' + archHtml + '</div>'
        + '<div class="why-section animate delay-3">'
        + '<h3>' + esc(d.how.why.title) + '</h3>'
        + '<div class="why-list">' + whyItemsHtml + '</div>'
        + '</div>'
        + '</section>';
      } // end how variant
      } // end if d.how

      // ── 5. Before / After (optional — null이면 생략) ──────────
      if (d.ba) {
      var beforeItems = d.ba.before.items.map(function(item) {
        return '<div class="ba-item"><span class="ba-dot neg"></span>' + esc(item) + '</div>';
      }).join('');
      var afterItems = d.ba.after.items.map(function(item) {
        return '<div class="ba-item"><span class="ba-dot pos"></span>' + esc(item) + '</div>';
      }).join('');

      html += '<section class="slide slide-ba" data-type="ba" aria-label="Before After">'

        + '</div>'
        + '<div class="ba-col animate delay-3">'
        + '<p class="ba-label after">AFTER</p>'
        + '<p class="ba-big after-num" data-count="' + esc(d.ba.after.count) + '" data-suffix="' + esc(d.ba.after.suffix) + '">' + d.ba.after.count + d.ba.after.suffix + '</p>'
        + '<p class="ba-desc">' + esc(d.ba.after.desc) + '</p>'
        + '<div class="ba-list">' + afterItems + '</div>'
        + '</div>'
        + '</div>'
        + '</section>';
      } // end if d.ba

      // ── 6. What's Next (Reality + Next 통합) ──────────────────
      if (d.next) {
        // 좌측: 구현 상황 + 현재 한계 (각각 카드)
        var canHtml = '';
        var cantHtml = '';
        var canSrc = (d.next.can && d.next.can.length) ? d.next.can : (d.reality && d.reality.can && d.reality.can.length ? d.reality.can : null);
        var cantSrc = (d.next.cant && d.next.cant.length) ? d.next.cant : (d.reality && d.reality.cant && d.reality.cant.length ? d.reality.cant : null);
        if (canSrc) {
          canHtml = '<div class="whatsnext-card animate delay-2">'
            + '<p class="whatsnext-section-title">' + esc(d.next.canTitle || (d.reality && d.reality.canTitle) || '구현 결과') + '</p>'
            + '<div class="whatsnext-list">' + canSrc.map(function(item) {
              return '<div class="whatsnext-item">' + esc(item) + '</div>';
            }).join('') + '</div></div>';
        }
        if (cantSrc) {
          cantHtml = '<div class="whatsnext-card animate delay-3">'
            + '<p class="whatsnext-section-title limits">' + esc(d.next.cantTitle || (d.reality && d.reality.cantTitle) || '현재 한계') + '</p>'
            + '<div class="whatsnext-list">' + cantSrc.map(function(item) {
              return '<div class="whatsnext-item">' + esc(item) + '</div>';
            }).join('') + '</div></div>';
        }
        // 우측: 다음 단계 (하나의 카드 안에 타이틀 + 아이템)
        var nextItemsHtml = '';
        if (d.next.items && d.next.items.length) {
          nextItemsHtml = d.next.items.map(function(item, i) {
            var bodyHtml = item.body ? '<p>' + esc(item.body) + '</p>' : '';
            return '<div class="whatsnext-next-item">'

        }

        html += '<section class="slide slide-next" data-type="next" aria-label="What\'s Next">'

          + '<div class="whatsnext-right-card animate delay-4">'
          + '<p class="whatsnext-section-title next">' + esc(d.next.nextTitle || '다음 단계') + '</p>'
          + '<div class="whatsnext-next-items">' + nextItemsHtml + '</div>'

      // ── 8. Extra slides (before-closing, 위치 미지정 항목) ────
      (d.extra || []).forEach(function(ex, i) {
        var exPos = ex.position || 'before-closing';

            + '<div class="common-compare">'
            + '<div class="common-compare-col left animate delay-2">'
            + '<p class="common-compare-label">' + esc(ex.left && ex.left.label || 'A') + '</p>'
            + '<div class="common-compare-list">' + (ex.left && ex.left.items || []).map(function(item) { return '<div class="common-compare-item">' + esc(item) + '</div>'; }).join('') + '</div></div>'
            + '<div class="common-compare-col right animate delay-3">'
            + '<p class="common-compare-label">' + esc(ex.right && ex.right.label || 'B') + '</p>'
            + '<div class="common-compare-list">' + (ex.right && ex.right.items || []).map(function(item) { return '<div class="common-compare-item">' + esc(item) + '</div>'; }).join('') + '</div></div>'

        } else if (ex.type === 'big-number') {
          var nums = (ex.numbers || []).map(function(n, ni) {

              + '<p class="common-bignumber-label">' + esc(n.label) + '</p></div>';
          }).join('');
          html += '<section class="slide" data-type="extra-bignumber" aria-label="' + esc(ex.title || '') + '"'
            + ' style="justify-content:flex-start;padding-top:160px;align-items:center;">'

          var vlItems = (ex.items || []).map(function(item, vi) {
            var num = String(vi + 1).padStart(2, '0');

              + '<p class="common-vlist-num">' + num + '</p>'
              + '<div class="common-vlist-text">'
              + '<h3>' + esc(item.heading) + '</h3>'
              + '<p>' + esc(item.body) + '</p></div></div>';

            + '<p class="slide-tag animate">' + esc(ex.tag || '') + '</p>'

      // ── 9. Closing ────────────────────────────────────────────
      // quoteHighlight: 첫 줄 강조 (기존 방식)
      // secondaryHighlight: 두 번째 줄에서 특정 단어만 accent, 나머지는 흰색
      var closingLine1 = d.closing.quoteHighlight
        ? esc(d.closing.quote) + ' <em>' + esc(d.closing.quoteHighlight) + '</em>' + (d.closing.quoteSuffix ? esc(d.closing.quoteSuffix) : '')
        : esc(d.closing.quote);
      var closingLine2Raw = esc(d.closing.secondary || '');
      if (d.closing.secondaryHighlight) {
        closingLine2Raw = closingLine2Raw.replace(
          esc(d.closing.secondaryHighlight),
          '<em>' + esc(d.closing.secondaryHighlight) + '</em>'
        );
      }
      var closingLine2Class = 'closing-main';
      html += '<section class="slide slide-closing" data-type="closing" aria-label="마무리">'
        + '<p class="closing-main animate">' + closingLine1 + '</p>'
        + (closingLine2Raw ? '<p class="' + closingLine2Class + ' animate delay-1">' + closingLine2Raw + '</p>' : '')
        + '<p class="closing-sub animate delay-3">' + esc(d.closing.members) + '</p>'
        + '</section>';

      // ── 10. Q&A ───────────────────────────────────────────────
      html += '<section class="slide slide-qa" data-type="qa" aria-label="Q&A">'
        + '<h1 class="qa-title animate delay-1">Q&A</h1>'
        + '<p class="qa-thanks animate delay-3">감사합니다</p>'
        + '</section>';

      wrapper.innerHTML = html;

      // ── override: 기존 슬라이드를 custom HTML로 대체 ─────────
      if (d.override) {
        Object.keys(d.override).forEach(function(slideType) {
          var customHtml = d.override[slideType];
          var target = wrapper.querySelector('[data-type="' + slideType + '"]');
          if (target && customHtml) {
            target.innerHTML = customHtml;
          }
        });
      }

      // ── cardStyle / accentPos 적용 (슬라이드별) ───────────────
      var slideConfigs = {
        problem: d.problem, built: d.built, how: d.how,
        ba: d.ba, next: d.next
      };
      Object.keys(slideConfigs).forEach(function(key) {
        var cfg = slideConfigs[key];
        if (!cfg) return;
        var slideEl = wrapper.querySelector('[data-type="' + key + '"]');
        if (!slideEl) return;
        // cardStyle
        if (cfg.cardStyle && cfg.cardStyle !== 'default') {
          var cards = slideEl.querySelectorAll('.feature-card, .problem-card, .next-card, .extra-card, .reality-item, .ba-col');
          cards.forEach(function(card) { card.classList.add('card-' + cfg.cardStyle); });
        }
        // accentPos
        if (cfg.accentPos && cfg.accentPos !== 'top') {
          slideEl.classList.add('accent-' + cfg.accentPos);
        }
      });
    }

    // 슬라이드 시스템 초기화
    function initSlides() {
      var slides = document.querySelectorAll('.slide');
      var d2 = SLIDE_DATA;
      var totalSlides = 3  // cover + problem + built
        + (d2.how ? 1 : 0)
        + (d2.ba ? 1 : 0)
        + (d2.next ? 1 : 0)  // merged reality+next
        + (d2.extra ? d2.extra.length : 0)
        + 2; // closing + Q&A
      var currentSlide = 0;

      // 슬라이드 배경 캐시 (투명 처리 전에 읽어야 함)
      slideBackgrounds = Array.from(slides).map(function(slide) {
        var s = window.getComputedStyle(slide);
        return { color: s.backgroundColor, image: s.backgroundImage };
      });
      // 슬라이드 자체 배경 제거 → bg-layer가 전담
      slides.forEach(function(slide) { slide.style.background = 'transparent'; });

      // BA 슬라이드 인덱스를 동적으로 탐색
      var baSlideIndex = Array.from(slides).findIndex(function(s) {
        return s.classList.contains('slide-ba');
      });

      var _bgActive = 'bg-layer';
      function syncOuterBackground(index) {
        var cached = slideBackgrounds[index];
        if (!cached) return;
        var nextId = _bgActive === 'bg-layer' ? 'bg-layer-b' : 'bg-layer';
        var next = document.getElementById(nextId);
        var current = document.getElementById(_bgActive);
        next.style.backgroundColor = cached.color;
        next.style.backgroundImage = cached.image === 'none' ? 'none' : cached.image;
        next.style.backgroundSize = '100% 100%';
        next.style.opacity = '1';
        current.style.opacity = '0';
        _bgActive = nextId;
      }

      function showSlide(index) {
        slides.forEach(function(slide, i) {
          slide.classList.remove('active', 'exit-left');
          if (i < index) slide.classList.add('exit-left');
        });
        slides[index].classList.add('active');
        currentSlide = index;
        syncOuterBackground(index);
        document.getElementById('slideCounter').textContent = (index + 1) + ' / ' + totalSlides;
        document.getElementById('progressBar').style.width = ((index + 1) / totalSlides * 100) + '%';

        // 현재 슬라이드 애니메이션 재트리거
        var animEls = slides[index].querySelectorAll('.animate');
        animEls.forEach(function(el) {
          el.style.animation = 'none';
          el.offsetHeight; // reflow 강제
          el.style.animation = '';
        });

        // BA 슬라이드 도달 시 숫자 카운터 트리거
        if (index === baSlideIndex) {
          setTimeout(animateCounters, 300);
        }
      }

      window.nextSlide = function() { if (currentSlide < totalSlides - 1) showSlide(currentSlide + 1); };
      window.prevSlide = function() { if (currentSlide > 0) showSlide(currentSlide - 1); };
      window.showSlide = function(idx) { showSlide(idx); };

      // 키보드 네비게이션
      document.addEventListener('keydown', function(e) {
        // ArrowUp: 오버뷰 열기
        if (!overviewOpen && e.key === 'ArrowUp') { e.preventDefault(); openOverview(); return; }

        if (overviewOpen) {
          var slides = document.getElementById('slidesWrapper').querySelectorAll('.slide');

          if (overviewSection === 'controls') {
            // controls 섹션
            var CTRL_MAX = 4;
            var onFontRow = overviewControlFocus === 2;

            if (e.key === 'ArrowRight') {
              e.preventDefault();
              if (onFontRow) { adjustFontScale(0.1); flashFontNudge('right'); }
              else { setOverviewSection('thumbs'); }
            } else if (e.key === 'ArrowLeft') {
              e.preventDefault();
              if (onFontRow) { adjustFontScale(-0.1); flashFontNudge('left'); }
            } else if (e.key === 'ArrowDown') {
              e.preventDefault();
              if (overviewControlFocus < CTRL_MAX) updateControlFocus(overviewControlFocus + 1);
              else closeOverview();
            } else if (e.key === 'ArrowUp') {
              e.preventDefault();
              if (overviewControlFocus > 0) updateControlFocus(overviewControlFocus - 1);
            } else if (e.key === 'Enter') {
              e.preventDefault();
              if (!onFontRow) {
                var btn = document.querySelector('#overview-controls button[data-ctrl="' + overviewControlFocus + '"]');
                if (btn) btn.click();
              }
            } else if (e.key === 'Escape') {
              e.preventDefault(); closeOverview();
            }
          } else {
            // thumbs 섹션
            if (e.key === 'ArrowRight') {
              e.preventDefault();
              overviewFocus = Math.min(overviewFocus + 1, slides.length - 1);
              updateOverviewFocus(overviewFocus);
            } else if (e.key === 'ArrowLeft') {
              e.preventDefault();
              if (overviewFocus === 0) { setOverviewSection('controls'); }
              else { overviewFocus--; updateOverviewFocus(overviewFocus); }
            } else if (e.key === 'ArrowDown') {
              e.preventDefault(); closeOverview();
            } else if (e.key === 'Enter') {
              e.preventDefault();
              window._overviewGoTo(overviewFocus);
            } else if (e.key === 'Escape') {
              e.preventDefault(); closeOverview();
            }
          }
        } else {
          // 일반 모드: 슬라이드 이동
          if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); window.nextSlide(); }
          if (e.key === 'ArrowLeft') { e.preventDefault(); window.prevSlide(); }
        }
      });

      // 터치 네비게이션
      var touchStartX = 0;
      document.addEventListener('touchstart', function(e) { touchStartX = e.changedTouches[0].screenX; });
      document.addEventListener('touchend', function(e) {
        var diff = touchStartX - e.changedTouches[0].screenX;
        if (Math.abs(diff) > 50) { diff > 0 ? window.nextSlide() : window.prevSlide(); }
      });


      // 테마 변경 시 배경 캐시 재빌드 후 동기화
      window.onThemeChange = function() {
        slides.forEach(function(slide) { slide.style.background = ''; });
        slideBackgrounds = Array.from(slides).map(function(slide) {
          var s = window.getComputedStyle(slide);
          return { color: s.backgroundColor, image: s.backgroundImage };
        });
        slides.forEach(function(slide) { slide.style.background = 'transparent'; });
        syncOuterBackground(currentSlide);
        if (overviewOpen) buildOverview();
      };

      // 초기 슬라이드 표시 (배경 즉시 적용)
      showSlide(0);
      syncOuterBackground(0);
    }

    // 숫자 카운터 애니메이션
    function animateCounters() {
      document.querySelectorAll('[data-count]').forEach(function(el) {
        if (el.dataset.counted) return;
        el.dataset.counted = '1';
        var target = parseFloat(el.dataset.count);
        var suffix = el.dataset.suffix || '';
        var prefix = el.dataset.prefix || '';
        var start = performance.now();
        var duration = 1200;
        (function tick(now) {
          var p = Math.min((now - start) / duration, 1);
          var eased = 1 - Math.pow(1 - p, 3);
          el.textContent = prefix + Math.round(target * eased) + suffix;
          if (p < 1) requestAnimationFrame(tick);
        })(start);
      });
    }

    // PNG 다운로드
    async function downloadImage() {
      var nav = document.querySelector('.slide-nav');
      var overview = document.getElementById('overview-panel');
      nav.style.display = 'none';
      overview.style.display = 'none';
      try {
        var activeSlide = document.querySelector('.slide.active');
        var url = await htmlToImage.toPng(activeSlide, { quality: 1, pixelRatio: 2 });
        var a = document.createElement('a');
        a.href = url;
        a.download = 'slide-' + (document.querySelectorAll('.slide.exit-left').length + 1) + '.png';
        a.click();
      } catch(e) { console.error('Download failed:', e); }
      nav.style.display = '';
      overview.style.display = '';
    }

    // === 폰트 크기 조절 ===
    var currentFontScale = parseFloat(localStorage.getItem('font-scale') || '1');
    (function initFontScale() {
      document.documentElement.style.setProperty('--font-scale', currentFontScale);
      var lbl = document.getElementById('fontScaleLabel');
      if (lbl) lbl.textContent = Math.round(currentFontScale * 100) + '%';
    })();

    function adjustFontScale(delta) {
      currentFontScale = Math.max(0.7, Math.min(1.5, +(currentFontScale + delta).toFixed(1)));
      document.documentElement.style.setProperty('--font-scale', currentFontScale);
      var lbl = document.getElementById('fontScaleLabel');
      if (lbl) lbl.textContent = Math.round(currentFontScale * 100) + '%';
      localStorage.setItem('font-scale', currentFontScale);
    }

    // === 테마 ===
    var savedTheme = localStorage.getItem('viz-theme-v3');
    var currentTheme = savedTheme || 'dark';
    function applyTheme(t) {
      document.documentElement.className = 'theme-' + t;
      document.getElementById('themeIcon').textContent = t === 'dark' ? '🌙' : '☀️';
      document.getElementById('themeLabel').textContent = t === 'dark' ? 'Dark' : 'Light';
      localStorage.setItem('viz-theme-v3', t);
      currentTheme = t;
      if (typeof window.onThemeChange === 'function') window.onThemeChange();
    }
    function cycleTheme() { applyTheme(currentTheme === 'dark' ? 'light' : 'dark'); }
    applyTheme(currentTheme);

    // === 전체 화면 ===
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
        document.getElementById('fsIcon').textContent = '✕';
        document.getElementById('fsLabel').textContent = '전체 화면 종료';
      } else {
        document.exitFullscreen();
        document.getElementById('fsIcon').textContent = '⛶';
        document.getElementById('fsLabel').textContent = '전체 화면';
      }
    }
    document.addEventListener('fullscreenchange', function() {
      if (!document.fullscreenElement) {
        document.getElementById('fsIcon').textContent = '⛶';
        document.getElementById('fsLabel').textContent = '전체 화면';
      }
    });

    // === 오버뷰 패널 ===
    var OVERVIEW_H = 220;
    var overviewOpen = false;
    var overviewFocus = 0;
    var overviewSection = 'thumbs';
    var overviewControlFocus = 0;
    var slideBackgrounds = [];

    function updateControlFocus(idx) {
      overviewControlFocus = idx;
      var nodes = document.querySelectorAll('#overview-controls [data-ctrl]');
      nodes.forEach(function(el) { el.classList.remove('control-focus'); });
      var target = document.querySelector('#overview-controls [data-ctrl="' + idx + '"]');
      if (target) target.classList.add('control-focus');
    }

    function setOverviewSection(section) {
      overviewSection = section;
      if (section === 'controls') {
        updateControlFocus(overviewControlFocus || 0);
        document.querySelectorAll('#overview-track .overview-item').forEach(function(el) {
          el.classList.remove('overview-focus');
        });
      } else {
        document.querySelectorAll('#overview-controls [data-ctrl]').forEach(function(el) {
          el.classList.remove('control-focus');
        });
        updateOverviewFocus(overviewFocus);
      }
    }

    var _fontNudgeTimer = null;
    function flashFontNudge(dir) {
      var row = document.querySelector('#overview-controls .font-row');
      if (!row) return;
      row.classList.remove('font-nudge-left', 'font-nudge-right');
      row.classList.add('font-nudge-' + dir);
      clearTimeout(_fontNudgeTimer);
      _fontNudgeTimer = setTimeout(function() {
        row.classList.remove('font-nudge-left', 'font-nudge-right');
      }, 140);
    }

    function buildOverview() {
      var slides = document.getElementById('slidesWrapper').querySelectorAll('.slide');
      var track = document.getElementById('overview-track');
      var currentSlideIdx = parseInt(document.getElementById('slideCounter').textContent.split('/')[0].trim()) - 1;
      track.innerHTML = '';
      slides.forEach(function(slide, i) {
        var item = document.createElement('div');
        item.className = 'overview-item' + (i === currentSlideIdx ? ' overview-current' : '') + (i === overviewFocus ? ' overview-focus' : '');
        item.dataset.index = i;

        var thumb = document.createElement('div');
        thumb.className = 'overview-thumb';

        var clone = slide.cloneNode(true);
        clone.classList.add('overview-clone');
        var cached = slideBackgrounds[i];
        if (cached) {
          clone.style.background = 'none';
          clone.style.backgroundColor = cached.color;
          clone.style.backgroundImage = cached.image;
          clone.style.backgroundSize = '100% 100%';
        }
        thumb.appendChild(clone);

        var num = document.createElement('div');
        num.className = 'overview-num';
        var eyeHtml = (i === currentSlideIdx)
          ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="opacity:0.7;vertical-align:middle;margin-right:4px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>'
          : '';
        num.innerHTML = eyeHtml + (i + 1);

        item.appendChild(thumb);
        item.appendChild(num);
        item.addEventListener('click', function() {
          window._overviewGoTo(parseInt(this.dataset.index));
        });
        track.appendChild(item);
      });
      scrollOverviewToFocus();
    }

    function scrollOverviewToFocus() {
      var track = document.getElementById('overview-track');
      var items = track.querySelectorAll('.overview-item');
      if (items[overviewFocus]) {
        var item = items[overviewFocus];
        var itemLeft = item.offsetLeft;
        var itemW = item.offsetWidth;
        var trackW = track.offsetWidth;
        track.scrollLeft = itemLeft - (trackW / 2) + (itemW / 2);
      }
    }

    function updateOverviewFocus(idx) {
      var track = document.getElementById('overview-track');
      var items = track.querySelectorAll('.overview-item');
      items.forEach(function(el) { el.classList.remove('overview-focus'); });
      if (items[idx]) items[idx].classList.add('overview-focus');
      scrollOverviewToFocus();
    }

    function openOverview() {
      var slides = document.getElementById('slidesWrapper').querySelectorAll('.slide');
      overviewOpen = true;
      overviewFocus = parseInt(document.getElementById('slideCounter').textContent.split('/')[0].trim()) - 1;
      overviewSection = 'thumbs';
      buildOverview();
      document.getElementById('overview-panel').classList.add('open');
      document.querySelectorAll('#overview-controls [data-ctrl]').forEach(function(el) {
        el.classList.remove('control-focus');
      });
      scaleSlides();
    }

    function closeOverview() {
      overviewOpen = false;
      document.getElementById('overview-panel').classList.remove('open');
      document.querySelectorAll('#overview-controls [data-ctrl]').forEach(function(el) {
        el.classList.remove('control-focus');
      });
      scaleSlides();
    }

    window._overviewGoTo = function(idx) {
      closeOverview();
      setTimeout(function() { window.showSlide(idx); }, 50);
    };

    // === 뷰포트 스케일 ===
    function scaleSlides() {
      var wrapper = document.getElementById('slidesWrapper');
      var availH = window.innerHeight - (overviewOpen ? OVERVIEW_H : 0);
      var scale = Math.min(window.innerWidth / 2040, availH / 1080);
      var offsetX = (window.innerWidth - 2040 * scale) / 2;
      var offsetY = (availH - 1080 * scale) / 2;
      wrapper.style.transform = 'translate(' + offsetX + 'px, ' + offsetY + 'px) scale(' + scale + ')';
    }
    window.addEventListener('resize', scaleSlides);
    scaleSlides();

    // === 실행 ===
    renderSlides();
    initSlides();
  </script>
</body>
</html>
